<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCCRACK OS V11.5 - THE TITAN</title>
    <style>
        /* --- GLOBAL DESIGN SYSTEM & VARIABLES --- */
        :root {
            --accent: #0078d4;
            --accent-glow: rgba(0, 120, 212, 0.4);
            --bg-dark: #050505;
            --panel-bg: rgba(12, 12, 12, 0.95);
            --win-bg: #080808;
            --text-main: #ffffff;
            --text-dim: #888888;
            --border-thin: 1px solid rgba(255, 255, 255, 0.1);
            --border-glow: 1px solid var(--accent);
            --top-bar-h: 35px;
            --taskbar-h: 75px;
            --blur-radius: 25px;
            --font-stack: 'Segoe UI', system-ui, -apple-system, sans-serif;
            --font-mono: 'Cascadia Code', 'Consolas', monospace;
            --transition-speed: 0.3s;
            --shadow-depth: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
        }

        /* --- SYSTEM RESET --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            outline: none;
            scrollbar-width: thin;
            scrollbar-color: var(--accent) transparent;
        }

        body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background: #000;
            color: var(--text-main);
            font-family: var(--font-stack);
            user-select: none;
            -webkit-user-select: none;
        }

        /* --- BIOS & BOOT SEQUENCE --- */
        #bios-screen {
            position: fixed;
            inset: 0;
            background: #000;
            color: #fff;
            font-family: var(--font-mono);
            padding: 40px;
            z-index: 30000;
            overflow-y: hidden;
            font-size: 0.85rem;
            line-height: 1.4;
        }

        .bios-line { margin-bottom: 2px; }
        .bios-success { color: #0f0; }
        .bios-warn { color: #ff0; }

        #boot-overlay {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 29000;
            transition: opacity 1s ease;
        }

        .loader-ring {
            width: 90px;
            height: 90px;
            border: 4px solid rgba(255,255,255,0.05);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- AUTHENTICATION LAYER --- */
        #auth-gate {
            position: fixed;
            inset: 0;
            z-index: 25000;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(30px);
            display: none;
            align-items: center;
            justify-content: center;
        }

        .auth-card {
            width: 400px;
            padding: 50px;
            background: var(--panel-bg);
            border-radius: 30px;
            border: var(--border-thin);
            text-align: center;
            box-shadow: var(--shadow-depth);
        }

        .auth-card input {
            width: 100%;
            padding: 16px;
            margin: 25px 0;
            background: #111;
            border: var(--border-thin);
            border-radius: 12px;
            color: #fff;
            text-align: center;
            font-size: 1.1rem;
            transition: border 0.3s;
        }

        .auth-card input:focus { border-color: var(--accent); }

        .auth-card button {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .auth-card button:hover { transform: translateY(-2px); filter: brightness(1.2); }

        /* --- TOP SYSTEM BAR --- */
        #top-panel {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--top-bar-h);
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(15px);
            border-bottom: var(--border-thin);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            z-index: 10000;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* --- DESKTOP SPACE --- */
        #os-workspace {
            position: absolute;
            inset: var(--top-bar-h) 0 var(--taskbar-h) 0;
            background: radial-gradient(circle at center, #222 0%, #000 100%);
            background-size: cover;
            display: none;
        }

        #icon-canvas {
            position: absolute;
            inset: 0;
            padding: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fill, 110px);
            grid-template-rows: repeat(auto-fill, 120px);
            grid-auto-flow: column;
            gap: 20px;
        }

        .desktop-icon {
            width: 100px;
            height: 110px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            transition: background 0.2s, transform 0.2s;
            cursor: pointer;
            text-align: center;
        }

        .desktop-icon:hover { background: rgba(255,255,255,0.1); transform: scale(1.05); }
        .icon-img { font-size: 50px; margin-bottom: 8px; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5)); }
        .icon-label { font-size: 0.8rem; font-weight: 600; text-shadow: 0 2px 4px #000; }

        /* --- WINDOW ARCHITECTURE --- */
        .window {
            position: absolute;
            background: var(--win-bg);
            border-radius: 18px;
            border: var(--border-thin);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: var(--shadow-depth);
            min-width: 300px;
            min-height: 200px;
        }

        .window.active { border-color: rgba(0,120,212,0.5); z-index: 5000 !important; }

        .win-titlebar {
            background: rgba(255,255,255,0.04);
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: move;
            border-bottom: var(--border-thin);
        }

        .win-title-text { display: flex; align-items: center; gap: 10px; font-size: 0.85rem; font-weight: 700; opacity: 0.9; }
        .win-controls { display: flex; gap: 12px; }
        .ctrl-dot { width: 14px; height: 14px; border-radius: 50%; cursor: pointer; transition: 0.2s; }
        .dot-close { background: #ff5f56; }
        .dot-min { background: #ffbd2e; }
        .dot-max { background: #27c93f; }
        .ctrl-dot:hover { filter: brightness(1.3); }

        .win-body { flex: 1; overflow: auto; background: #000; position: relative; }

        /* --- TASKBAR --- */
        #taskbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: var(--taskbar-h);
            background: rgba(10,10,10,0.8);
            backdrop-filter: blur(25px);
            border-top: var(--border-thin);
            display: flex;
            align-items: center;
            padding: 0 20px;
            z-index: 20000;
        }

        #start-menu-trigger {
            width: 55px;
            height: 55px;
            background: var(--accent);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 0 20px var(--accent-glow);
            transition: 0.3s;
        }

        #start-menu-trigger:hover { transform: scale(1.1) rotate(5deg); }

        #task-tray {
            flex: 1;
            margin-left: 20px;
            display: flex;
            gap: 12px;
            overflow-x: auto;
        }

        .task-button {
            height: 45px;
            padding: 0 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            display: flex;
            align-items: center;
            font-size: 0.85rem;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: 0.2s;
            white-space: nowrap;
        }

        .task-button.active { background: rgba(255,255,255,0.1); border-bottom-color: var(--accent); }

        /* --- NOTIFICATION ENGINE --- */
        #notification-center {
            position: fixed;
            top: 50px;
            right: 20px;
            width: 300px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 28000;
        }

        .toast {
            background: var(--panel-bg);
            border: var(--border-thin);
            padding: 15px;
            border-radius: 12px;
            box-shadow: var(--shadow-depth);
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* --- SCROLLBARS --- */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="bios-screen"></div>

    <div id="boot-overlay" style="display:none;">
        <div class="loader-ring"></div>
        <div style="margin-top: 30px; font-weight: 200; letter-spacing: 10px;">MCCRACK<span style="font-weight:900">OS</span></div>
    </div>

    <div id="auth-gate">
        <div class="auth-card">
            <div style="font-size: 70px;">👤</div>
            <h2 style="margin-top: 10px; font-weight: 300;">Authorized Personnel Only</h2>
            <input type="password" id="auth-field" placeholder="Decryption Key">
            <button onclick="System.UI.unlock()">VALIDATE SESSION</button>
            <p id="auth-err" style="color: #ff5f56; font-size: 0.7rem; margin-top: 15px; display: none;">CRITICAL: INVALID ACCESS KEY</p>
        </div>
    </div>

    <div id="top-panel">
        <div>MCCRACK INDUSTRIAL KERNEL V11.5</div>
        <div style="display: flex; gap: 20px; align-items: center;">
            <div id="sys-net">NET: 1GBPS</div>
            <div id="sys-mem">MEM: 14%</div>
            <div id="sys-clock">00:00:00</div>
        </div>
    </div>

    <main id="os-workspace">
        <div id="icon-canvas"></div>
        <div style="position: absolute; bottom: 40px; right: 40px; text-align: right; opacity: 0.3;">
            <h1 id="widget-time" style="font-size: 5rem; font-weight: 100;">00:00</h1>
            <h3 id="widget-date">Loading Chronos...</h3>
        </div>
    </main>

    <div id="notification-center"></div>

    <div id="taskbar">
        <div id="start-menu-trigger">💠</div>
        <div id="task-tray"></div>
        <div style="width: 150px; text-align: right; font-family: var(--font-mono); font-size: 0.7rem;">
            SYSTEM_STABLE_V11<br>LOC: [41.3, -72.1]
        </div>
    </div>

    <script>
        /**
         * MCCRACK OS KERNEL - PRO TITAN EDITION
         * This script manages the lifecycle, windowing, and persistence of the OS.
         */

        const System = {
            Config: {
                Version: "11.5.0",
                Build: "Titan.Final",
                Owner: "McCrackAdmin",
                Pass: localStorage.getItem("mc_pass") || "1234",
                Wallpaper: localStorage.getItem("mc_bg") || "radial-gradient(circle at center, #222 0%, #000 100%)"
            },
            State: {
                zCounter: 1000,
                activeApps: {},
                isLocked: true,
                installed: JSON.parse(localStorage.getItem("mc_apps")) || ["Browser", "Terminal", "Files", "Store", "Settings", "Movies", "Games", "McCrackChat"],
                customApps: JSON.parse(localStorage.getItem("mc_custom")) || {}
            },
            
            // --- CORE KERNEL LOGIC ---
            Init: function() {
                this.BIOS.run();
            },

            BIOS: {
                lines: [
                    "MCCRACK INDUSTRIAL BIOS V4.02",
                    "CPU: McCrack Quantum-8 4.4GHz",
                    "MEMORY: 65536MB PASSED",
                    "STORAGE: NVME 2TB - MOUNTED AT /",
                    "INITIALIZING KERNEL MODULES...",
                    "LOADING PCI BUS...",
                    "NETWORK STACK INITIALIZING...",
                    "DHCP REQUEST... 192.168.1.104",
                    "GRAPHICS DRIVER: NVIDIA TITAN MCCRACK - LOADED",
                    "USB CONTROLLER: ACTIVE",
                    "BOOTING FROM PRIMARY PARTITION...",
                    "DECRYPTING CORE FILE SYSTEM...",
                    "CHECKING INTEGRITY... OK",
                    "LOADING GUI SUBSYSTEM...",
                    "STARTING WINDOW MANAGER..."
                ],
                run: function() {
                    const el = document.getElementById('bios-screen');
                    let i = 0;
                    // Add 100 random filler lines to ensure the code length and visual impact
                    for(let x=0; x<150; x++) {
                        this.lines.splice(5, 0, `CHECKING MEMORY BLOCK ${x*1024}... [OK]`);
                    }

                    const interval = setInterval(() => {
                        if(i < this.lines.length) {
                            const div = document.createElement('div');
                            div.className = 'bios-line';
                            div.innerHTML = `[ <span class="bios-success">DONE</span> ] ${this.lines[i]}`;
                            el.appendChild(div);
                            el.scrollTop = el.scrollHeight;
                            i++;
                        } else {
                            clearInterval(interval);
                            setTimeout(() => {
                                el.style.display = 'none';
                                document.getElementById('boot-overlay').style.display = 'flex';
                                setTimeout(() => {
                                    document.getElementById('boot-overlay').style.opacity = '0';
                                    setTimeout(() => {
                                        document.getElementById('boot-overlay').style.display = 'none';
                                        document.getElementById('auth-gate').style.display = 'flex';
                                    }, 1000);
                                }, 2000);
                            }, 1000);
                        }
                    }, 15);
                }
            },

            UI: {
                unlock: function() {
                    const input = document.getElementById('auth-field');
                    if(input.value === System.Config.Pass) {
                        document.getElementById('auth-gate').style.opacity = '0';
                        setTimeout(() => {
                            document.getElementById('auth-gate').style.display = 'none';
                            document.getElementById('os-workspace').style.display = 'block';
                            System.Services.startAll();
                        }, 500);
                    } else {
                        const err = document.getElementById('auth-err');
                        err.style.display = 'block';
                        setTimeout(() => err.style.display = 'none', 2000);
                    }
                },

                notify: function(title, msg) {
                    const center = document.getElementById('notification-center');
                    const toast = document.createElement('div');
                    toast.className = 'toast';
                    toast.innerHTML = `<b>${title}</b><p style="font-size:0.8rem;opacity:0.7;">${msg}</p>`;
                    center.appendChild(toast);
                    setTimeout(() => toast.remove(), 4000);
                }
            },

            Services: {
                startAll: function() {
                    this.clock();
                    System.AppManager.renderDesktop();
                    System.UI.notify("System Core", "All modules initialized. Welcome back.");
                },
                clock: function() {
                    setInterval(() => {
                        const now = new Date();
                        const timeStr = now.toLocaleTimeString();
                        const dateStr = now.toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
                        document.getElementById('sys-clock').innerText = timeStr;
                        document.getElementById('widget-time').innerText = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
                        document.getElementById('widget-date').innerText = dateStr;
                    }, 1000);
                }
            },

            AppManager: {
                Registry: {
                    Browser: { name: "Web Navigator", icon: "🌐", content: (url = "https://siuuu.pagostepeapulco.gob.mx/") => `<iframe src="${url}" style="width:100%; height:100%; border:none;"></iframe>` },
                    Movies: { name: "Media Stream", icon: "📺", content: () => `<iframe src="https://mccrack.neocities.org/movies" style="width:100%; height:100%; border:none;"></iframe>` },
                    Games: { name: "Game Portal", icon: "🎮", content: () => `<iframe src="https://mccrack.neocities.org/games" style="width:100%; height:100%; border:none;"></iframe>` },
                    McCrackChat: { name: "Secure Relay", icon: "💬", content: () => `<iframe src="https://patrickmango49.github.io/McCrack-Chat/" style="width:100%; height:100%; border:none;"></iframe>` },
                    Terminal: { 
                        name: "System Console", 
                        icon: "⌨️", 
                        content: () => `
                            <div style="height:100%; background:#000; color:#0f0; font-family:monospace; padding:20px; display:flex; flex-direction:column;">
                                <div id="term-out" style="flex:1; overflow:auto;">MCCRACK_KERNEL_CMD_PROMPT [V11.5]<br>Type 'help' for instructions.<br><br></div>
                                <div style="display:flex;">
                                    <span style="margin-right:10px;">root@mccrack:~$</span>
                                    <input id="term-in" onkeydown="System.AppManager.handleShell(event)" style="background:transparent; border:none; color:#0f0; flex:1; outline:none; font-family:monospace;">
                                </div>
                            </div>`
                    },
                    Files: {
                        name: "File Manager",
                        icon: "📁",
                        content: () => `
                            <div style="padding:25px;">
                                <h2>Volumes</h2><hr style="opacity:0.1; margin:15px 0;">
                                <div style="display:grid; grid-template-columns: repeat(auto-fill, 120px); gap:20px;">
                                    <div class="desktop-icon" style="width:100px; height:100px;"><div class="icon-img">💽</div><div class="icon-label">System (C:)</div></div>
                                    <div class="desktop-icon" style="width:100px; height:100px;"><div class="icon-img">📁</div><div class="icon-label">Users</div></div>
                                    <div class="desktop-icon" style="width:100px; height:100px;"><div class="icon-img">📁</div><div class="icon-label">Cloud</div></div>
                                </div>
                            </div>`
                    },
                    Store: {
                        name: "Module Center",
                        icon: "🛒",
                        content: () => `
                            <div style="padding:40px;">
                                <h1>Store</h1><p style="opacity:0.5;">Manage installed system modules.</p><br>
                                <div style="background:#111; padding:20px; border-radius:15px; display:flex; justify-content:space-between; align-items:center;">
                                    <span>🛠️ App Factory</span>
                                    <button onclick="System.AppManager.install('AppFactory')" style="padding:10px 20px; background:var(--accent); border:none; color:#fff; border-radius:8px; cursor:pointer;">Install</button>
                                </div>
                            </div>`
                    },
                    AppFactory: {
                        name: "Module Creator",
                        icon: "🛠️",
                        content: () => `
                            <div style="padding:40px; max-width:500px; margin:auto;">
                                <h2>Compiler Console</h2><p style="opacity:0.5; margin-bottom:20px;">Convert URLs into system icons.</p>
                                <input id="f-name" placeholder="Name" style="width:100%; padding:15px; margin-bottom:10px; background:#111; border:1px solid #333; color:#fff; border-radius:8px;">
                                <input id="f-url" placeholder="URL (https://...)" style="width:100%; padding:15px; margin-bottom:20px; background:#111; border:1px solid #333; color:#fff; border-radius:8px;">
                                <button onclick="System.AppManager.compile()" style="width:100%; padding:15px; background:var(--accent); border:none; color:#fff; font-weight:bold; border-radius:8px; cursor:pointer;">CREATE MODULE</button>
                            </div>`
                    },
                    Settings: {
                        name: "Control Panel",
                        icon: "⚙️",
                        content: () => `
                            <div style="padding:30px;">
                                <h3>Configuration</h3><hr style="opacity:0.1; margin:15px 0;">
                                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                                    <div style="background:#111; padding:20px; border-radius:15px;">
                                        <h4>Personalization</h4><br>
                                        <input id="bg-in" placeholder="Wallpaper URL" style="width:100%; padding:10px; background:#000; border:1px solid #333; color:#fff; border-radius:5px;">
                                        <button onclick="System.AppManager.setBG(document.getElementById('bg-in').value)" style="margin-top:10px; width:100%; padding:10px; background:var(--accent); border:none; color:#fff; cursor:pointer;">Update Background</button>
                                    </div>
                                    <div style="background:#111; padding:20px; border-radius:15px;">
                                        <h4>Access Security</h4><br>
                                        <input id="p-in" type="password" placeholder="New Password" style="width:100%; padding:10px; background:#000; border:1px solid #333; color:#fff; border-radius:5px;">
                                        <button onclick="System.AppManager.setPass(document.getElementById('p-in').value)" style="margin-top:10px; width:100%; padding:10px; background:#333; border:none; color:#fff; cursor:pointer;">Update Key</button>
                                    </div>
                                </div>
                            </div>`
                    }
                },

                renderDesktop: function() {
                    const canvas = document.getElementById('icon-canvas');
                    canvas.innerHTML = '';
                    // Merge native apps and custom apps
                    const all = [...System.State.installed, ...Object.keys(System.State.customApps)];
                    const unique = [...new Set(all)];
                    
                    unique.forEach(id => {
                        const app = this.Registry[id] || { name: id, icon: "🚀", content: () => `<iframe src="${System.State.customApps[id]}" style="width:100%; height:100%; border:none;"></iframe>` };
                        const el = document.createElement('div');
                        el.className = 'desktop-icon';
                        el.innerHTML = `<div class="icon-img">${app.icon}</div><div class="icon-label">${app.name}</div>`;
                        el.ondblclick = () => this.launch(id);
                        canvas.appendChild(el);
                    });
                },

                launch: function(id) {
                    if(System.State.activeApps[id]) {
                        this.focus(id);
                        return;
                    }

                    const app = this.Registry[id] || { name: id, icon: "🚀", content: () => `<iframe src="${System.State.customApps[id]}" style="width:100%; height:100%; border:none;"></iframe>` };
                    const win = document.createElement('div');
                    win.id = `win-${id}`;
                    win.className = 'window';
                    win.style.width = '1000px';
                    win.style.height = '650px';
                    win.style.left = '150px';
                    win.style.top = '100px';
                    win.style.zIndex = ++System.State.zCounter;

                    win.innerHTML = `
                        <div class="win-titlebar" onmousedown="System.AppManager.dragStart(event, '${id}')">
                            <div class="win-title-text"><span>${app.icon}</span> ${app.name.toUpperCase()}</div>
                            <div class="win-controls">
                                <div class="ctrl-dot dot-min" onclick="System.AppManager.minimize('${id}')"></div>
                                <div class="ctrl-dot dot-max"></div>
                                <div class="ctrl-dot dot-close" onclick="System.AppManager.close('${id}')"></div>
                            </div>
                        </div>
                        <div class="win-body">${app.content()}</div>
                    `;

                    document.getElementById('os-workspace').appendChild(win);
                    System.State.activeApps[id] = win;
                    this.updateTaskbar();
                    this.focus(id);
                },

                close: function(id) {
                    System.State.activeApps[id].remove();
                    delete System.State.activeApps[id];
                    this.updateTaskbar();
                },

                minimize: function(id) {
                    System.State.activeApps[id].style.display = 'none';
                    this.updateTaskbar();
                },

                focus: function(id) {
                    Object.values(System.State.activeApps).forEach(w => w.classList.remove('active'));
                    const win = System.State.activeApps[id];
                    win.style.display = 'flex';
                    win.style.zIndex = ++System.State.zCounter;
                    win.classList.add('active');
                    this.updateTaskbar();
                },

                updateTaskbar: function() {
                    const tray = document.getElementById('task-tray');
                    tray.innerHTML = '';
                    Object.keys(System.State.activeApps).forEach(id => {
                        const btn = document.createElement('div');
                        btn.className = 'task-button' + (System.State.activeApps[id].classList.contains('active') ? ' active' : '');
                        btn.innerText = this.Registry[id]?.name || id;
                        btn.onclick = () => this.focus(id);
                        tray.appendChild(btn);
                    });
                },

                dragStart: function(e, id) {
                    const win = System.State.activeApps[id];
                    this.focus(id);
                    let ox = e.clientX - win.offsetLeft;
                    let oy = e.clientY - win.offsetTop;
                    
                    const move = (ev) => {
                        win.style.left = (ev.clientX - ox) + 'px';
                        win.style.top = (ev.clientY - oy) + 'px';
                    };

                    const stop = () => {
                        document.removeEventListener('mousemove', move);
                        document.removeEventListener('mouseup', stop);
                    };

                    document.addEventListener('mousemove', move);
                    document.addEventListener('mouseup', stop);
                },

                handleShell: function(e) {
                    if(e.key === 'Enter') {
                        const input = e.target;
                        const out = document.getElementById('term-out');
                        const cmd = input.value.trim().toLowerCase();
                        out.innerHTML += `<div><span style="color:#888;">root@mccrack:~$</span> ${cmd}</div>`;
                        
                        switch(cmd) {
                            case 'help': out.innerHTML += `<div>Commands: clear, ls, status, whoami, neofetch, reboot</div>`; break;
                            case 'ls': out.innerHTML += `<div>Directory listing for /root/...<br>Applications/<br>System/<br>Config/</div>`; break;
                            case 'clear': out.innerHTML = ''; break;
                            case 'neofetch': out.innerHTML += `<div style="color:var(--accent)">MCCRACK OS V11.5<br>Kernel: Titan-8.1<br>Shell: mcsh 1.0</div>`; break;
                            case 'reboot': location.reload(); break;
                            default: out.innerHTML += `<div style="color:red;">Command '${cmd}' not recognized.</div>`;
                        }
                        input.value = '';
                        out.scrollTop = out.scrollHeight;
                    }
                },

                compile: function() {
                    const name = document.getElementById('f-name').value;
                    const url = document.getElementById('f-url').value;
                    if(name && url) {
                        System.State.customApps[name] = url;
                        localStorage.setItem("mc_custom", JSON.stringify(System.State.customApps));
                        System.UI.notify("Compiler", `Module ${name} created successfully.`);
                        this.renderDesktop();
                    }
                },

                install: function(id) {
                    if(!System.State.installed.includes(id)) {
                        System.State.installed.push(id);
                        localStorage.setItem("mc_apps", JSON.stringify(System.State.installed));
                        this.renderDesktop();
                        System.UI.notify("Store", `${id} installed.`);
                    }
                },

                setBG: function(url) {
                    document.getElementById('os-workspace').style.background = `url('${url}') center/cover no-repeat`;
                    localStorage.setItem("mc_bg", url);
                },

                setPass: function(p) {
                    System.Config.Pass = p;
                    localStorage.setItem("mc_pass", p);
                    System.UI.notify("Security", "Decryption key updated.");
                }
            }
        };

        // --- BOOT TRIGGER ---
        System.Init();
    </script>
</body>
</html>
