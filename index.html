<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MCCRACK OS V11.0 - THE TITAN FUSION</title>
    <style>
        /* --- SYSTEM DESIGN SYSTEM (V11 UPGRADE) --- */
        :root {
            --accent: #0078d4;
            --accent-glow: rgba(0, 120, 212, 0.4);
            --top-bar-h: 35px;
            --taskbar-h: 75px;
            --panel-bg: rgba(10, 10, 10, 0.98);
            --win-bg: #050505;
            --border-light: 1px solid rgba(255, 255, 255, 0.12);
            --shadow-lg: 0 30px 60px -12px rgba(0, 0, 0, 0.9);
            --blur: blur(30px);
            --font-main: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --font-mono: 'Cascadia Code', 'Consolas', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body { 
            height: 100vh; width: 100vw; overflow: hidden; 
            background: #000; color: #fff; font-family: var(--font-main);
            user-select: none; -webkit-user-select: none;
        }

        /* --- BOOT SEQUENCE --- */
        #boot-sequence {
            position: fixed; inset: 0; z-index: 20000; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .loader {
            width: 80px; height: 80px; border: 3px solid transparent;
            border-top: 3px solid var(--accent); border-radius: 50%;
            animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- DESKTOP CANVAS --- */
        #os-surface {
            position: absolute; inset: 0;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            background-size: cover; display: none;
        }

        #desktop-icons {
            position: absolute; inset: var(--top-bar-h) 0 var(--taskbar-h) 0;
            padding: 30px; display: grid; grid-template-columns: repeat(auto-fill, 110px);
            grid-template-rows: repeat(auto-fill, 120px); grid-auto-flow: column; gap: 20px;
            z-index: 5;
        }

        .icon {
            width: 100px; height: 110px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; border-radius: 12px;
            transition: 0.2s; cursor: pointer; text-align: center;
        }
        .icon:hover { background: rgba(255,255,255,0.1); transform: scale(1.05); }
        .icon-graphic { font-size: 50px; margin-bottom: 8px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5)); }
        .icon span { font-size: 0.8rem; font-weight: 600; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }

        /* --- WINDOWS --- */
        .win {
            position: absolute; background: var(--win-bg); border-radius: 16px;
            border: var(--border-light); display: flex; flex-direction: column;
            overflow: hidden; box-shadow: var(--shadow-lg);
        }
        .win-header {
            background: rgba(255,255,255,0.03); padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
            cursor: move; border-bottom: var(--border-light);
        }
        .win-ctrls { display: flex; gap: 15px; }
        .win-btn { width: 14px; height: 14px; border-radius: 50%; cursor: pointer; }
        .close { background: #ff5f56; }
        .min { background: #ffbd2e; }
        .max { background: #27c93f; }
        .win-content { flex: 1; overflow: auto; position: relative; }

        /* --- TASKBAR & START --- */
        #taskbar {
            position: fixed; bottom: 0; left: 0; right: 0; height: var(--taskbar-h);
            background: rgba(10,10,10,0.85); backdrop-filter: var(--blur);
            display: flex; align-items: center; padding: 0 20px; z-index: 10000;
            border-top: var(--border-light);
        }
        #start-btn {
            width: 50px; height: 50px; background: var(--accent);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 0 15px var(--accent-glow); font-size: 25px;
        }
        #active-tasks { flex: 1; margin-left: 20px; display: flex; gap: 10px; }
        .task-item {
            padding: 10px 20px; background: rgba(255,255,255,0.05);
            border-radius: 8px; font-size: 0.85rem; cursor: pointer; transition: 0.2s;
        }
        .task-item.active { background: rgba(0,120,212,0.2); border-bottom: 2px solid var(--accent); }

        /* --- AUTH LAYER --- */
        #auth-gate {
            position: fixed; inset: 0; z-index: 15000; background: rgba(0,0,0,0.9);
            display: none; align-items: center; justify-content: center; backdrop-filter: blur(25px);
        }
        .auth-box { width: 380px; text-align: center; }
        .auth-box input {
            width: 100%; padding: 18px; margin: 25px 0; background: #111;
            border: var(--border-light); border-radius: 12px; color: #fff; text-align: center; font-size: 1.2rem;
        }
        .auth-box button {
            width: 100%; padding: 18px; background: var(--accent); border: none;
            border-radius: 12px; color: #fff; font-weight: 800; cursor: pointer;
        }

        /* --- APP CONTENT UTILS --- */
        .iframe-container { width: 100%; height: 100%; border: none; background: #000; }
        .full-btn { position: absolute; bottom: 20px; right: 20px; padding: 10px 20px; background: #fff; color: #000; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        /* --- WIDGETS --- */
        .widget {
            position: absolute; background: rgba(255,255,255,0.03);
            backdrop-filter: blur(10px); border: var(--border-light);
            border-radius: 20px; padding: 20px; z-index: 10;
        }
    </style>
</head>
<body>

    <div id="boot-sequence">
        <h1 style="letter-spacing: 15px; margin-bottom: 30px; font-weight: 200;">MCCRACK<span style="font-weight: 900;">OS</span></h1>
        <div class="loader"></div>
        <div id="boot-status" style="margin-top: 20px; font-family: var(--font-mono); color: var(--accent); font-size: 0.8rem;">LOADING KERNEL...</div>
    </div>

    <div id="auth-gate">
        <div class="auth-box">
            <div style="font-size: 80px; margin-bottom: 10px;">🛡️</div>
            <h2>SYSTEM LOCKED</h2>
            <input type="password" id="auth-pass" placeholder="ENTER ACCESS KEY">
            <button onclick="attemptUnlock()">ACCESS SYSTEM</button>
        </div>
    </div>

    <div id="os-surface">
        <div id="desktop-icons"></div>
        
        <div class="widget" id="wd-clock" style="top: 80px; right: 40px; width: 240px;">
            <div id="wd-time" style="font-size: 2.5rem; font-weight: 200;">00:00</div>
            <div id="wd-date" style="opacity: 0.5; font-size: 0.9rem;">Date Loading...</div>
        </div>
    </div>

    <div id="taskbar">
        <div id="start-btn">💠</div>
        <div id="active-tasks"></div>
        <div id="clock-tray" style="text-align: right; font-size: 0.85rem; font-weight: bold;">
            <div id="tray-time">00:00 PM</div>
            <div id="tray-date" style="opacity: 0.5; font-size: 0.7rem;">01/01/2026</div>
        </div>
    </div>

    <script>
        /**
         * KERNEL V11.0 - CORE LOGIC
         */
        const KERNEL = {
            userPass: localStorage.getItem("mc_pass") || "1234",
            installed: JSON.parse(localStorage.getItem("mc_apps")) || ["Browser", "Terminal", "Files", "Store", "Settings", "Movies", "Games", "McCrackChat"],
            customApps: JSON.parse(localStorage.getItem("mc_custom_apps")) || {},
            active: {},
            z: 1000
        };

        const REGISTRY = {
            Browser: { icon: "🌐", content: () => buildFrame("https://siuuu.pagostepeapulco.gob.mx/") },
            Movies: { icon: "📺", content: () => buildFrame("https://mccrack.neocities.org/movies") },
            Games: { icon: "🎮", content: () => buildFrame("https://mccrack.neocities.org/games") },
            McCrackChat: { icon: "💬", content: () => buildFrame("https://patrickmango49.github.io/McCrack-Chat/") },
            Terminal: { 
                icon: "⌨️", 
                content: () => `
                    <div style="background:#000; height:100%; font-family:monospace; color:#0f0; padding:20px; display:flex; flex-direction:column;">
                        <div id="term-out" style="flex:1; overflow:auto;">McCrackOS [Version 11.0.1]<br>Authorized User: Root<br><br></div>
                        <input id="term-in" onkeydown="handleCmd(event)" style="background:transparent; border:none; color:#0f0; border-top:1px solid #222; padding:10px; outline:none;">
                    </div>`
            },
            Files: {
                icon: "📁",
                content: () => `
                    <div style="padding:30px;">
                        <h3>File System (C:)</h3><hr style="opacity:0.1; margin:15px 0;">
                        <div style="display:grid; grid-template-columns: repeat(auto-fill, 100px); gap:20px; text-align:center;">
                            <div><div style="font-size:40px;">📁</div><small>System</small></div>
                            <div><div style="font-size:40px;">📁</div><small>Users</small></div>
                            <div><div style="font-size:40px;">📄</div><small>logs.txt</small></div>
                            <div onclick="spawnApp('Settings')"><div style="font-size:40px;">🖼️</div><small>Wallpapers</small></div>
                        </div>
                    </div>`
            },
            Store: {
                icon: "🛒",
                content: () => `
                    <div style="padding:40px;">
                        <h1>Store</h1><p style="opacity:0.5;">Add new modules to your workspace.</p><br>
                        <div style="background:#111; padding:20px; border-radius:15px; display:flex; justify-content:space-between; align-items:center;">
                            <span>🛠️ App Factory</span>
                            <button onclick="installApp('AppFactory')" style="padding:10px 20px; background:var(--accent); border:none; color:#fff; border-radius:8px;">Install</button>
                        </div>
                    </div>`
            },
            AppFactory: {
                icon: "🛠️",
                content: () => `
                    <div style="padding:40px; max-width:500px; margin:auto;">
                        <h2>Module Compiler</h2><br>
                        <input id="fac-name" placeholder="App Name" style="width:100%; padding:15px; margin-bottom:10px; background:#111; border:1px solid #333; color:#fff;">
                        <input id="fac-url" placeholder="URL (https://...)" style="width:100%; padding:15px; margin-bottom:20px; background:#111; border:1px solid #333; color:#fff;">
                        <button onclick="compileCustom()" style="width:100%; padding:15px; background:var(--accent); border:none; color:#fff; font-weight:bold;">COMPILE APP</button>
                    </div>`
            },
            Settings: {
                icon: "⚙️",
                content: () => `
                    <div style="padding:40px;">
                        <h2>Control Panel</h2><br>
                        <div style="display:grid; gap:20px;">
                            <div style="background:#111; padding:20px; border-radius:12px;">
                                <h4>System Password</h4><br>
                                <input id="new-p" type="password" placeholder="New Key" style="padding:10px; background:#000; border:1px solid #333; color:#fff;">
                                <button onclick="updatePass()" style="padding:10px; background:var(--accent); border:none; color:#fff;">Update</button>
                            </div>
                        </div>
                    </div>`
            }
        };

        function buildFrame(url) {
            return `
                <div style="width:100%; height:100%;">
                    <iframe src="${url}" class="iframe-container"></iframe>
                    <button class="full-btn" onclick="window.open('${url}', '_blank')">EXTERNAL POPUP</button>
                </div>`;
        }

        /**
         * INITIALIZATION
         */
        window.onload = () => {
            // Load custom compiled apps
            Object.keys(KERNEL.customApps).forEach(name => {
                REGISTRY[name] = { icon: "🚀", content: () => buildFrame(KERNEL.customApps[name]) };
            });

            // Boot Sequence
            setTimeout(() => {
                document.getElementById('boot-status').innerText = "V9 ASSETS RESTORED...";
                setTimeout(() => {
                    document.getElementById('boot-sequence').style.display = 'none';
                    document.getElementById('auth-gate').style.display = 'flex';
                }, 1500);
            }, 2000);

            startClocks();
            renderDesktop();
        };

        function attemptUnlock() {
            if(document.getElementById('auth-pass').value === KERNEL.userPass) {
                document.getElementById('auth-gate').style.display = 'none';
                document.getElementById('os-surface').style.display = 'block';
            } else {
                alert("ACCESS DENIED");
            }
        }

        /**
         * APP MANAGEMENT
         */
        function spawnApp(id) {
            if(KERNEL.active[id]) { focusWin(id); return; }
            
            const app = REGISTRY[id];
            const win = document.createElement('div');
            win.id = `win-${id}`;
            win.className = 'win';
            win.style.width = '900px'; win.style.height = '600px';
            win.style.left = '100px'; win.style.top = '100px';
            win.style.zIndex = ++KERNEL.z;

            win.innerHTML = `
                <div class="win-header" onmousedown="dragStart(event, '${id}')">
                    <div style="display:flex; align-items:center; gap:10px;">
                        <span>${app.icon}</span> <b>${id.toUpperCase()}</b>
                    </div>
                    <div class="win-ctrls">
                        <div class="win-btn min" onclick="minApp('${id}')"></div>
                        <div class="win-btn max" onclick="maxApp('${id}')"></div>
                        <div class="win-btn close" onclick="closeApp('${id}')"></div>
                    </div>
                </div>
                <div class="win-content">${app.content()}</div>
            `;

            document.getElementById('os-surface').appendChild(win);
            KERNEL.active[id] = win;
            updateTaskbar();
        }

        function closeApp(id) {
            KERNEL.active[id].remove();
            delete KERNEL.active[id];
            updateTaskbar();
        }

        function focusWin(id) {
            KERNEL.active[id].style.display = 'flex';
            KERNEL.active[id].style.zIndex = ++KERNEL.z;
            updateTaskbar();
        }

        function minApp(id) {
            KERNEL.active[id].style.display = 'none';
            updateTaskbar();
        }

        /**
         * UI RENDERING
         */
        function renderDesktop() {
            const container = document.getElementById('desktop-icons');
            container.innerHTML = '';
            KERNEL.installed.forEach(id => {
                const app = REGISTRY[id];
                if(!app) return;
                const div = document.createElement('div');
                div.className = 'icon';
                div.innerHTML = `<div class="icon-graphic">${app.icon}</div><span>${id}</span>`;
                div.ondblclick = () => spawnApp(id);
                container.appendChild(div);
            });
        }

        function updateTaskbar() {
            const container = document.getElementById('active-tasks');
            container.innerHTML = '';
            Object.keys(KERNEL.active).forEach(id => {
                const item = document.createElement('div');
                item.className = 'task-item' + (KERNEL.active[id].style.zIndex == KERNEL.z ? ' active' : '');
                item.innerText = id;
                item.onclick = () => focusWin(id);
                container.appendChild(item);
            });
        }

        /**
         * UTILS & PERSISTENCE
         */
        function compileCustom() {
            const name = document.getElementById('fac-name').value;
            const url = document.getElementById('fac-url').value;
            if(!name || !url) return;
            
            KERNEL.customApps[name] = url;
            localStorage.setItem("mc_custom_apps", JSON.stringify(KERNEL.customApps));
            KERNEL.installed.push(name);
            localStorage.setItem("mc_apps", JSON.stringify(KERNEL.installed));
            location.reload();
        }

        function updatePass() {
            const p = document.getElementById('new-p').value;
            KERNEL.userPass = p;
            localStorage.setItem("mc_pass", p);
            alert("Password Updated.");
        }

        function startClocks() {
            setInterval(() => {
                const now = new Date();
                const t = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const d = now.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' });
                document.getElementById('wd-time').innerText = t;
                document.getElementById('tray-time').innerText = t;
                document.getElementById('wd-date').innerText = d;
                document.getElementById('tray-date').innerText = d;
            }, 1000);
        }

        function dragStart(e, id) {
            const win = KERNEL.active[id];
            focusWin(id);
            let ox = e.clientX - win.offsetLeft;
            let oy = e.clientY - win.offsetTop;
            document.onmousemove = (ev) => {
                win.style.left = (ev.clientX - ox) + 'px';
                win.style.top = (ev.clientY - oy) + 'px';
            };
            document.onmouseup = () => document.onmousemove = null;
        }

        function handleCmd(e) {
            if(e.key === 'Enter') {
                const out = document.getElementById('term-out');
                const val = e.target.value.toLowerCase();
                out.innerHTML += `<div>> ${val}</div>`;
                if(val === 'help') out.innerHTML += `<div>Commands: clear, ls, status, exit</div>`;
                else if(val === 'ls') out.innerHTML += `<div>C:/System<br>C:/Users/Admin<br>C:/Apps</div>`;
                else if(val === 'clear') out.innerHTML = '';
                else out.innerHTML += `<div style="color:red">Unknown command.</div>`;
                e.target.value = '';
                out.scrollTop = out.scrollHeight;
            }
        }
    </script>
</body>
</html>
