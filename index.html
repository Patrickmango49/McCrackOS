<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>McCrackOS V7.3</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root {
    --bg-blur: blur(15px);
    --panel-bg: rgba(15, 15, 15, 0.9);
    --accent: #0078d4;
    --win-border: 1px solid #333;
}
*{margin:0;padding:0;box-sizing:border-box;font-family: 'Segoe UI', sans-serif;}

body {
    height: 100vh;
    overflow: hidden;
    background: #000;
    background-size: cover;
    background-position: center;
    color: white;
    transition: background 0.5s ease;
}

/* Screens */
#boot { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
#login { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.85); backdrop-filter: var(--bg-blur); z-index: 9000; }
.login-box { background: #111; padding: 40px; border-radius: 12px; width: 320px; border: var(--win-border); text-align: center; }

/* Desktop */
#desktop { position: absolute; inset: 0 0 60px 0; display: none; z-index: 10; padding: 20px; }
.icon { 
    position: absolute; width: 85px; height: 95px; 
    display: flex; flex-direction: column; align-items: center; justify-content: center; 
    cursor: pointer; border-radius: 8px; 
}
.icon:hover { background: rgba(255,255,255,0.1); }
.icon div { font-size: 40px; }
.icon span { font-size: 0.8rem; margin-top: 4px; text-shadow: 0 2px 4px black; }

/* Taskbar */
#taskbar { 
    position: absolute; bottom: 0; left: 0; right: 0; height: 60px; 
    background: var(--panel-bg); backdrop-filter: var(--bg-blur);
    display: flex; align-items: center; padding: 0 20px; z-index: 8000;
    border-top: 1px solid rgba(255,255,255,0.1);
}
#task-center { display: flex; align-items: center; gap: 10px; justify-content: flex-end; flex: 1; }
.task-item { padding: 8px 15px; background: #222; border-radius: 6px; cursor: pointer; font-size: 0.85rem; border: 1px solid #444; }

/* Window */
.window { 
    position: absolute; min-width: 300px; min-height: 200px; 
    background: #0a0a0a; border-radius: 10px; border: var(--win-border); 
    display: flex; flex-direction: column; overflow: hidden; 
    box-shadow: 0 20px 50px rgba(0,0,0,0.8);
}
.window-header { background: #151515; padding: 10px 15px; display: flex; justify-content: space-between; cursor: move; }
.window-body { flex: 1; position: relative; background: #000; overflow: auto; }
.resizer { width: 15px; height: 15px; position: absolute; right: 0; bottom: 0; cursor: nwse-resize; }

/* Music Player Style */
.music-player { padding: 20px; text-align: center; }
.visualizer { display: flex; justify-content: center; align-items: flex-end; gap: 3px; height: 50px; margin: 20px 0; }
.bar { width: 4px; background: var(--accent); animation: bounce 1s ease-in-out infinite alternate; }
@keyframes bounce { from { height: 5px; } to { height: 40px; } }

/* Inputs */
input { background: #1a1a1a; color: white; border: 1px solid #333; padding: 8px; border-radius: 4px; margin-bottom: 10px; }
button { background: #333; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; margin: 2px; }
button:hover { background: #444; }
</style>
</head>
<body id="os-body">

<div id="boot">
    <h1>McCrackOS</h1>
    <div style="margin-top:20px; width:30px; height:30px; border:3px solid #333; border-top-color:#fff; border-radius:50%; animation: spin 1s linear infinite;"></div>
</div>

<div id="login">
    <div class="login-box">
        <h2>Welcome</h2><br>
        <input type="text" id="userIn" placeholder="Username" value="Admin">
        <input type="password" id="passIn" placeholder="Password">
        <button onclick="enterOS()">Sign In</button>
        <p id="err" style="color:red; font-size:12px; margin-top:10px;"></p>
    </div>
</div>

<div id="desktop"></div>

<div id="taskbar">
    <div id="task-left">
        <button onclick="alert('McCrackOS V7.3 Active')">💠</button>
    </div>
    <div id="task-center"></div>
    <div style="margin-left:15px; text-align:right; font-size:13px;">
        <div id="clock"></div>
        <div id="battery" style="opacity:0.6; font-size:10px;">🔋 --%</div>
    </div>
</div>

<script>
let state = {
    z: 100,
    pass: localStorage.getItem("mcPass") || "1234",
    bg: localStorage.getItem("mcBG") || "linear-gradient(135deg, #000, #111)",
    installed: JSON.parse(localStorage.getItem("mcApps")) || ["Notepad", "Browser", "Terminal", "Files", "Store", "Settings", "Music"],
    icons: JSON.parse(localStorage.getItem("mcIcons")) || [
        {id: 'Notepad', x: 20, y: 20}, {id: 'Browser', x: 20, y: 130}, 
        {id: 'Terminal', x: 20, y: 240}, {id: 'Files', x: 120, y: 20}, 
        {id: 'Store', x: 120, y: 130}, {id: 'Settings', x: 120, y: 240},
        {id: 'Music', x: 220, y: 20}
    ],
    running: {}
};

const Registry = {
    Notepad: { icon: "📝", content: () => `<textarea style="width:100%;height:100%;background:transparent;color:white;padding:15px;border:none;outline:none;resize:none;">${localStorage.getItem("note")||""}</textarea>` },
    Browser: { icon: "🌐", content: () => `<iframe src="https://siuuu.pagostepeapulco.gob.mx/" style="width:100%;height:100%;border:none;background:white;"></iframe>` },
    Terminal: { icon: "⌨️", content: () => `<div style="padding:15px;color:#0f0;font-family:monospace;">System Terminal Ready...<br>>_</div>` },
    Files: { icon: "📁", content: () => `<div style="padding:20px;"><h3>File Explorer</h3><hr><br><button onclick="alert('PC Files Linked')">Open C:/Drive</button></div>` },
    Store: { icon: "🛒", content: () => `<div style="padding:20px;"><h3>Store</h3><button onclick="installApp('Calculator')">Install Calc</button><button onclick="installApp('McCrackChat')">Install Chat</button></div>` },
    Settings: { icon: "⚙️", content: () => `
        <div style="padding:20px;">
            <h4>Settings</h4><br>
            <p>Wallpaper:</p>
            <input type="file" accept="image/*" onchange="uploadBG(this)">
            <button onclick="setBG('linear-gradient(135deg,#000,#111)')">Reset BG</button>
            <hr style="margin:15px 0; border-top:1px solid #333;">
            <input type="password" id="newPass" placeholder="New Password">
            <button onclick="savePass()">Set Password</button>
        </div>` },
    Music: { icon: "🎵", content: () => `
        <div class="music-player">
            <h4>McCrack Music</h4>
            <div class="visualizer">
                <div class="bar" style="animation-delay:0.1s"></div>
                <div class="bar" style="animation-delay:0.3s"></div>
                <div class="bar" style="animation-delay:0.2s"></div>
                <div class="bar" style="animation-delay:0.5s"></div>
            </div>
            <p id="track">Now Playing: Cyberpunk_Synth.mp3</p><br>
            <button onclick="alert('Playing...')">▶</button>
            <button onclick="alert('Paused')">⏸</button>
        </div>` },
    Calculator: { icon: "🧮", content: () => `<div style="padding:20px;"><input id="cIn" style="width:100%"><button onclick="calc()">=</button><h2 id="cOut"></h2></div>` },
    McCrackChat: { icon: "💬", content: () => `<iframe src="https://patrickmango49.github.io/McCrack-Chat/" style="width:100%;height:100%;border:none;"></iframe>` }
};

window.onload = () => {
    document.getElementById('os-body').style.background = state.bg;
    setTimeout(() => {
        document.getElementById('boot').style.display = 'none';
        document.getElementById('login').style.display = 'flex';
    }, 1500);
    startClock();
};

function enterOS() {
    const p = document.getElementById('passIn').value;
    if(p === state.pass) {
        document.getElementById('login').style.display = 'none';
        document.getElementById('desktop').style.display = 'block';
        renderDesktop();
    } else {
        document.getElementById('err').innerText = "Wrong Password (Hint: 1234)";
    }
}

function renderDesktop() {
    const d = document.getElementById('desktop');
    d.innerHTML = "";
    state.installed.forEach(id => {
        const appData = state.icons.find(i => i.id === id) || {id, x:220, y:20};
        const el = document.createElement('div');
        el.className = 'icon';
        el.style.left = appData.x + 'px';
        el.style.top = appData.y + 'px';
        el.innerHTML = `<div>${Registry[id].icon}</div><span>${id}</span>`;
        el.ondblclick = () => openApp(id);
        dragIcon(el, appData);
        d.appendChild(el);
    });
}

function openApp(id) {
    if(state.running[id]) { focusApp(id); return; }
    const win = document.createElement('div');
    win.className = 'window';
    win.style.width = '600px'; win.style.height = '400px';
    win.style.left = '150px'; win.style.top = '100px';
    win.style.zIndex = ++state.z;
    win.innerHTML = `
        <div class="window-header"><span>${id}</span><div onclick="closeApp('${id}')" style="cursor:pointer">×</div></div>
        <div class="window-body">${Registry[id].content()}</div>
        <div class="resizer"></div>`;
    document.body.appendChild(win);
    state.running[id] = win;
    dragWin(win);
    resizeWin(win);
    updateTaskbar();
}

function closeApp(id) {
    state.running[id].remove();
    delete state.running[id];
    updateTaskbar();
}

function focusApp(id) {
    state.running[id].style.display = 'flex';
    state.running[id].style.zIndex = ++state.z;
}

function updateTaskbar() {
    const tc = document.getElementById('task-center');
    tc.innerHTML = "";
    Object.keys(state.running).forEach(id => {
        const btn = document.createElement('div');
        btn.className = 'task-item';
        btn.innerText = id;
        btn.onclick = () => focusApp(id);
        tc.appendChild(btn);
    });
}

/** DRAG & RESIZE **/
function dragIcon(el, data) {
    el.onmousedown = (e) => {
        let ox = e.clientX - el.offsetLeft, oy = e.clientY - el.offsetTop;
        document.onmousemove = (e) => {
            el.style.left = (e.clientX - ox) + 'px'; el.style.top = (e.clientY - oy) + 'px';
            data.x = e.clientX - ox; data.y = e.clientY - oy;
        };
        document.onmouseup = () => { document.onmousemove = null; localStorage.setItem("mcIcons", JSON.stringify(state.icons)); };
    };
}

function dragWin(win) {
    win.querySelector('.window-header').onmousedown = (e) => {
        win.style.zIndex = ++state.z;
        let ox = e.clientX - win.offsetLeft, oy = e.clientY - win.offsetTop;
        document.onmousemove = (e) => { win.style.left = (e.clientX - ox) + 'px'; win.style.top = (e.clientY - oy) + 'px'; };
        document.onmouseup = () => document.onmousemove = null;
    };
}

function resizeWin(win) {
    win.querySelector('.resizer').onmousedown = (e) => {
        let sw = win.offsetWidth, sh = win.offsetHeight, sx = e.clientX, sy = e.clientY;
        document.onmousemove = (e) => { win.style.width = (sw + (e.clientX - sx)) + 'px'; win.style.height = (sh + (e.clientY - sy)) + 'px'; };
        document.onmouseup = () => document.onmousemove = null;
    };
}

/** HELPERS **/
function startClock() {
    setInterval(() => {
        let d = new Date();
        let h = d.getHours() % 12 || 12;
        let m = d.getMinutes().toString().padStart(2, '0');
        let ap = d.getHours() >= 12 ? 'PM' : 'AM';
        document.getElementById('clock').innerText = `${h}:${m} ${ap}`;
    }, 1000);
}

function uploadBG(input) {
    if(input.files[0]) {
        let r = new FileReader();
        r.onload = (e) => { 
            state.bg = `url(${e.target.result})`; 
            document.getElementById('os-body').style.background = state.bg;
            localStorage.setItem("mcBG", state.bg);
        };
        r.readAsDataURL(input.files[0]);
    }
}

function setBG(v) {
    state.bg = v;
    document.getElementById('os-body').style.background = v;
    localStorage.setItem("mcBG", v);
}

function savePass() {
    let p = document.getElementById('newPass').value;
    if(p) { state.pass = p; localStorage.setItem("mcPass", p); alert("Password Updated"); }
}

function installApp(id) {
    if(!state.installed.includes(id)) {
        state.installed.push(id);
        localStorage.setItem("mcApps", JSON.stringify(state.installed));
        renderDesktop();
    }
}
</script>
<style> @keyframes spin { to {transform: rotate(360deg);} } </style>
</body>
</html>
