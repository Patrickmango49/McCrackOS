<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MCCRACK OS V12.0 - TITAN PRESTIGE</title>
    <style>
        /* --- SYSTEM DESIGN LANGUAGE --- */
        :root {
            --accent: #0078d4;
            --accent-hover: #0086f0;
            --danger: #ff4b4b;
            --success: #44ff44;
            --panel-bg: rgba(10, 10, 10, 0.98);
            --win-bg: #050505;
            --taskbar-bg: rgba(5, 5, 5, 0.9);
            --border: 1px solid rgba(255, 255, 255, 0.12);
            --shadow-xl: 0 35px 70px rgba(0,0,0,0.9);
            --font-main: 'Segoe UI', system-ui, -apple-system, sans-serif;
            --font-code: 'Cascadia Code', 'Consolas', monospace;
            --top-h: 32px;
            --task-h: 65px;
        }

        /* --- CORE STYLES --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font-main); }
        body { 
            height: 100vh; width: 100vw; overflow: hidden; background: #000; color: #fff;
            user-select: none; -webkit-user-select: none;
        }

        /* --- BIOS & BOOT --- */
        #bios-terminal {
            position: fixed; inset: 0; background: #000; color: #0f0; 
            font-family: var(--font-code); padding: 40px; z-index: 100000;
            font-size: 13px; line-height: 1.5; overflow-y: hidden;
        }
        .bios-entry { margin-bottom: 2px; }
        .bios-entry span { color: #fff; }

        #boot-logo {
            position: fixed; inset: 0; background: #000; z-index: 99999;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .spinner {
            width: 60px; height: 60px; border: 4px solid #111;
            border-top-color: var(--accent); border-radius: 50%;
            animation: spin 0.8s linear infinite; margin-bottom: 25px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- TOP BAR --- */
        #os-top-bar {
            position: fixed; top: 0; left: 0; right: 0; height: var(--top-h);
            background: rgba(0,0,0,0.8); backdrop-filter: blur(15px);
            border-bottom: var(--border); z-index: 9500; display: flex;
            justify-content: space-between; align-items: center; padding: 0 15px;
            font-size: 0.7rem; font-weight: 800; letter-spacing: 1px;
        }

        /* --- DESKTOP --- */
        #os-desktop {
            position: absolute; inset: var(--top-h) 0 var(--task-h) 0;
            background: #111; background-size: cover; background-position: center;
            display: none; padding: 25px;
        }

        .icon-grid {
            display: grid; grid-template-columns: repeat(auto-fill, 110px);
            grid-template-rows: repeat(auto-fill, 120px); grid-auto-flow: column; gap: 20px;
        }

        .desktop-item {
            width: 100px; height: 110px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; border-radius: 12px;
            cursor: pointer; transition: 0.2s; position: relative;
        }
        .desktop-item:hover { background: rgba(255,255,255,0.08); }
        .desktop-item .graphic { font-size: 50px; margin-bottom: 8px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5)); }
        .desktop-item .label { font-size: 0.8rem; font-weight: 600; text-align: center; text-shadow: 0 2px 4px #000; }

        /* --- DELETE BIN --- */
        #delete-bin {
            position: absolute; bottom: 30px; right: 30px; width: 100px; height: 120px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 2px dashed rgba(255, 75, 75, 0.2); border-radius: 15px;
            background: rgba(255, 75, 75, 0.03); transition: 0.3s;
        }
        #delete-bin.drag-over {
            background: rgba(255, 75, 75, 0.2); border-color: var(--danger);
            transform: scale(1.1); box-shadow: 0 0 30px rgba(255,75,75,0.3);
        }

        /* --- WINDOWS --- */
        .win {
            position: absolute; background: var(--win-bg); border-radius: 16px;
            border: var(--border); box-shadow: var(--shadow-xl); overflow: hidden;
            display: flex; flex-direction: column; min-width: 300px; min-height: 200px;
        }
        .win-head {
            background: #121212; padding: 12px 20px; display: flex;
            justify-content: space-between; align-items: center; cursor: move;
        }
        .win-title { font-size: 0.8rem; font-weight: 800; letter-spacing: 0.5px; opacity: 0.8; }
        .win-btns { display: flex; gap: 10px; }
        .win-btn { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; }
        .win-close { background: #ff5f56; }
        .win-min { background: #ffbd2e; }
        .win-max { background: #27c93f; }
        .win-body { flex: 1; overflow: auto; background: #000; }

        /* --- TASKBAR & START --- */
        #os-taskbar {
            position: fixed; bottom: 0; left: 0; right: 0; height: var(--task-h);
            background: var(--taskbar-bg); backdrop-filter: blur(20px);
            border-top: var(--border); z-index: 9000; display: flex; align-items: center; padding: 0 15px;
        }
        #start-trigger {
            width: 50px; height: 50px; background: var(--accent);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-size: 24px; cursor: pointer; transition: 0.3s;
        }
        #start-trigger:hover { transform: scale(1.05); filter: brightness(1.2); }

        #task-list { flex: 1; margin: 0 20px; display: flex; gap: 10px; }
        .task-tab {
            padding: 8px 18px; background: rgba(255,255,255,0.05); border-radius: 8px;
            font-size: 0.8rem; cursor: pointer; transition: 0.2s; border: 1px solid transparent;
        }
        .task-tab.active { background: rgba(0, 120, 212, 0.2); border-color: var(--accent); }

        #start-menu {
            position: absolute; bottom: 80px; left: 15px; width: 350px; height: 500px;
            background: var(--panel-bg); backdrop-filter: blur(30px); border: var(--border);
            border-radius: 20px; display: none; flex-direction: column; padding: 25px; z-index: 9999;
        }
        .start-search {
            width: 100%; padding: 12px; background: #111; border: var(--border);
            border-radius: 10px; color: #fff; margin-bottom: 20px;
        }
        .start-app-item {
            display: flex; align-items: center; gap: 15px; padding: 12px;
            border-radius: 10px; cursor: pointer; transition: 0.2s;
        }
        .start-app-item:hover { background: rgba(255,255,255,0.1); padding-left: 20px; }

        /* --- AUTH GATE --- */
        #auth-gate {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            backdrop-filter: blur(40px); z-index: 10000; display: none;
            align-items: center; justify-content: center;
        }
        .auth-box { width: 350px; text-align: center; }
        .auth-input {
            width: 100%; padding: 18px; background: #111; border: var(--border);
            border-radius: 12px; color: #fff; margin: 20px 0; text-align: center; font-size: 1.2rem;
        }
        .auth-btn {
            width: 100%; padding: 16px; background: var(--accent); border: none;
            border-radius: 12px; color: #fff; font-weight: 900; cursor: pointer;
        }

        /* --- APP SPECIFIC UI --- */
        .explorer-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; padding: 20px; }
        .file-card { 
            background: #0a0a0a; padding: 20px; border-radius: 12px; border: 1px solid #1a1a1a;
            text-align: center; cursor: pointer; transition: 0.2s;
        }
        .file-card:hover { border-color: var(--accent); background: #111; }

        .store-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px; background: #0a0a0a; border-radius: 15px; margin-bottom: 12px;
            border: var(--border);
        }
        .btn-install { 
            padding: 8px 18px; background: var(--accent); border: none; 
            border-radius: 8px; color: #fff; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body oncontextmenu="return false">

    <div id="bios-terminal"></div>

    <div id="boot-logo">
        <div class="spinner"></div>
        <div style="letter-spacing: 12px; font-weight: 200; font-size: 1.5rem;">MCCRACK<span style="font-weight:900;">OS</span></div>
    </div>

    <div id="auth-gate">
        <div class="auth-box">
            <div style="font-size: 60px; filter: drop-shadow(0 0 10px var(--accent));">💎</div>
            <h2 style="margin-top: 15px; font-weight: 300;">ENCRYPTED SESSION</h2>
            <input type="password" id="pass-field" class="auth-input" placeholder="ACCESS KEY">
            <button class="auth-btn" onclick="Core.Auth.verify()">AUTHORIZE ACCESS</button>
            <p id="auth-err" style="color:var(--danger); font-size:0.7rem; margin-top:15px; font-weight:bold; display:none;">ACCESS DENIED: KEY MISMATCH</p>
        </div>
    </div>

    <div id="os-top-bar">
        <div id="os-ver">MCCRACK KERNEL V12.0.4 - PRESTIGE</div>
        <div style="display: flex; gap: 20px;">
            <div id="sys-clock">00:00:00</div>
            <div onclick="location.reload()" style="color:var(--danger); cursor:pointer;">TERMINATE</div>
        </div>
    </div>

    <div id="os-desktop">
        <div id="icon-canvas" class="icon-grid"></div>
        
        <div id="delete-bin" ondragover="Core.Drag.allow(event)" ondragleave="Core.Drag.leave(event)" ondrop="Core.Drag.drop(event)">
            <div style="font-size: 45px;">🗑️</div>
            <span style="font-size: 0.7rem; font-weight: 900; color: var(--danger);">PURGE BIN</span>
        </div>
    </div>

    <div id="start-menu">
        <input type="text" class="start-search" placeholder="Search modules...">
        <div id="start-list" style="flex:1; overflow-y:auto;"></div>
        <div style="border-top: var(--border); padding-top: 15px; display: flex; justify-content: space-between;">
            <div style="font-size: 0.75rem; opacity: 0.5;">Root Admin</div>
            <div onclick="location.reload()" style="cursor:pointer; font-size: 0.75rem; color: var(--danger);">Shutdown</div>
        </div>
    </div>

    <div id="os-taskbar">
        <div id="start-trigger" onclick="Core.UI.toggleStart()">💠</div>
        <div id="task-list"></div>
        <div id="tray-time" style="text-align: right; font-weight: bold; font-size: 0.9rem;">
            <div id="tray-t">12:00</div>
            <div id="tray-d" style="font-size: 0.6rem; opacity: 0.4;">OCT 24</div>
        </div>
    </div>

    <script>
        /**
         * MCCRACK OS KERNEL V12.0
         * MASSIVE ARCHITECTURE BLOCK - DO NOT TAMPER
         */

        const Core = {
            Data: {
                pass: localStorage.getItem("mc_pass") || "1234",
                bg: localStorage.getItem("mc_bg") || "radial-gradient(circle at center, #1a1a1a 0%, #000 100%)",
                installed: JSON.parse(localStorage.getItem("mc_apps")) || ["Browser", "Terminal", "Files", "Store", "Settings", "Movies", "Games", "McCrackChat"],
                customApps: JSON.parse(localStorage.getItem("mc_custom")) || {},
                running: {},
                z: 1000,
                isStartOpen: false
            },

            // --- SYSTEM INITIALIZATION ---
            Boot: {
                biosLines: [
                    "MCCRACK BIOS ROM V12.04 (C) 2026",
                    "CPU: MCCRACK OCTA-THREAD @ 5.2GHZ",
                    "MEMORY TEST: 64GB OK",
                    "STORAGE: NVME CONTROLLER ACTIVE",
                    "INIT KERNEL LOAD...",
                    "MOUNTING ROOT FILE SYSTEM...",
                    "DRIVERS: NETWORK STACK... [READY]",
                    "DRIVERS: VIRTUAL DISPLAY... [READY]",
                    "DRIVERS: PERSISTENCE ENGINE... [READY]",
                    "LOADING MCCRACK_GUI_SUBSYSTEM...",
                    "SECURITY: AUTHENTICATION MODULES... [READY]",
                    "SYSTEM READY. HANDING OVER TO SHELL."
                ],
                init: function() {
                    const term = document.getElementById('bios-terminal');
                    let i = 0;
                    // Add filler for line count
                    for(let x=0; x<120; x++) this.biosLines.splice(5, 0, `ADDR CHECK 0x${Math.random().toString(16).slice(2,8)}... OK`);

                    const flow = setInterval(() => {
                        if(i < this.biosLines.length) {
                            const d = document.createElement('div');
                            d.className = 'bios-entry';
                            d.innerHTML = `[ <span>OK</span> ] ${this.biosLines[i]}`;
                            term.appendChild(d);
                            term.scrollTop = term.scrollHeight;
                            i++;
                        } else {
                            clearInterval(flow);
                            setTimeout(() => {
                                term.style.display = 'none';
                                document.getElementById('boot-logo').style.display = 'flex';
                                setTimeout(() => {
                                    document.getElementById('boot-logo').style.display = 'none';
                                    document.getElementById('auth-gate').style.display = 'flex';
                                }, 2000);
                            }, 1000);
                        }
                    }, 10);
                }
            },

            // --- AUTHENTICATION ---
            Auth: {
                verify: function() {
                    const input = document.getElementById('pass-field');
                    if(input.value === Core.Data.pass) {
                        document.getElementById('auth-gate').style.display = 'none';
                        document.getElementById('os-desktop').style.display = 'block';
                        Core.UI.initDesktop();
                    } else {
                        const err = document.getElementById('auth-err');
                        err.style.display = 'block';
                        setTimeout(() => err.style.display = 'none', 2000);
                    }
                }
            },

            // --- USER INTERFACE MANAGER ---
            UI: {
                initDesktop: function() {
                    document.getElementById('os-desktop').style.background = Core.Data.bg;
                    this.renderIcons();
                    this.renderStart();
                    this.startClocks();
                },

                renderIcons: function() {
                    const canvas = document.getElementById('icon-canvas');
                    canvas.innerHTML = "";
                    const apps = [...Core.Data.installed, ...Object.keys(Core.Data.customApps)];
                    
                    apps.forEach(id => {
                        const app = Core.Registry[id] || { icon: "🚀", name: id };
                        const div = document.createElement('div');
                        div.className = 'desktop-item';
                        div.setAttribute("draggable", "true");
                        div.innerHTML = `<div class="graphic">${app.icon}</div><div class="label">${app.name || id}</div>`;
                        div.ondblclick = () => Core.Apps.launch(id);
                        div.ondragstart = (e) => e.dataTransfer.setData("appId", id);
                        canvas.appendChild(div);
                    });
                },

                renderStart: function() {
                    const list = document.getElementById('start-list');
                    list.innerHTML = "";
                    const apps = [...Core.Data.installed, ...Object.keys(Core.Data.customApps)];
                    
                    apps.forEach(id => {
                        const app = Core.Registry[id] || { icon: "🚀", name: id };
                        const item = document.createElement('div');
                        item.className = 'start-app-item';
                        item.innerHTML = `<span>${app.icon}</span> <b>${app.name || id}</b>`;
                        item.onclick = () => { Core.Apps.launch(id); this.toggleStart(); };
                        list.appendChild(item);
                    });
                },

                toggleStart: function() {
                    const s = document.getElementById('start-menu');
                    Core.Data.isStartOpen = !Core.Data.isStartOpen;
                    s.style.display = Core.Data.isStartOpen ? 'flex' : 'none';
                },

                startClocks: function() {
                    setInterval(() => {
                        const d = new Date();
                        document.getElementById('sys-clock').innerText = d.toLocaleTimeString();
                        document.getElementById('tray-t').innerText = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');
                        document.getElementById('tray-d').innerText = d.toLocaleDateString([], {month:'short', day:'numeric'});
                    }, 1000);
                }
            },

            // --- APP MANAGEMENT ---
            Apps: {
                launch: function(id) {
                    if(Core.Data.running[id]) { this.focus(id); return; }
                    
                    const app = Core.Registry[id] || { 
                        icon: "🚀", 
                        name: id, 
                        content: () => `<iframe src="${Core.Data.customApps[id]}" style="width:100%;height:100%;border:none;"></iframe>` 
                    };

                    const win = document.createElement('div');
                    win.id = `win-${id}`;
                    win.className = 'win';
                    win.style.width = '900px'; win.style.height = '600px';
                    win.style.left = '100px'; win.style.top = '100px';
                    win.style.zIndex = ++Core.Data.z;

                    win.innerHTML = `
                        <div class="win-head" onmousedown="Core.Apps.dragStart(event, '${id}')">
                            <div class="win-title">${app.icon} ${id.toUpperCase()}</div>
                            <div class="win-btns">
                                <div class="win-btn win-min" onclick="Core.Apps.minimize('${id}')"></div>
                                <div class="win-btn win-close" onclick="Core.Apps.close('${id}')"></div>
                            </div>
                        </div>
                        <div class="win-body">${app.content()}</div>
                    `;

                    document.body.appendChild(win);
                    Core.Data.running[id] = win;
                    this.updateTaskbar();
                    this.focus(id);
                },

                close: function(id) {
                    Core.Data.running[id].remove();
                    delete Core.Data.running[id];
                    this.updateTaskbar();
                },

                minimize: function(id) {
                    Core.Data.running[id].style.display = 'none';
                    this.updateTaskbar();
                },

                focus: function(id) {
                    Object.values(Core.Data.running).forEach(w => w.style.zIndex = Core.Data.z - 1);
                    Core.Data.running[id].style.display = 'flex';
                    Core.Data.running[id].style.zIndex = ++Core.Data.z;
                    this.updateTaskbar();
                },

                updateTaskbar: function() {
                    const list = document.getElementById('task-list');
                    list.innerHTML = "";
                    Object.keys(Core.Data.running).forEach(id => {
                        const tab = document.createElement('div');
                        tab.className = 'task-tab' + (Core.Data.running[id].style.zIndex == Core.Data.z ? ' active' : '');
                        tab.innerText = id;
                        tab.onclick = () => this.focus(id);
                        list.appendChild(tab);
                    });
                },

                dragStart: function(e, id) {
                    const win = Core.Data.running[id];
                    this.focus(id);
                    let ox = e.clientX - win.offsetLeft;
                    let oy = e.clientY - win.offsetTop;
                    const move = (ev) => {
                        win.style.left = (ev.clientX - ox) + 'px';
                        win.style.top = (ev.clientY - oy) + 'px';
                    };
                    const stop = () => {
                        document.removeEventListener('mousemove', move);
                        document.removeEventListener('mouseup', stop);
                    };
                    document.addEventListener('mousemove', move);
                    document.addEventListener('mouseup', stop);
                }
            },

            // --- REPOSITORY & STORAGE ---
            Registry: {
                Browser: { icon: "🌐", name: "Navigator", content: () => `<iframe src="https://siuuu.pagostepeapulco.gob.mx/" style="width:100%;height:100%;border:none;background:#fff;"></iframe>` },
                Movies: { icon: "📺", name: "Cinema", content: () => `<iframe src="https://mccrack.neocities.org/movies" style="width:100%;height:100%;border:none;"></iframe>` },
                Games: { icon: "🎮", name: "Arcade", content: () => `<iframe src="https://mccrack.neocities.org/games" style="width:100%;height:100%;border:none;"></iframe>` },
                McCrackChat: { icon: "💬", name: "Chat Relay", content: () => `<iframe src="https://patrickmango49.github.io/McCrack-Chat/" style="width:100%;height:100%;border:none;"></iframe>` },
                Terminal: { 
                    icon: "⌨️", 
                    name: "Console", 
                    content: () => `
                        <div style="height:100%;background:#000;color:#0f0;padding:20px;font-family:monospace;display:flex;flex-direction:column;">
                            <div id="term-log" style="flex:1;overflow:auto;">McCrack Shell V12.0<br>Type 'help' for commands.<br><br></div>
                            <div style="display:flex;"><span style="color:#888;">root@mccrack:~$</span><input id="term-input" onkeydown="Core.Registry.Terminal.handle(event)" style="background:transparent;border:none;color:#0f0;flex:1;outline:none;margin-left:10px;font-family:monospace;"></div>
                        </div>`,
                    handle: function(e) {
                        if(e.key === 'Enter') {
                            const val = e.target.value.toLowerCase();
                            const log = document.getElementById('term-log');
                            log.innerHTML += `<div>root@mccrack:~$ ${val}</div>`;
                            if(val === 'help') log.innerHTML += `<div>Available: clear, ls, status, reboot, install [app]</div>`;
                            else if(val === 'ls') log.innerHTML += `<div>C:/System<br>C:/Users<br>C:/Apps</div>`;
                            else if(val === 'clear') log.innerHTML = '';
                            else log.innerHTML += `<div>Command '${val}' not recognized.</div>`;
                            e.target.value = '';
                            log.scrollTop = log.scrollHeight;
                        }
                    }
                },
                Files: {
                    icon: "📁",
                    name: "Explorer",
                    content: () => `
                        <div style="padding:30px;">
                            <h3>Drives & Local Files</h3><hr style="opacity:0.1;margin:15px 0;">
                            <div class="explorer-grid">
                                <div class="file-card" onclick="document.getElementById('file-up').click()">📤<br><small>Upload Wallpaper</small></div>
                                <div class="file-card">💽<br><small>System (C:)</small></div>
                                <div class="file-card">📁<br><small>Documents</small></div>
                            </div>
                            <input type="file" id="file-up" style="display:none" onchange="Core.Storage.handleUpload(event)">
                        </div>`
                },
                Store: {
                    icon: "🛒",
                    name: "App Center",
                    content: () => `
                        <div style="padding:30px;">
                            <h2>Marketplace</h2><p style="opacity:0.5;">Manage your core modules.</p><br>
                            <div id="store-list-render">
                                ${Core.Registry.Store.renderItems()}
                            </div>
                        </div>`,
                    renderItems: function() {
                        const apps = ["Calculator", "Notepad", "AppFactory", "Music", "SystemLogs"];
                        return apps.map(id => `
                            <div class="store-item">
                                <div><b>${id}</b><br><small style="opacity:0.4;">Official System Module</small></div>
                                <button class="btn-install" onclick="Core.Storage.install('${id}')">${Core.Data.installed.includes(id) ? 'Installed' : 'Deploy'}</button>
                            </div>
                        `).join('');
                    }
                },
                AppFactory: {
                    icon: "🛠️",
                    name: "Compiler",
                    content: () => `
                        <div style="padding:40px;max-width:500px;margin:auto;">
                            <h2>Module Compiler</h2><br>
                            <input id="fac-n" placeholder="App Name" style="width:100%;padding:15px;margin-bottom:10px;background:#111;border:var(--border);color:#fff;border-radius:10px;">
                            <input id="fac-u" placeholder="Target URL (https://...)" style="width:100%;padding:15px;margin-bottom:20px;background:#111;border:var(--border);color:#fff;border-radius:10px;">
                            <button onclick="Core.Storage.compile()" style="width:100%;padding:18px;background:var(--accent);border:none;color:#fff;font-weight:bold;border-radius:10px;">COMPILE TO DESKTOP</button>
                        </div>`
                },
                Settings: {
                    icon: "⚙️",
                    name: "Registry",
                    content: () => `
                        <div style="padding:30px;">
                            <h2>System Registry</h2><br>
                            <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
                                <div style="background:#0a0a0a;padding:20px;border-radius:15px;border:var(--border);">
                                    <h4>Decryption Key</h4><br>
                                    <input id="set-p" type="password" placeholder="New Key" style="width:100%;padding:10px;background:#111;border:var(--border);color:#fff;border-radius:8px;">
                                    <button onclick="Core.Storage.setPass()" style="width:100%;margin-top:10px;padding:10px;background:var(--accent);border:none;color:#fff;border-radius:8px;">Update Key</button>
                                </div>
                                <div style="background:#0a0a0a;padding:20px;border-radius:15px;border:var(--border);">
                                    <h4>Wallpaper URL</h4><br>
                                    <input id="set-b" placeholder="https://..." style="width:100%;padding:10px;background:#111;border:var(--border);color:#fff;border-radius:8px;">
                                    <button onclick="Core.Storage.setBGUrl()" style="width:100%;margin-top:10px;padding:10px;background:#333;border:none;color:#fff;border-radius:8px;">Apply URL</button>
                                </div>
                            </div>
                        </div>`
                },
                Calculator: { icon: "🧮", name: "Math", content: () => `<div style="padding:40px;text-align:center;"><h2>Calculator</h2><p>Module ready.</p></div>` },
                Notepad: { icon: "📝", name: "Notes", content: () => `<textarea style="width:100%;height:100%;background:transparent;color:#fff;padding:30px;border:none;outline:none;font-size:1.1rem;resize:none;">${localStorage.getItem('mc_note')||''}</textarea>` }
            },

            // --- PERSISTENT STORAGE ENGINE ---
            Storage: {
                install: function(id) {
                    if(!Core.Data.installed.includes(id)) {
                        Core.Data.installed.push(id);
                        localStorage.setItem("mc_apps", JSON.stringify(Core.Data.installed));
                        Core.UI.renderIcons();
                        Core.UI.renderStart();
                        alert(`${id} installed.`);
                        if(Core.Data.running['Store']) Core.Data.running['Store'].querySelector('.win-body').innerHTML = Core.Registry.Store.content();
                    }
                },
                compile: function() {
                    const n = document.getElementById('fac-n').value;
                    const u = document.getElementById('fac-u').value;
                    if(n && u) {
                        Core.Data.customApps[n] = u;
                        localStorage.setItem("mc_custom", JSON.stringify(Core.Data.customApps));
                        Core.UI.renderIcons();
                        Core.UI.renderStart();
                        alert("App Compiled Successfully.");
                    }
                },
                handleUpload: function(e) {
                    const file = e.target.files[0];
                    if(file) {
                        const reader = new FileReader();
                        reader.onload = (ev) => {
                            const url = ev.target.result;
                            document.getElementById('os-desktop').style.background = `url(${url}) center/cover no-repeat`;
                            localStorage.setItem("mc_bg", `url(${url}) center/cover no-repeat`);
                        };
                        reader.readAsDataURL(file);
                    }
                },
                setPass: function() {
                    const p = document.getElementById('set-p').value;
                    if(p) { Core.Data.pass = p; localStorage.setItem("mc_pass", p); alert("Key Updated."); }
                },
                setBGUrl: function() {
                    const b = document.getElementById('set-b').value;
                    if(b) { 
                        const url = `url('${b}') center/cover no-repeat`;
                        document.getElementById('os-desktop').style.background = url;
                        localStorage.setItem("mc_bg", url);
                    }
                }
            },

            // --- DRAG AND DROP ENGINE ---
            Drag: {
                allow: (e) => { e.preventDefault(); document.getElementById('delete-bin').classList.add('drag-over'); },
                leave: () => { document.getElementById('delete-bin').classList.remove('drag-over'); },
                drop: (e) => {
                    e.preventDefault();
                    document.getElementById('delete-bin').classList.remove('drag-over');
                    const id = e.dataTransfer.getData("appId");
                    
                    if(["Browser", "Store", "Files", "Terminal", "Settings"].includes(id)) {
                        alert("CRITICAL ERROR: Protected System Module cannot be purged.");
                        return;
                    }

                    if(confirm(`Are you sure you want to purge ${id}?`)) {
                        if(Core.Data.running[id]) Core.Apps.close(id);
                        Core.Data.installed = Core.Data.installed.filter(a => a !== id);
                        delete Core.Data.customApps[id];
                        localStorage.setItem("mc_apps", JSON.stringify(Core.Data.installed));
                        localStorage.setItem("mc_custom", JSON.stringify(Core.Data.customApps));
                        Core.UI.renderIcons();
                        Core.UI.renderStart();
                    }
                }
            }
        };

        // --- GLOBAL BOOT TRIGGER ---
        Core.Boot.init();
    </script>
</body>
</html>
