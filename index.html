<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>McCrackOS v4</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}

body{
    height:100vh;
    overflow:hidden;
    background:#000;
    color:white;
}

/* Boot */
#boot{
    position:fixed;
    inset:0;
    background:#000;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    font-size:2.5rem;
}
.loader{
    margin-top:20px;
    width:40px;
    height:40px;
    border:4px solid #222;
    border-top:4px solid white;
    border-radius:50%;
    animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* Login */
#login{
    position:fixed;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    background:rgba(0,0,0,.9);
}
.login-box{
    background:#111;
    padding:40px;
    border-radius:15px;
    display:flex;
    flex-direction:column;
    gap:15px;
    width:300px;
}
.login-box input{
    padding:10px;
    border:none;
    border-radius:8px;
    background:#222;
    color:white;
}
.login-box button{
    padding:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

/* Topbar */
#topbar{
    position:absolute;
    top:0;
    left:0;
    right:0;
    height:40px;
    background:#111;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px;
    font-size:.9rem;
}

/* Desktop */
#desktop{
    position:absolute;
    inset:40px 0 0 0;
    display:none;
}
#icons{
    display:grid;
    grid-template-columns:repeat(auto-fill,80px);
    gap:30px;
    padding:30px;
}
.icon{
    text-align:center;
    cursor:pointer;
}
.icon div{font-size:36px;}

/* Window */
.window{
    position:absolute;
    width:500px;
    height:350px;
    background:#111;
    border-radius:12px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
}
.window-header{
    background:#1a1a1a;
    padding:8px 10px;
    display:flex;
    justify-content:space-between;
    cursor:move;
}
.window-body{
    flex:1;
    padding:10px;
    overflow:auto;
    background:#000;
}
.window button{
    background:#222;
    color:white;
    border:none;
    padding:5px 8px;
    border-radius:5px;
    cursor:pointer;
}
</style>
</head>
<body>

<div id="boot">
    McCrackOS
    <div class="loader"></div>
</div>

<div id="login">
    <div class="login-box">
        <input id="username" placeholder="Username">
        <input type="password" placeholder="Password (optional)">
        <button onclick="enterOS()">Login</button>
    </div>
</div>

<div id="topbar">
    <div>McCrackOS</div>
    <div>
        <span id="userDisplay"></span> |
        <span style="cursor:pointer;" onclick="lockOS()">Lock</span>
    </div>
</div>

<div id="desktop">
    <div id="icons"></div>
</div>

<script>
let zIndexCounter = 1;
let installedApps = JSON.parse(localStorage.getItem("mcApps")) || ["Notepad","Browser","Terminal","Files","Store"];

const appRegistry = {

Notepad: {
    icon:"📝",
    open: function(){
        createWindow("Notepad",`
            <textarea style="width:100%;height:100%;background:#000;color:white;border:none;outline:none;"
            oninput="localStorage.setItem('mcNote',this.value)">
            ${localStorage.getItem("mcNote")||""}
            </textarea>
        `);
    }
},

Browser:{
    icon:"🌐",
    open:function(){
        createWindow("Browser",`
            <input placeholder="https://example.com"
            style="width:100%;padding:5px;background:#111;color:white;border:none;"
            onkeydown="if(event.key==='Enter'){this.nextElementSibling.src=this.value}">
            <iframe style="width:100%;height:90%;border:none;"></iframe>
        `);
    }
},

Terminal:{
    icon:"⌨️",
    open:function(){
        createWindow("Terminal",`
            <div id="termOut"></div>
            <input style="width:100%;background:#000;color:lime;border:none;padding:5px;"
            onkeydown="if(event.key==='Enter'){runCommand(this)}"
            placeholder="help">
        `);
    }
},

Files:{
    icon:"📁",
    open:function(){
        createWindow("Files",`
            <div>Documents</div>
            <div>Downloads</div>
            <div>Pictures</div>
        `);
    }
},

Store:{
    icon:"🛒",
    open:function(){
        createWindow("App Store",`
            <button onclick="installApp('Calculator')">Install Calculator</button>
        `);
    }
},

Calculator:{
    icon:"🧮",
    open:function(){
        createWindow("Calculator",`
            <input id="calcInput" style="width:100%;padding:5px;background:#111;color:white;border:none;">
            <button onclick="calculate()">=</button>
            <div id="calcResult"></div>
        `);
    }
}

};

function installApp(name){
    if(!installedApps.includes(name)){
        installedApps.push(name);
        localStorage.setItem("mcApps",JSON.stringify(installedApps));
        renderDesktop();
    }
}

function renderDesktop(){
    icons.innerHTML="";
    installedApps.forEach(app=>{
        let iconDiv=document.createElement("div");
        iconDiv.className="icon";
        iconDiv.innerHTML=`<div>${appRegistry[app].icon}</div>${app}`;
        iconDiv.ondblclick=appRegistry[app].open;
        icons.appendChild(iconDiv);
    });
}

function createWindow(title,content){
    let win=document.createElement("div");
    win.className="window";
    win.style.top=Math.random()*200+80+"px";
    win.style.left=Math.random()*200+100+"px";
    win.style.zIndex=zIndexCounter++;
    win.innerHTML=`
        <div class="window-header">
            <span>${title}</span>
            <span style="cursor:pointer;" onclick="this.closest('.window').remove()">✖</span>
        </div>
        <div class="window-body">${content}</div>
    `;
    document.body.appendChild(win);
    makeDraggable(win);
    win.onclick=()=>win.style.zIndex=zIndexCounter++;
}

function makeDraggable(win){
    const header=win.querySelector(".window-header");
    header.onmousedown=function(e){
        let offsetX=e.clientX-win.offsetLeft;
        let offsetY=e.clientY-win.offsetTop;
        document.onmousemove=function(e){
            win.style.left=e.clientX-offsetX+"px";
            win.style.top=e.clientY-offsetY+"px";
        }
        document.onmouseup=function(){
            document.onmousemove=null;
        }
    }
}

function runCommand(input){
    const out=input.previousElementSibling;
    const cmd=input.value.trim();
    if(cmd==="help") out.innerHTML+="<div>help, about, user, clear</div>";
    else if(cmd==="about") out.innerHTML+="<div>McCrackOS v4 Functional Build</div>";
    else if(cmd==="user") out.innerHTML+="<div>"+localStorage.getItem("mcUser")+"</div>";
    else if(cmd==="clear") out.innerHTML="";
    else out.innerHTML+="<div>Unknown command</div>";
    input.value="";
}

function calculate(){
    try{
        calcResult.innerText=eval(calcInput.value);
    }catch{
        calcResult.innerText="Error";
    }
}

function enterOS(){
    let name=username.value||"User";
    localStorage.setItem("mcUser",name);
    userDisplay.innerText=name;
    login.style.display="none";
    desktop.style.display="block";
    renderDesktop();
}

function lockOS(){
    desktop.style.display="none";
    login.style.display="flex";
}

setTimeout(()=>{
    boot.style.display="none";
    login.style.display="flex";
},2000);
</script>

</body>
</html>
