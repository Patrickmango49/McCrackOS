<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>McCrackOS V7 - Pro Edition</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root {
    --bg-blur: blur(12px);
    --panel-bg: rgba(20, 20, 20, 0.8);
    --accent: #0078d4;
}
*{margin:0;padding:0;box-sizing:border-box;font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;}

body {
    height: 100vh;
    overflow: hidden;
    background: linear-gradient(135deg, #0f0f0f, #222);
    background-size: cover;
    background-position: center;
    color: white;
    transition: background 0.5s ease;
}

/* --- Boot & Login --- */
#boot { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 2.5rem; z-index: 2000; transition: opacity 0.5s; }
.loader { margin-top: 20px; width: 40px; height: 40px; border: 4px solid #333; border-top: 4px solid #fff; border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

#login { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.8); backdrop-filter: var(--bg-blur); z-index: 1500; }
.login-box { background: var(--panel-bg); padding: 40px; border-radius: 15px; display: flex; flex-direction: column; gap: 15px; width: 320px; border: 1px solid #444; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
.login-box h2 { text-align: center; margin-bottom: 10px; }
.login-box input { padding: 12px; background: #111; border: 1px solid #333; border-radius: 6px; color: white; outline: none; }
.login-box button { padding: 12px; border: none; border-radius: 6px; cursor: pointer; background: var(--accent); color: white; font-weight: bold; }

/* --- Desktop --- */
#desktop { position: absolute; inset: 0 0 60px 0; display: none; padding: 20px; }
.icon { 
    position: absolute; width: 90px; height: 100px; 
    display: flex; flex-direction: column; align-items: center; justify-content: center; 
    cursor: pointer; text-shadow: 0 2px 4px rgba(0,0,0,0.8); text-align: center;
    border-radius: 8px; transition: background 0.2s;
}
.icon:hover { background: rgba(255,255,255,0.1); }
.icon div { font-size: 40px; margin-bottom: 5px; pointer-events: none; }
.icon span { font-size: 0.85rem; pointer-events: none; }
.pin-btn { position: absolute; top: 5px; right: 5px; font-size: 10px; opacity: 0; transition: 0.2s; background: #444; padding: 2px 4px; border-radius: 3px; }
.icon:hover .pin-btn { opacity: 1; }

/* --- Taskbar --- */
#taskbar { 
    position: absolute; bottom: 0; left: 0; right: 0; height: 60px; 
    background: var(--panel-bg); backdrop-filter: var(--bg-blur);
    display: flex; align-items: center; padding: 0 15px; z-index: 1000;
    border-top: 1px solid rgba(255,255,255,0.1);
}
#task-left { display: flex; align-items: center; gap: 10px; flex: 1; } /* For Start Menu / Pinned icons */
#task-center { display: flex; align-items: center; gap: 8px; justify-content: flex-end; flex: 2; } /* Open Apps move here (Right side) */

.task-item { 
    padding: 8px 12px; background: rgba(255,255,255,0.05); border-radius: 4px; 
    cursor: pointer; border: 1px solid rgba(255,255,255,0.1); font-size: 0.8rem;
    display: flex; align-items: center; gap: 6px; transition: 0.2s;
}
.task-item:hover { background: rgba(255,255,255,0.15); }
.task-item.active { border-bottom: 2px solid var(--accent); background: rgba(255,255,255,0.1); }

/* --- Widgets --- */
#widgets { display: flex; align-items: center; gap: 15px; margin-left: 15px; padding-left: 15px; border-left: 1px solid #444; }
.widget-clock { font-size: 0.85rem; text-align: right; line-height: 1.2; }

/* --- Windows --- */
.window { 
    position: absolute; min-width: 300px; min-height: 200px; 
    background: #111; border-radius: 10px; border: 1px solid #333; 
    display: flex; flex-direction: column; overflow: hidden; 
    box-shadow: 0 15px 40px rgba(0,0,0,0.7);
}
.window-header { background: #1a1a1a; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; cursor: move; user-select: none; }
.window-title { font-size: 0.9rem; font-weight: 500; }
.window-controls span { margin-left: 15px; cursor: pointer; opacity: 0.7; transition: 0.2s; }
.window-controls span:hover { opacity: 1; }
.window-body { flex: 1; overflow: auto; background: #000; position: relative; }
.resizer { width: 15px; height: 15px; background: transparent; position: absolute; right: 0; bottom: 0; cursor: nwse-resize; z-index: 10; }

/* --- Settings App CSS --- */
.settings-page { padding: 20px; }
.setting-group { margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 15px; }
.setting-group h4 { margin-bottom: 10px; color: var(--accent); }
input[type="color"] { border: none; width: 50px; height: 30px; cursor: pointer; background: none; }
</style>
</head>
<body>

<div id="boot">McCrackOS V7<div class="loader"></div></div>

<div id="login">
    <div class="login-box">
        <h2>McCrackOS</h2>
        <input type="text" id="login-user" placeholder="Username">
        <input type="password" id="login-pass" placeholder="Password">
        <button onclick="attemptLogin()">Sign In</button>
        <p id="login-msg" style="color:#ff5f5f; font-size: 0.8rem; text-align: center;"></p>
    </div>
</div>

<div id="desktop"></div>

<div id="taskbar">
    <div id="task-left">
        <div class="task-item" style="background:var(--accent)" onclick="toggleStart()">💠</div>
        <div id="pinned-apps" style="display: flex; gap: 5px;"></div>
    </div>
    <div id="task-center"></div>
    <div id="widgets">
        <div class="widget-clock">
            <div id="time-val"></div>
            <div id="date-val" style="font-size: 0.7rem; opacity: 0.6;"></div>
        </div>
        <div id="battery-val" style="font-size: 0.8rem;">🔋 --%</div>
    </div>
</div>

<script>
/** STATE MANAGEMENT **/
let state = {
    z: 100,
    user: localStorage.getItem("os_user") || "Admin",
    pass: localStorage.getItem("os_pass") || "admin",
    bg: localStorage.getItem("os_bg") || "linear-gradient(135deg, #0f0f0f, #222)",
    pinned: JSON.parse(localStorage.getItem("os_pinned")) || ["Browser", "Settings"],
    icons: JSON.parse(localStorage.getItem("os_icons")) || [
        {id: 'Notepad', x: 20, y: 20},
        {id: 'Browser', x: 20, y: 140},
        {id: 'Terminal', x: 20, y: 260},
        {id: 'Files', x: 20, y: 380},
        {id: 'Store', x: 130, y: 20},
        {id: 'Settings', x: 130, y: 140}
    ],
    running: {}
};

const Registry = {
    Notepad: { icon: "📝", content: () => `<textarea style="width:100%;height:100%;background:transparent;color:white;padding:15px;border:none;outline:none;resize:none;">Welcome to Notepad v7</textarea>` },
    Browser: { icon: "🌐", content: () => `<iframe src="https://www.bing.com" style="width:100%;height:100%;border:none;background:white;"></iframe>` },
    Terminal: { icon: "⌨️", content: () => `<div style="padding:15px;color:#0f0;font-family:monospace;">McCrack Kernel v7.0.1...<br>Ready._</div>` },
    Files: { icon: "📁", content: () => `<div style="padding:20px;"><h3>File Explorer</h3><hr><br><button onclick="triggerSystemFile()" style="padding:8px;background:#333;color:white;border:none;cursor:pointer;">📂 Open Local PC Files</button></div>` },
    Store: { icon: "🛒", content: () => `<div style="padding:20px;"><h3>App Store</h3><p>Coming soon...</p></div>` },
    Settings: { icon: "⚙️", content: () => `
        <div class="settings-page">
            <div class="setting-group">
                <h4>Personalization</h4>
                <p>Background Color:</p>
                <input type="color" onchange="updateBG(this.value)">
                <button onclick="updateBG('linear-gradient(135deg, #434343 0%, black 100%)')" style="margin-left:10px;">Reset Gradient</button>
            </div>
            <div class="setting-group">
                <h4>Security</h4>
                <p>Change Password:</p>
                <input type="password" id="new-pass" placeholder="New Password" style="margin-top:5px;"><br>
                <button onclick="saveNewPass()" style="margin-top:10px; background:var(--accent); color:white; border:none; padding:5px 10px; cursor:pointer;">Save Password</button>
            </div>
            <div class="setting-group">
                <h4>System</h4>
                <p>User: ${state.user}</p>
                <button onclick="location.reload()" style="margin-top:10px; background:#cc0000; color:white; border:none; padding:5px 10px; cursor:pointer;">Hard Reboot</button>
            </div>
        </div>` 
    }
};

/** INITIALIZATION **/
window.onload = () => {
    applyState();
    setTimeout(() => {
        document.getElementById('boot').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('boot').style.display = 'none';
            document.getElementById('login').style.display = 'flex';
        }, 500);
    }, 2000);
    startClock();
    initBattery();
};

function applyState() {
    document.body.style.background = state.bg;
    renderDesktop();
    renderPinned();
}

/** LOGIN **/
function attemptLogin() {
    const u = document.getElementById('login-user').value;
    const p = document.getElementById('login-pass').value;
    if(u === state.user && p === state.pass) {
        document.getElementById('login').style.fadeOut;
        document.getElementById('login').style.display = 'none';
        document.getElementById('desktop').style.display = 'block';
    } else {
        document.getElementById('login-msg').innerText = "Invalid credentials. Hint: admin/admin";
    }
}

/** DESKTOP & ICONS **/
function renderDesktop() {
    const d = document.getElementById('desktop');
    d.innerHTML = "";
    state.icons.forEach(app => {
        const icon = document.createElement('div');
        icon.className = 'icon';
        icon.style.left = app.x + 'px';
        icon.style.top = app.y + 'px';
        icon.innerHTML = `
            <div class="pin-btn" onclick="togglePin('${app.id}', event)">${state.pinned.includes(app.id) ? '📍' : '📌'}</div>
            <div>${Registry[app.id].icon}</div>
            <span>${app.id}</span>
        `;
        icon.ondblclick = () => openApp(app.id);
        makeDraggableIcon(icon, app);
        d.appendChild(icon);
    });
}

function makeDraggableIcon(el, appData) {
    let ox, oy;
    el.onmousedown = (e) => {
        ox = e.clientX - el.offsetLeft;
        oy = e.clientY - el.offsetTop;
        document.onmousemove = (e) => {
            let nx = e.clientX - ox;
            let ny = e.clientY - oy;
            el.style.left = nx + 'px';
            el.style.top = ny + 'px';
            appData.x = nx;
            appData.y = ny;
        };
        document.onmouseup = () => {
            document.onmousemove = null;
            localStorage.setItem("os_icons", JSON.stringify(state.icons));
        };
    };
}

/** WINDOW MANAGEMENT **/
function openApp(id) {
    if (state.running[id]) {
        focusWindow(id);
        return;
    }
    const win = document.createElement('div');
    win.className = 'window';
    win.id = `win-${id}`;
    win.style.width = '600px';
    win.style.height = '400px';
    win.style.left = '200px';
    win.style.top = '100px';
    win.style.zIndex = ++state.z;
    
    win.innerHTML = `
        <div class="window-header">
            <div class="window-title">${Registry[id].icon} ${id}</div>
            <div class="window-controls">
                <span onclick="minimizeApp('${id}')">_</span>
                <span onclick="closeApp('${id}')">×</span>
            </div>
        </div>
        <div class="window-body">${Registry[id].content()}</div>
        <div class="resizer"></div>
    `;
    
    document.body.appendChild(win);
    state.running[id] = win;
    makeDraggableWin(win);
    makeResizableWin(win);
    updateTaskbar();
}

function makeDraggableWin(win) {
    const header = win.querySelector('.window-header');
    header.onmousedown = (e) => {
        state.z++;
        win.style.zIndex = state.z;
        let ox = e.clientX - win.offsetLeft;
        let oy = e.clientY - win.offsetTop;
        document.onmousemove = (e) => {
            win.style.left = (e.clientX - ox) + 'px';
            win.style.top = (e.clientY - oy) + 'px';
        };
        document.onmouseup = () => document.onmousemove = null;
    };
}

function makeResizableWin(win) {
    const resizer = win.querySelector('.resizer');
    resizer.onmousedown = (e) => {
        e.preventDefault();
        let sx = e.clientX;
        let sy = e.clientY;
        let sw = win.offsetWidth;
        let sh = win.offsetHeight;
        document.onmousemove = (e) => {
            win.style.width = (sw + (e.clientX - sx)) + 'px';
            win.style.height = (sh + (e.clientY - sy)) + 'px';
        };
        document.onmouseup = () => document.onmousemove = null;
    };
}

/** TASKBAR LOGIC **/
function updateTaskbar() {
    const container = document.getElementById('task-center');
    container.innerHTML = "";
    Object.keys(state.running).forEach(id => {
        const item = document.createElement('div');
        item.className = 'task-item';
        item.innerHTML = `${Registry[id].icon} ${id}`;
        item.onclick = () => focusWindow(id);
        container.appendChild(item);
    });
}

function renderPinned() {
    const p = document.getElementById('pinned-apps');
    p.innerHTML = "";
    state.pinned.forEach(id => {
        const item = document.createElement('div');
        item.className = 'task-item';
        item.style.background = "transparent";
        item.innerHTML = Registry[id].icon;
        item.title = id;
        item.onclick = () => openApp(id);
        p.appendChild(item);
    });
}

function togglePin(id, e) {
    e.stopPropagation();
    if(state.pinned.includes(id)) {
        state.pinned = state.pinned.filter(p => p !== id);
    } else {
        state.pinned.push(id);
    }
    localStorage.setItem("os_pinned", JSON.stringify(state.pinned));
    renderDesktop();
    renderPinned();
}

/** SYSTEM FUNCTIONS **/
function updateBG(val) {
    state.bg = val;
    document.body.style.background = val;
    localStorage.setItem("os_bg", val);
}

function saveNewPass() {
    const p = document.getElementById('new-pass').value;
    if(p) {
        state.pass = p;
        localStorage.setItem("os_pass", p);
        alert("Password updated!");
    }
}

function triggerSystemFile() {
    const input = document.createElement('input');
    input.type = 'file';
    input.onchange = e => {
        alert("System File Selected: " + e.target.files[0].name);
    };
    input.click();
}

function startClock() {
    setInterval(() => {
        const now = new Date();
        // 12-hour clock
        let h = now.getHours();
        let m = now.getMinutes();
        let ampm = h >= 12 ? 'PM' : 'AM';
        h = h % 12;
        h = h ? h : 12; 
        document.getElementById('time-val').innerText = `${h}:${m < 10 ? '0'+m : m} ${ampm}`;
        document.getElementById('date-val').innerText = now.toLocaleDateString();
    }, 1000);
}

function initBattery() {
    if(navigator.getBattery) {
        navigator.getBattery().then(bat => {
            const update = () => { document.getElementById('battery-val').innerText = `🔋 ${Math.round(bat.level * 100)}%`; };
            update();
            bat.onlevelchange = update;
        });
    }
}

function focusWindow(id) {
    state.z++;
    state.running[id].style.display = 'flex';
    state.running[id].style.zIndex = state.z;
}

function closeApp(id) {
    state.running[id].remove();
    delete state.running[id];
    updateTaskbar();
}

function minimizeApp(id) {
    state.running[id].style.display = 'none';
}

function toggleStart() {
    alert("McCrackOS V7 - Build 2026.1\nAdmin: " + state.user);
}
</script>
</body>
</html>
