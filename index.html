<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>McCrackOS V9.5 - Pro Edition</title>
    <style>
        /* --- CORE SYSTEM VARIABLES --- */
        :root {
            --accent: #0078d4;
            --top-bar-h: 32px;
            --taskbar-h: 65px;
            --panel: rgba(10, 10, 10, 0.98);
            --win-bg: #050505;
            --border: 1px solid rgba(255, 255, 255, 0.12);
            --shadow: 0 30px 60px rgba(0,0,0,0.95);
            --blur: blur(35px);
            --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
            --danger: #ff4b4b;
        }

        /* --- GLOBAL RESET --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font); -webkit-user-select: none; user-select: none; }
        body { 
            height: 100vh; width: 100vw; overflow: hidden; 
            background: #000; color: white; transition: background 0.6s ease;
        }

        /* --- TOP BAR --- */
        #top-bar {
            position: fixed; top: 0; left: 0; right: 0; height: var(--top-bar-h);
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(15px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 18px; z-index: 9500; border-bottom: var(--border);
            font-size: 0.75rem; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase;
        }
        .top-right { display: flex; align-items: center; gap: 20px; }
        #lock-btn { cursor: pointer; color: #aaa; transition: 0.3s; }
        #lock-btn:hover { color: #ff4b4b; text-shadow: 0 0 10px rgba(255,75,75,0.5); }

        /* --- BOOT & LOCK ANIMATION --- */
        #boot, #lock-screen-anim { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; }
        #lock-screen-anim { display: none; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); z-index: 11000; }
        .spin { width: 60px; height: 60px; border: 4px solid #111; border-top-color: var(--accent); border-radius: 50%; animation: s 0.8s linear infinite; margin-bottom: 25px; }
        @keyframes s { to { transform: rotate(360deg); } }
        .boot-text { font-family: monospace; font-size: 0.8rem; color: var(--accent); opacity: 0.8; }

        /* --- AUTHENTICATION --- */
        #login { 
            position: fixed; inset: 0; display: none; background: rgba(0,0,0,0.8); 
            backdrop-filter: var(--blur); z-index: 9000; align-items: center; justify-content: center; 
        }
        .login-box { 
            background: var(--panel); padding: 70px; border-radius: 30px; border: var(--border); 
            width: 420px; text-align: center; box-shadow: var(--shadow); 
        }
        .login-box input { 
            width: 100%; padding: 16px; margin: 25px 0; background: #111; border: var(--border); 
            border-radius: 12px; color: white; text-align: center; outline: none; font-size: 1.1rem;
        }
        .login-box button { 
            width: 100%; padding: 16px; background: var(--accent); color: white; border: none; 
            border-radius: 12px; cursor: pointer; font-weight: 800;
        }

        /* --- DESKTOP & WIDGETS --- */
        #desktop { position: absolute; inset: var(--top-bar-h) 0 var(--taskbar-h) 0; display: none; z-index: 100; overflow: hidden; }
        
        .widget {
            position: absolute; background: rgba(20, 20, 20, 0.4); backdrop-filter: blur(10px);
            border: var(--border); border-radius: 15px; padding: 15px; cursor: grab;
            transition: box-shadow 0.3s; z-index: 50;
        }
        .widget:active { cursor: grabbing; box-shadow: 0 0 20px rgba(255,255,255,0.1); }
        .widget-title { font-size: 0.65rem; font-weight: 800; color: var(--accent); margin-bottom: 8px; text-transform: uppercase; }

        .icon { 
            position: absolute; width: 100px; height: 100px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; border-radius: 12px; cursor: pointer;
        }
        .icon:hover { background: rgba(255,255,255,0.05); }
        .icon div { font-size: 40px; pointer-events: none; }
        .icon span { font-size: 0.75rem; margin-top: 5px; text-align: center; pointer-events: none; }

        /* --- CONTEXT MENU --- */
        #ctx-menu {
            position: fixed; width: 200px; background: var(--panel); border: var(--border);
            border-radius: 10px; box-shadow: var(--shadow); display: none; z-index: 12000; padding: 5px;
        }
        .ctx-item {
            padding: 10px 15px; font-size: 0.85rem; border-radius: 6px; cursor: pointer;
            display: flex; justify-content: space-between;
        }
        .ctx-item:hover { background: var(--accent); }
        .ctx-sep { height: 1px; background: rgba(255,255,255,0.1); margin: 5px 0; }

        /* --- WINDOWS --- */
        .window { 
            position: absolute; background: var(--win-bg); border-radius: 12px; border: var(--border); 
            display: flex; flex-direction: column; overflow: hidden; box-shadow: var(--shadow); 
        }
        .win-head { background: #121212; padding: 12px 20px; display: flex; justify-content: space-between; cursor: move; }
        .win-body { flex: 1; position: relative; overflow: auto; }
        .win-ctrls span { cursor: pointer; margin-left: 15px; font-size: 0.9rem; }

        /* --- TASKBAR --- */
        #taskbar { 
            position: fixed; bottom: 0; left: 0; right: 0; height: var(--taskbar-h); 
            background: rgba(5, 5, 5, 0.9); backdrop-filter: blur(25px); 
            display: flex; align-items: center; padding: 0 20px; z-index: 8500; border-top: var(--border); 
        }
        #task-list { flex: 1; display: flex; gap: 10px; margin-left: 20px; }
        .task-tab { padding: 8px 15px; background: rgba(255,255,255,0.05); border-radius: 8px; font-size: 0.8rem; cursor: pointer; }
        .task-tab.active { border-bottom: 2px solid var(--accent); background: rgba(255,255,255,0.1); }

        /* --- TERMINAL --- */
        #t-out { height: calc(100% - 45px); padding: 15px; font-family: monospace; color: #0f0; overflow-y: auto; font-size: 0.9rem; }
        #t-in { width: 100%; background: #000; border: none; color: #0f0; padding: 10px 15px; outline: none; border-top: 1px solid #222; font-family: monospace; }

        /* --- UTILS --- */
        .hidden { display: none !important; }
    </style>
</head>
<body id="os-root" oncontextmenu="showCtx(event)">

    <div id="top-bar">
        <div>MCCRACK<span style="color:var(--accent)">OS</span> <span style="opacity:0.4">v9.5</span></div>
        <div class="top-right">
            <div id="clock-top">00:00:00</div>
            <div id="lock-btn" onclick="animateLock()">🔒 TERMINATE</div>
        </div>
    </div>

    <div id="lock-screen-anim">
        <div class="spin"></div>
        <h1 style="letter-spacing: 5px; font-weight: 200;">LOCKING SYSTEM...</h1>
    </div>

    <div id="boot">
        <h1 style="letter-spacing: 15px; font-weight: 100;">MCCRACK</h1>
        <div class="spin" style="margin-top:20px;"></div>
        <p class="boot-text">MOUNTING VIRTUAL KERNEL...</p>
    </div>

    <div id="login">
        <div class="login-box">
            <h2>SYSTEM LOCKED</h2>
            <input type="password" id="pass-in" placeholder="CREDENTIALS">
            <button onclick="unlock()">ACCESS</button>
        </div>
    </div>

    <div id="desktop">
        <div class="widget" id="w-clock" style="top: 50px; right: 50px; width: 180px;">
            <div class="widget-title">Time Engine</div>
            <div id="w-time-val" style="font-size: 1.8rem; font-weight: 200;">00:00</div>
            <div id="w-date-val" style="font-size: 0.7rem; opacity: 0.5;">Monday, Jan 1</div>
        </div>

        <div class="widget" id="w-sys" style="top: 180px; right: 50px; width: 180px;">
            <div class="widget-title">Resources</div>
            <div style="font-size: 0.8rem;">CPU: <span id="cpu-val">2%</span></div>
            <div style="height:4px; background:#222; margin: 5px 0 10px;"><div id="cpu-bar" style="width:2%; height:100%; background:var(--accent);"></div></div>
            <div style="font-size: 0.8rem;">RAM: <span id="ram-val">1.2GB</span></div>
        </div>

        <div class="widget" id="w-weather" style="top: 50px; left: 50px; width: 150px;">
            <div class="widget-title">Weather</div>
            <div style="font-size: 1.5rem;">72°F ☀️</div>
            <div style="font-size: 0.7rem; opacity: 0.6;">Silicon Valley, CA</div>
        </div>
    </div>

    <div id="ctx-menu">
        <div class="ctx-item" onclick="location.reload()">Refresh <span>⟳</span></div>
        <div class="ctx-sep"></div>
        <div class="ctx-item" onclick="launch('Terminal')">Open Terminal <span>⌨</span></div>
        <div class="ctx-item" onclick="launch('Settings')">Personalize <span>🎨</span></div>
        <div class="ctx-sep"></div>
        <div class="ctx-item" onclick="toggleWidget('w-clock')">Toggle Clock <span>🕒</span></div>
        <div class="ctx-item" onclick="toggleWidget('w-sys')">Toggle Monitor <span>📊</span></div>
    </div>

    <div id="taskbar">
        <div id="start-trigger" onclick="alert('Menu Coming in V10')" style="cursor:pointer; font-size:25px;">💠</div>
        <div id="task-list"></div>
        <div id="tray" style="font-family: monospace; font-size: 0.75rem; color: #666;">
            NET: CONNECTED
        </div>
    </div>

    <script>
        const OS = {
            z: 1000,
            pass: "1234",
            installed: ["Terminal", "Settings", "Files", "Browser", "Notepad"],
            running: {},
            fsTriggered: false
        };

        const Registry = {
            Terminal: { 
                icon: "⌨️", 
                content: () => `<div id="t-out">McCrackOS [Version 9.5.1]<br>Type 'help' for commands.<br><br></div><input id="t-in" onkeydown="handleCmd(event, this)" placeholder=">_">` 
            },
            Settings: { 
                icon: "⚙️", 
                content: () => `<div style="padding:20px;"><h3>Settings</h3><br><button onclick="setBG('https://images.unsplash.com/photo-1451187580459-43490279c0fa')">Dark Space</button><br><br><button onclick="setBG('linear-gradient(45deg, #833ab4, #fd1d1d, #fcb045)')">Sunset</button></div>` 
            },
            Files: { icon: "📁", content: () => `<div style="padding:20px;">System Root:<br>/bin<br>/usr<br>/home<br>/mccrack</div>` },
            Browser: { icon: "🌐", content: () => `<iframe src="https://www.google.com/search?igu=1" style="width:100%;height:100%;border:none;background:#fff;"></iframe>` },
            Notepad: { icon: "📝", content: () => `<textarea style="width:100%;height:100%;background:#111;color:#fff;border:none;padding:20px;outline:none;"></textarea>` }
        };

        // --- BROWSER FULLSCREEN TRIGGER ---
        document.addEventListener('mousedown', () => {
            if (!OS.fsTriggered) {
                const elem = document.documentElement;
                if (elem.requestFullscreen) elem.requestFullscreen();
                else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
                OS.fsTriggered = true;
            }
            hideCtx();
        });

        // --- CORE KERNEL ---
        window.onload = () => {
            updateTime();
            setInterval(updateTime, 1000);
            setInterval(updateSys, 2000);
            
            setTimeout(() => {
                document.getElementById('boot').style.display = 'none';
                document.getElementById('login').style.display = 'flex';
            }, 2500);

            initDraggable();
        };

        function unlock() {
            if(document.getElementById('pass-in').value === OS.pass) {
                document.getElementById('login').style.display = 'none';
                document.getElementById('desktop').style.display = 'block';
                renderIcons();
            }
        }

        function animateLock() {
            const anim = document.getElementById('lock-screen-anim');
            anim.style.display = 'flex';
            setTimeout(() => {
                location.reload();
            }, 1800);
        }

        function updateTime() {
            const d = new Date();
            const ts = d.toLocaleTimeString();
            document.getElementById('clock-top').innerText = ts;
            document.getElementById('w-time-val').innerText = d.getHours().toString().padStart(2, '0') + ":" + d.getMinutes().toString().padStart(2, '0');
            document.getElementById('w-date-val').innerText = d.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' });
        }

        function updateSys() {
            const cpu = Math.floor(Math.random() * 15) + 2;
            document.getElementById('cpu-val').innerText = cpu + "%";
            document.getElementById('cpu-bar').style.width = cpu + "%";
        }

        // --- WINDOW MANAGEMENT ---
        function launch(id) {
            if(OS.running[id]) { focusWin(id); return; }
            const w = document.createElement('div');
            w.className = 'window';
            w.id = `win-${id}`;
            w.style.width = '600px'; w.style.height = '400px';
            w.style.top = '100px'; w.style.left = '100px';
            w.style.zIndex = ++OS.z;
            
            w.innerHTML = `
                <div class="win-head" onmousedown="dragWin(event, '${id}')">
                    <span>${Registry[id].icon} ${id}</span>
                    <div class="win-ctrls">
                        <span onclick="closeWin('${id}')">✕</span>
                    </div>
                </div>
                <div class="win-body">${Registry[id].content()}</div>
            `;
            document.body.appendChild(w);
            OS.running[id] = w;
            updateTaskbar();
        }

        function focusWin(id) {
            OS.running[id].style.display = 'flex';
            OS.running[id].style.zIndex = ++OS.z;
            updateTaskbar();
        }

        function closeWin(id) {
            OS.running[id].remove();
            delete OS.running[id];
            updateTaskbar();
        }

        function updateTaskbar() {
            const tl = document.getElementById('task-list');
            tl.innerHTML = '';
            Object.keys(OS.running).forEach(id => {
                const tab = document.createElement('div');
                tab.className = 'task-tab';
                tab.innerText = id;
                tab.onclick = () => focusWin(id);
                tl.appendChild(tab);
            });
        }

        // --- CONTEXT MENU LOGIC ---
        function showCtx(e) {
            e.preventDefault();
            const m = document.getElementById('ctx-menu');
            m.style.display = 'block';
            m.style.left = e.clientX + 'px';
            m.style.top = e.clientY + 'px';
        }

        function hideCtx() {
            document.getElementById('ctx-menu').style.display = 'none';
        }

        // --- TERMINAL LOGIC ---
        function handleCmd(e, input) {
            if(e.key === "Enter") {
                const cmd = input.value.toLowerCase().trim();
                const out = document.getElementById('t-out');
                out.innerHTML += `<div><span style="color:#fff">></span> ${cmd}</div>`;
                
                switch(cmd) {
                    case 'help':
                        out.innerHTML += `<div>Commands: apps, install [name], clear, logs, cls, exit</div>`;
                        break;
                    case 'apps':
                        out.innerHTML += `<div>Installed: ${OS.installed.join(', ')}</div>`;
                        break;
                    case 'clear':
                    case 'cls':
                        out.innerHTML = '';
                        break;
                    case 'logs':
                        out.innerHTML += `<div>[${new Date().toLocaleTimeString()}] Kernel Heartbeat OK</div>`;
                        break;
                    case 'exit':
                        closeWin('Terminal');
                        break;
                    default:
                        if(cmd.startsWith('install ')) {
                            const newApp = cmd.split(' ')[1];
                            out.innerHTML += `<div>Downloading ${newApp}... done.</div>`;
                            OS.installed.push(newApp);
                            renderIcons();
                        } else {
                            out.innerHTML += `<div style="color:red">Unknown command: ${cmd}</div>`;
                        }
                }
                input.value = '';
                out.scrollTop = out.scrollHeight;
            }
        }

        // --- DRAG & DROP ENGINE ---
        function initDraggable() {
            const widgets = document.querySelectorAll('.widget');
            widgets.forEach(w => {
                w.onmousedown = (e) => {
                    if(e.target.tagName === 'BUTTON') return;
                    let ox = e.clientX - w.offsetLeft;
                    let oy = e.clientY - w.offsetTop;
                    document.onmousemove = (ev) => {
                        w.style.left = ev.clientX - ox + 'px';
                        w.style.top = ev.clientY - oy + 'px';
                    };
                    document.onmouseup = () => document.onmousemove = null;
                };
            });
        }

        function dragWin(e, id) {
            const w = OS.running[id];
            focusWin(id);
            let ox = e.clientX - w.offsetLeft;
            let oy = e.clientY - w.offsetTop;
            document.onmousemove = (ev) => {
                w.style.left = ev.clientX - ox + 'px';
                w.style.top = ev.clientY - oy + 'px';
            };
            document.onmouseup = () => document.onmousemove = null;
        }

        function renderIcons() {
            const d = document.getElementById('desktop');
            // Remove existing icons
            document.querySelectorAll('.icon').forEach(i => i.remove());
            OS.installed.forEach((id, i) => {
                const icon = document.createElement('div');
                icon.className = 'icon';
                icon.style.top = (20 + (i * 110)) + 'px';
                icon.style.left = '30px';
                icon.innerHTML = `<div>${Registry[id]?.icon || '📦'}</div><span>${id}</span>`;
                icon.ondblclick = () => launch(id);
                d.appendChild(icon);
            });
        }

        function setBG(val) {
            document.getElementById('os-root').style.background = val.includes('http') ? `url('${val}') center/cover` : val;
            hideCtx();
        }

        function toggleWidget(id) {
            const w = document.getElementById(id);
            w.style.display = (w.style.display === 'none') ? 'block' : 'none';
            hideCtx();
        }
    </script>
</body>
</html>
