<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>𝕄𝕔ℂ𝕣𝕒𝕔𝕜OS V1.0</title>
<link id="favicon-link" rel="icon" type="image/png" href="https://i.imgur.com/HfPyMtK.png">
<style>
/* --- CORE SYSTEM VARIABLES --- */
:root {
--accent: #0078d4;
--top-bar-h: 32px;
--taskbar-h: 65px;
--panel: rgba(10, 10, 10, 0.98);
--win-bg: #050505;
--border: 1px solid rgba(255, 255, 255, 0.12);
--shadow: 0 30px 60px rgba(0,0,0,0.95);
--blur: blur(35px);
--anim-speed: 1;
--glass-blur: 25px;
--font: 'Segoe UI', system-ui, -apple-system, sans-serif;
--danger: #ff4b4b;
}

/* --- GLOBAL RESET --- */
* { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font); -webkit-user-select: none; user-select: none; }
body {
height: 100vh; width: 100vw; overflow: hidden;
background: radial-gradient(120% 90% at 50% 44%, #1a1a1a 0%, #121212 30%, #0b0b0b 62%, #050505 82%, #010101 100%); color: white; transition: background 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}
body.lively-ui { animation: breathe-ui calc(var(--anim-speed, 1) * 10s) ease-in-out infinite; }
body.gradient-shift { background-size: 160% 160%; animation: gradient-shift calc(var(--anim-speed, 1) * 18s) ease infinite; }
body.pulse-accent #top-bar,
body.pulse-accent #taskbar { box-shadow: 0 0 0 rgba(0, 120, 212, 0); animation: chrome-pulse calc(var(--anim-speed, 1) * 2.8s) ease-in-out infinite; }

/* --- TOP BAR --- */
#top-bar {
position: fixed; top: 0; left: 0; right: 0; height: var(--top-bar-h);
background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(15px);
display: flex; justify-content: space-between; align-items: center;
padding: 0 18px; z-index: 9500; border-bottom: var(--border);
font-size: 0.75rem; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase;
transition: transform 260ms ease, background 260ms ease, border-color 260ms ease;
}
.top-right { display: flex; align-items: center; gap: 20px; }
#lock-btn { cursor: pointer; color: #aaa; transition: 0.3s; }
#lock-btn:hover { color: #ff4b4b; text-shadow: 0 0 10px rgba(255,75,75,0.5); }
#battery-stat { display: flex; align-items: center; gap: 6px; color: #44ff44; }

/* --- BOOT SEQUENCE --- */
#boot { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 10000; }
.boot-stage { width: min(860px, 90vw); }
#boot-terminal {
min-height: 390px;
border: 1px solid rgba(72, 255, 137, 0.35);
border-radius: 12px;
padding: 16px;
background: radial-gradient(circle at top, rgba(0, 40, 10, 0.5), rgba(0, 0, 0, 0.95));
box-shadow: inset 0 0 28px rgba(40, 255, 120, 0.18), 0 0 45px rgba(0,0,0,0.85);
font-family: monospace;
color: #45ff95;
}
#boot-terminal h2 { font-size: 0.95rem; font-weight: 600; letter-spacing: 0.24em; margin-bottom: 12px; opacity: 0.88; }
#hack-logs {
height: 305px;
overflow: hidden;
font-size: 0.8rem;
line-height: 1.35;
}
.hack-line { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; opacity: 0.9; }
.boot-cursor { display: inline-block; width: 9px; height: 16px; margin-left: 6px; background: #45ff95; animation: blink 0.9s steps(1, end) infinite; }
.boot-loading { text-align: center; display: none; }
.spin { width: 60px; height: 60px; border: 4px solid #111; border-top-color: var(--accent); border-radius: 50%; animation: s 0.8s linear infinite; margin: 20px auto 24px auto; }
@keyframes s { to { transform: rotate(360deg); } }
@keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
.boot-text { font-family: monospace; font-size: 0.8rem; color: var(--accent); opacity: 0.8; }
.boot-log-box {
width: min(760px, 82vw);
max-height: 180px;
margin: 20px auto 0 auto;
padding: 14px 16px;
border: 1px solid #143a14;
border-radius: 10px;
background: rgba(0,0,0,0.75);
box-shadow: inset 0 0 22px rgba(24, 255, 72, 0.1);
overflow: hidden;
font-family: monospace;
font-size: 0.8rem;
line-height: 1.35;
color: #39ff88;
text-align: left;
}
.boot-line { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; opacity: 0.9; }

/* --- AUTHENTICATION --- */
#login {
position: fixed; inset: 0; display: none; background: linear-gradient(160deg, rgba(5,5,5,0.84), rgba(0,0,0,0.95));
backdrop-filter: var(--blur); z-index: 9000; align-items: center; justify-content: center;
}
.lockscreen-shell {
width: min(980px, 92vw);
display: grid;
grid-template-columns: 1fr minmax(330px, 430px);
gap: 30px;
align-items: center;
}
.lockscreen-top p {
font-size: clamp(1.1rem, 2vw, 1.45rem);
opacity: 0.82;
letter-spacing: 0.08em;
text-transform: uppercase;
}
.lockscreen-top h1 {
font-size: clamp(1.8rem, 4vw, 3rem);
font-weight: 650;
letter-spacing: 0.02em;
margin-top: 8px;
}
.lockscreen-time-wrap { margin-top: 24px; }
#lock-time {
font-size: clamp(4.2rem, 10vw, 8.5rem);
line-height: 0.95;
font-weight: 700;
text-shadow: 0 20px 40px rgba(0,0,0,0.6);
}
#lock-date {
margin-top: 14px;
font-size: clamp(1rem, 2vw, 1.4rem);
font-weight: 550;
letter-spacing: 0.06em;
opacity: 0.72;
text-transform: uppercase;
}
.login-box {
background: linear-gradient(165deg, rgba(15,15,15,0.98), rgba(0,0,0,0.96));
padding: 38px;
border-radius: 26px;
border: 1px solid rgba(255,255,255,0.16);
width: 100%;
text-align: center;
box-shadow: var(--shadow);
}
.login-box h2 { font-weight: 300; letter-spacing: 1px; }
.auth-title { font-size: 1.7rem; font-weight: 700; letter-spacing: 0.07em; }
.auth-card-sub { font-size: 0.8rem; opacity: 0.64; margin: 8px 0 22px 0; letter-spacing: 0.05em; text-transform: uppercase; }
.login-box input {
width: 100%; padding: 16px; margin: 25px 0; background: #111; border: var(--border);
border-radius: 12px; color: white; text-align: center; outline: none; font-size: 1.1rem;
transition: 0.3s;
}
.login-box select {
width: 100%; padding: 12px; margin-top: 14px; background: #111; border: var(--border);
border-radius: 10px; color: #fff; text-align: center; outline: none; font-size: 0.95rem;
}
.login-box input:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(0,120,212,0.2); }
.login-box button {
width: 100%; padding: 16px; background: var(--accent); color: white; border: none;
border-radius: 12px; cursor: pointer; font-weight: 800; font-size: 1rem; transition: 0.3s;
}
.login-box button:hover { filter: brightness(1.2); transform: translateY(-2px); }
.account-avatar {
width: 88px;
height: 88px;
margin: 0 auto 18px auto;
border-radius: 50%;
border: 2px solid rgba(255,255,255,0.22);
background: #111;
display: flex;
align-items: center;
justify-content: center;
font-size: 42px;
overflow: hidden;
}
.account-avatar img { width: 100%; height: 100%; object-fit: cover; }
.auth-row { display: flex; gap: 10px; margin-top: 12px; }
.auth-row button { flex: 1; padding: 12px; font-size: 0.86rem; }
.auth-sub { font-size: 0.8rem; opacity: 0.66; margin-top: 8px; }

@media (max-width: 860px) {
.lockscreen-shell { grid-template-columns: 1fr; gap: 18px; }
#lock-time { font-size: clamp(3.1rem, 15vw, 6rem); }
.login-box { max-width: 480px; }
}

/* --- WORKSPACE --- */
#desktop { position: absolute; inset: var(--top-bar-h) 0 var(--taskbar-h) 0; display: none; z-index: 100; padding: 30px; }
.desktop-hero {
position: absolute;
left: 50%;
top: 50%;
transform: translate(-50%, -50%);
text-align: center;
pointer-events: none;
z-index: 90;
}
.desktop-hero h1 {
font-size: clamp(2.4rem, 6vw, 4.5rem);
letter-spacing: 0.14em;
font-weight: 700;
text-shadow: 0 14px 35px rgba(0,0,0,0.95);
}
.desktop-hero p {
margin-top: 12px;
font-size: clamp(0.9rem, 2vw, 1.15rem);
letter-spacing: 0.08em;
opacity: 0.72;
font-weight: 500;
}
.widget-layer {
position: absolute;
inset: 0;
z-index: 240;
pointer-events: none;
}
.widget-card {
width: 260px;
position: absolute;
background: rgba(0,0,0,0.58);
border: 1px solid rgba(255,255,255,0.15);
border-radius: 14px;
padding: 12px 14px;
backdrop-filter: blur(18px);
box-shadow: 0 15px 30px rgba(0,0,0,0.35);
cursor: grab;
pointer-events: auto;
user-select: none;
touch-action: none;
will-change: left, top;
transform: translateZ(0);
transition: transform 180ms ease, box-shadow 180ms ease;
}
.widget-card:hover { transform: translateY(-2px); box-shadow: 0 18px 36px rgba(0,0,0,0.44); }
.widget-card.dragging { cursor: grabbing; }
.widget-card h4 { font-size: 0.72rem; letter-spacing: 1.2px; opacity: 0.65; margin-bottom: 8px; }
.widget-main { font-size: 1.35rem; font-weight: 700; }
.widget-sub { margin-top: 4px; font-size: 0.78rem; opacity: 0.7; }
/* Drag and Drop Styling */
.icon {
position: absolute; width: 110px; height: 120px; display: flex; flex-direction: column;
align-items: center; justify-content: center; border-radius: 18px; cursor: grab;
transition: transform 0.2s;
will-change: left, top, transform;
user-select: none;
z-index: 150;
}
.icon.dragging { transition: none; }
.icon:active { cursor: grabbing; }
.icon:hover { background: rgba(255,255,255,0.08); transform: scale(1.05); }
.icon div { font-size: 55px; margin-bottom: 10px; filter: drop-shadow(0 8px 12px rgba(0,0,0,0.6)); pointer-events: none;}
.icon span { font-size: 0.85rem; text-align: center; font-weight: 600; text-shadow: 0 2px 8px rgba(0,0,0,1); pointer-events: none;}

body.no-animations *,
body.no-animations *::before,
body.no-animations *::after {
animation: none !important;
transition: none !important;
}

#desktop.compact-icons .icon { width: 88px; height: 98px; }
#desktop.compact-icons .icon div { font-size: 44px; margin-bottom: 8px; }
#desktop.compact-icons .icon span { font-size: 0.72rem; }

.icon.desktop-refresh { animation: desktop-refresh 520ms ease; }

#desktop-context-menu {
position: fixed;
min-width: 230px;
background: rgba(5,5,5,0.96);
border: 1px solid rgba(255,255,255,0.12);
border-radius: 14px;
box-shadow: 0 24px 48px rgba(0,0,0,0.55);
backdrop-filter: blur(18px);
padding: 8px;
z-index: 9800;
display: none;
}
#desktop-context-menu.menu-open { display: block; }
.context-item,
.context-subitem,
.context-label {
width: 100%;
display: flex;
align-items: center;
gap: 10px;
background: transparent;
border: none;
color: #fff;
padding: 10px 12px;
border-radius: 10px;
font-size: 0.9rem;
text-align: left;
cursor: pointer;
position: relative;
}
.context-item:hover,
.context-subitem:hover { background: rgba(255,255,255,0.08); }
.context-label { cursor: default; justify-content: space-between; }
.context-caret { margin-left: auto; opacity: 0.65; }
.context-sep { height: 1px; background: rgba(255,255,255,0.08); margin: 6px 2px; }
.context-submenu-wrap { position: relative; }
.context-submenu {
position: absolute;
left: calc(100% - 10px);
top: 0;
min-width: 210px;
background: rgba(5,5,5,0.98);
border: 1px solid rgba(255,255,255,0.12);
border-radius: 14px;
padding: 8px;
box-shadow: 0 18px 40px rgba(0,0,0,0.45);
display: none;
}
.context-submenu-wrap:hover .context-submenu { display: block; }


/* --- DELETE BIN --- */
#delete-bin {
position: absolute; bottom: 120px; right: 30px; width: 100px; height: 120px;
display: flex; flex-direction: column; align-items: center; justify-content: center;
background: rgba(255, 75, 75, 0.05); border: 2px dashed rgba(255, 75, 75, 0.2);
border-radius: 20px; transition: 0.3s; z-index: 110;
}
#delete-bin.drag-over {
background: rgba(255, 75, 75, 0.3); border-color: #ff4b4b;
transform: scale(1.1); box-shadow: 0 0 30px rgba(255, 75, 75, 0.4);
}
#delete-bin.delete-ready {
background: rgba(255, 75, 75, 0.38);
border-color: #ff7878;
transform: scale(1.12);
box-shadow: 0 0 35px rgba(255, 75, 75, 0.55), 0 0 60px rgba(255, 75, 75, 0.22);
animation: pulse-delete 700ms ease-out infinite;
}
#delete-bin div { font-size: 50px; margin-bottom: 5px; }
#delete-bin span { font-size: 0.7rem; font-weight: 800; color: #ff4b4b; letter-spacing: 1px; }

/* --- SYSTEM NOTIFICATIONS --- */
#notification-center {
position: fixed;
top: calc(var(--top-bar-h) + 14px);
right: 18px;
display: flex;
flex-direction: column;
gap: 10px;
z-index: 9700;
pointer-events: none;
}
.notification {
min-width: 280px;
max-width: 360px;
padding: 12px 14px;
border-radius: 12px;
background: rgba(12, 12, 12, 0.95);
border: 1px solid rgba(255,255,255,0.12);
box-shadow: 0 16px 32px rgba(0,0,0,0.55);
font-size: 0.78rem;
letter-spacing: 0.4px;
opacity: 0;
transform: translateY(-12px);
animation: toast-in 220ms ease forwards;
}
.notification.info { border-left: 4px solid var(--accent); }
.notification.success { border-left: 4px solid #22c55e; }
.notification.warning { border-left: 4px solid #f59e0b; }
.notification.error { border-left: 4px solid var(--danger); }
.notification.fade-out { animation: toast-out 220ms ease forwards; }
@keyframes toast-in { to { opacity: 1; transform: translateY(0); } }
@keyframes toast-out { to { opacity: 0; transform: translateY(-8px); } }

/* --- APPLICATION LIBRARY --- */
#start-menu {
position: absolute; bottom: 80px; left: 20px; width: 380px; height: 550px;
background: var(--panel); border: var(--border); border-radius: 24px;
backdrop-filter: var(--blur); display: none; flex-direction: column; padding: 30px; z-index: 9999; box-shadow: var(--shadow);
animation: panel-pop 240ms ease;
}
.start-item { display: flex; align-items: center; gap: 18px; padding: 14px; border-radius: 14px; cursor: pointer; transition: 0.2s; }
.start-item:hover { background: rgba(255,255,255,0.08); transform: translateX(8px); }
.start-item span { font-size: 28px; }

/* --- MULTI-WINDOW ARCHITECTURE --- */
.window {
position: absolute; background: var(--win-bg); border-radius: 20px; border: var(--border);
display: flex; flex-direction: column; overflow: hidden; box-shadow: var(--shadow);
transition: width 0.3s, height 0.3s, top 0.3s, left 0.3s, opacity 0.2s, transform 0.2s;
animation: window-in 220ms ease;
}
.win-head { background: #121212; padding: 16px 24px; display: flex; justify-content: space-between; cursor: grab; align-items: center; }
.window.dragging, .window.resizing { transition: none !important; }
.window.dragging .win-head { cursor: grabbing; }
.win-body { flex: 1; background: #000; position: relative; overflow: auto; }
.win-ctrls { display: flex; gap: 22px; align-items: center; }
.win-ctrls span { cursor: pointer; opacity: 0.5; transition: 0.2s; font-size: 1.2rem; }
.win-ctrls span:hover { opacity: 1; transform: scale(1.2); }
.resizer { position: absolute; bottom: 0; right: 0; width: 22px; height: 22px; cursor: nwse-resize; z-index: 10; }

/* --- SYSTEM TASKBAR --- */
#taskbar {
position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
width: min(1100px, calc(100vw - 24px)); height: var(--taskbar-h);
background: rgba(5, 5, 5, 0.9); backdrop-filter: blur(var(--glass-blur));
display: flex; align-items: center; padding: 0 18px; z-index: 8500; border: var(--border); border-radius: 18px;
transition: background 250ms ease, border-color 250ms ease, transform 220ms ease;
}
#task-list { flex: 1; display: flex; justify-content: center; gap: 10px; margin: 0 16px; overflow-x: auto; padding: 8px 0; }
.task-tab { padding: 10px 16px; background: rgba(255,255,255,0.04); border-radius: 12px; font-size: 0.82rem; cursor: pointer; transition: 0.3s; white-space: nowrap; border: 1px solid transparent; color: #888; }
.task-tab.active { background: rgba(0, 120, 212, 0.15); border-color: var(--accent); box-shadow: 0 0 20px rgba(0,120,212,0.25); color: white; }
.task-tab.pinned-only { border-style: dashed; color: #b9b9b9; }
#start-btn { transform: rotate(180deg); }
#start-btn:hover, #start-btn:active, #start-btn.menu-open { transform: rotate(0deg) scale(1.06); }

/* --- APP CONTENT STYLING --- */
.full-app-view { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; }
.app-iframe { width: 100%; height: 100%; border: none; background: #000; }
.explorer-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 20px; padding: 30px; }
.file-item { text-align: center; padding: 20px; border-radius: 12px; background: #0a0a0a; border: 1px solid #1a1a1a; cursor: pointer; transition: 0.2s; }
.file-item:hover { background: #151515; border-color: var(--accent); }

.store-card { background: #0a0a0a; padding: 20px; border-radius: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #1a1a1a; }
.install-btn { padding: 8px 20px; border-radius: 8px; border: none; background: var(--accent); color: white; cursor: pointer; font-weight: 700; }

body.no-window-anims .window,
body.no-start-anims #start-menu { animation: none !important; }
body.hover-lift .task-tab:hover { transform: translateY(-2px); }
body.icon-wiggle .icon:hover div { animation: wiggle calc(var(--anim-speed, 1) * 340ms) ease; }
@keyframes wiggle { 0%,100% { transform: rotate(0deg); } 35% { transform: rotate(-6deg); } 70% { transform: rotate(6deg); } }

/* --- ANIMATIONS --- */
@keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
@keyframes pulse-delete { 0% { box-shadow: 0 0 0 0 rgba(255, 75, 75, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(255, 75, 75, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 75, 75, 0); } }
@keyframes panel-pop { from { opacity: 0; transform: translateY(8px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
@keyframes window-in { from { opacity: 0; transform: translateY(10px) scale(0.985); } to { opacity: 1; transform: translateY(0) scale(1); } }
@keyframes breathe-ui { 0%,100% { filter: saturate(1); } 50% { filter: saturate(1.12); } }
@keyframes gradient-shift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
@keyframes desktop-refresh {
0% { opacity: 0.38; filter: blur(1.5px); transform: translateY(0) scale(0.98); }
40% { opacity: 0.82; filter: blur(0.4px); transform: translateY(-4px) scale(1.02); }
70% { opacity: 1; filter: none; transform: translateY(2px) scale(0.995); }
100% { opacity: 1; filter: none; transform: translateY(0) scale(1); }
}
@keyframes chrome-pulse { 0%,100% { box-shadow: 0 0 0 rgba(0,120,212,0); } 50% { box-shadow: 0 0 28px rgba(0,120,212,0.25); } }
</style>
</head>
<body id="os-root">

<div id="top-bar">
<div>𝕄𝕔ℂ𝕣𝕒𝕔𝕜OS <span style="opacity:0.3; margin-left:10px;">V1.0.4</span></div>
<div class="top-right">
<div id="battery-stat"><span>100%</span> 🔋</div>
<div id="lock-btn" onclick="lockSystem()">TERMINATE SESSION</div>
</div>
</div>

<div id="boot">
<div id="boot-terminal" class="boot-stage">
<h2>ROOT@𝕄𝕔ℂ𝕣𝕒𝕔𝕜OS://BOOT_MATRIX <span class="boot-cursor"></span></h2>
<div id="hack-logs"></div>
</div>
<div id="boot-loading" class="boot-stage boot-loading">
<h1 style="letter-spacing: 12px; font-weight: 200; font-size: 2.5rem;">𝕄𝕔ℂ𝕣𝕒𝕔𝕜<span style="font-weight:700;">OS</span></h1>
<div class="spin"></div>
<p class="boot-text">INITIALIZING OPERATING SYSTEM...</p>
<div id="boot-logs" class="boot-log-box"></div>
</div>
</div>

<div id="login">
<div class="lockscreen-shell">
<div>
<div class="lockscreen-top">
<p id="lock-greeting">Good Morning</p>
<h1 id="lock-user">Operator</h1>
</div>
<div class="lockscreen-time-wrap">
<div id="lock-time"></div>
<div id="lock-date"></div>
</div>
</div>
<div class="login-box" id="auth-box"></div>
</div>
</div>

<div id="desktop"></div>
<div id="desktop-context-menu" aria-hidden="true">
<button class="context-item" onclick="openPersonalizationSettings()">🎨 <span>Personalize</span></button>
<div class="context-submenu-wrap">
<div class="context-label">📄 <span>Create New...</span><span class="context-caret">›</span></div>
<div class="context-submenu">
<button class="context-subitem" onclick="createDesktopTextDocumentShortcut()">📝 <span>Text Document</span></button>
<button class="context-subitem" onclick="spawnStickyNoteWidget()">🗒️ <span>Sticky Note Widget</span></button>
</div>
</div>
<button class="context-item" onclick="refreshDesktopVisuals()">🌀 <span>Refresh</span></button>
<button class="context-item" onclick="launchDesktopInspector()">⌨️ <span>Inspect</span></button>
<div class="context-sep"></div>
<button class="context-item" onclick="shuffleAccentColor()">🎲 <span>Shuffle Accent</span></button>
</div>
<div id="notification-center"></div>

<div id="delete-bin" ondragover="allowDrop(event)" ondragleave="dragLeave(event)" ondrop="dropDelete(event)">
<div>🗑️</div>
<span>DELETE BIN</span>
</div>

const DEFAULT_DESKTOP_SHORTCUTS = [];

function normalizeDesktopShortcuts(raw) {
if (!Array.isArray(raw)) return [...DEFAULT_DESKTOP_SHORTCUTS];
return raw.slice(0, 30).map((item, index) => {
const name = typeof item?.name === 'string' && item.name.trim() ? item.name.trim().slice(0, 28) : `Shortcut ${index + 1}`;
const target = typeof item?.target === 'string' && item.target.trim() ? item.target.trim() : 'Notepad';
return {
id: typeof item?.id === 'string' && item.id.trim() ? item.id.trim() : `shortcut-${Date.now()}-${index}`,
name,
icon: typeof item?.icon === 'string' && item.icon.trim() ? item.icon.trim().slice(0, 3) : '📝',
kind: typeof item?.kind === 'string' && item.kind.trim() ? item.kind.trim() : 'shortcut',
 target,
 x: Number.isFinite(item?.x) ? item.x : null,
 y: Number.isFinite(item?.y) ? item.y : null
};
});
}

function saveDesktopShortcuts() {
localStorage.setItem('mc_desktop_shortcuts', JSON.stringify(OS.desktopShortcuts));
}

function getDefaultWidgetPosition(id) {
const fallback = DEFAULT_WIDGET_POSITIONS[id] || { x: 24, y: 24 };
if (id === 'calendar') {
const desktop = document.getElementById('desktop');
const desktopWidth = desktop ? desktop.clientWidth : window.innerWidth;
const widgetWidth = 260;
const edgePadding = 24;
return {
x: Math.max(desktopWidth - widgetWidth - edgePadding, edgePadding),
y: fallback.y
};
}
return {
x: typeof fallback.x === 'number' ? fallback.x : 24,
y: fallback.y
};
}

function normalizeWidgetFlags(raw) {
const base = { ...DEFAULT_WIDGETS };
if (!raw || typeof raw !== 'object') return base;
Object.keys(DEFAULT_WIDGETS).forEach((id) => {
if (typeof raw[id] === 'boolean') base[id] = raw[id];
});
return base;
}

function normalizeWidgetPositions(raw) {
const base = {};
Object.keys(DEFAULT_WIDGET_POSITIONS).forEach((id) => {
const saved = raw && raw[id];
const fallback = DEFAULT_WIDGET_POSITIONS[id] || { x: 24, y: 24 };
base[id] = {
x: typeof saved?.x === 'number' ? saved.x : fallback.x,
y: typeof saved?.y === 'number' ? saved.y : fallback.y
};
});
return base;
}

function saveWidgetState() {
localStorage.setItem("mc_widgets", JSON.stringify(OS.widgets));
localStorage.setItem("mc_widget_pos", JSON.stringify(OS.widgetPositions));
}

function clampWidgetPosition(pos, layer, card) {
const maxX = Math.max((layer?.clientWidth || window.innerWidth) - (card?.offsetWidth || 260), 0);
const maxY = Math.max((layer?.clientHeight || window.innerHeight) - (card?.offsetHeight || 110), 0);
return {
x: Math.min(Math.max(pos.x, 0), maxX),
y: Math.min(Math.max(pos.y, 0), maxY)
};
}

function iconOverDeleteBin(iconEl) {
const bin = document.getElementById('delete-bin');
if(!bin || !iconEl) return false;
const iconRect = iconEl.getBoundingClientRect();
const binRect = bin.getBoundingClientRect();
return !(
iconRect.right < binRect.left ||
iconRect.left > binRect.right ||
iconRect.bottom < binRect.top ||
iconRect.top > binRect.bottom
);
}

function attachMouseDrag(target, { onStart, onMove, onEnd }) {
target.onmousedown = (e) => {
if (e.button !== 0) return;
e.preventDefault();
if (typeof onStart === 'function') onStart(e);
let raf = null;
let pending = null;

const applyMove = () => {
if (!pending) return;
if (typeof onMove === 'function') onMove(pending);
raf = null;
};

const handleMove = (ev) => {
pending = ev;
if (!raf) raf = requestAnimationFrame(applyMove);
};

const handleUp = () => {
window.removeEventListener('mousemove', handleMove);
window.removeEventListener('mouseup', handleUp);
if (raf) cancelAnimationFrame(raf);
if (typeof onEnd === 'function') onEnd();
};

window.addEventListener('mousemove', handleMove);
window.addEventListener('mouseup', handleUp);
};
}

function setSetting(key, value, message) {
if (!Object.prototype.hasOwnProperty.call(OS.settings, key)) return;
OS.settings[key] = value;
saveSettings();
if (key === 'autoFullscreen') syncFullscreenPreference();
if (['compactIcons', 'reducedMotion', 'hideDesktopHero'].includes(key)) applyUISettings();
if (OS.running['Settings']) OS.running['Settings'].querySelector('.win-body').innerHTML = Registry['Settings'].content();
if (message) notify(message, 'success');
}

function resetSystemSettings() {
OS.settings = { ...DEFAULT_SETTINGS };

syncFullscreenPreference();
applyUISettings();
if (OS.running['Settings']) OS.running['Settings'].querySelector('.win-body').innerHTML = Registry['Settings'].content();
notify('System settings restored.', 'warning');
}

function applyUISettings() {
const desktop = document.getElementById('desktop');
document.body.classList.toggle('no-animations', !!OS.settings.reducedMotion);
if (desktop) desktop.classList.toggle('compact-icons', !!OS.settings.compactIcons);
const speedMap = { slow: 1.35, normal: 1, fast: 0.75 };
const blurMap = { low: '12px', medium: '25px', high: '38px' };
document.documentElement.style.setProperty('--anim-speed', speedMap[OS.settings.uiAnimationSpeed] || 1);
document.documentElement.style.setProperty('--glass-blur', blurMap[OS.settings.glassIntensity] || '25px');
document.body.classList.toggle('gradient-shift', !!OS.settings.gradientShift);
document.body.classList.toggle('pulse-accent', !!OS.settings.pulseAccent && !!OS.settings.taskbarGlow);
document.body.classList.toggle('lively-ui', !!OS.settings.livelyUi);
document.body.classList.toggle('hover-lift', !!OS.settings.hoverLift);
document.body.classList.toggle('icon-wiggle', !!OS.settings.iconWiggle);
document.body.classList.toggle('no-window-anims', !OS.settings.windowOpenAnimations);
document.body.classList.toggle('no-start-anims', !OS.settings.startMenuAnimations);
}

function updateMarkdownPreview() {
const input = document.getElementById('md-input');
const preview = document.getElementById('md-preview');
if (!input || !preview) return;
const value = input.value || '';
localStorage.setItem('mc_md', value);
const escaped = value.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
preview.innerHTML = escaped
.replace(/^### (.*)$/gm, '<h3>$1</h3>')
.replace(/^## (.*)$/gm, '<h2>$1</h2>')
.replace(/^# (.*)$/gm, '<h1>$1</h1>')
.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
.replace(/\*(.*?)\*/g, '<em>$1</em>')
.replace(/\n/g, '<br>');
}

function getFinanceItems() {
try { const data = JSON.parse(localStorage.getItem('mc_finance')); return Array.isArray(data) ? data : []; } catch (_) { return []; }

function renderFinanceSummary() {

return `Balance: $${(income - expense).toFixed(2)} • Income $${income.toFixed(2)} • Expenses $${expense.toFixed(2)}`;
}

}

localStorage.setItem('mc_mind', JSON.stringify(nodes));

}
function renderColorSwatches(base) {
const hex = base || '#4f46e5';
const variants = [0.2, 0.4, 0.6, 0.8, 1].map(v => shadeColor(hex, v));
return variants.map(color => `<div style="height:72px; border-radius:10px; border:1px solid #222; background:${color}; display:flex; align-items:flex-end; padding:6px; font-size:0.68rem;">${color}</div>`).join('');
}
function shadeColor(hex, factor) {
const c = hex.replace('#', '');
const n = parseInt(c, 16);
const r = Math.min(255, Math.round(((n >> 16) & 255) * factor));
const g = Math.min(255, Math.round(((n >> 8) & 255) * factor));
const b = Math.min(255, Math.round((n & 255) * factor));
return `#${[r, g, b].map(v => v.toString(16).padStart(2, '0')).join('')}`;
}
function renderColorLab(base) {
const host = document.getElementById('color-lab');
if (!host) return;
host.innerHTML = renderColorSwatches(base);
}
function startPixelRunner() {
const canvas = document.getElementById('runner-canvas');
if (!canvas) return;
const ctx = canvas.getContext('2d');
if (!ctx) return;
let x = 80; let y = 190; let vy = 0; let obstacle = 760; let score = 0; let run = true;
const jump = () => { if (y >= 190) vy = -10; };
window.onkeydown = (e) => { if (e.code === 'Space') jump(); };
const tick = () => {
if (!run) return;
vy += 0.6; y = Math.min(190, y + vy); obstacle -= 5; if (obstacle < -30) { obstacle = 860; score += 1; }
ctx.fillStyle = '#080808'; ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.fillStyle = '#fff'; ctx.fillRect(x, y, 20, 20);
ctx.fillStyle = '#ef4444'; ctx.fillRect(obstacle, 190, 20, 20);
ctx.fillStyle = '#888'; ctx.fillRect(0, 210, canvas.width, 2);
ctx.fillStyle = '#fff'; ctx.fillText(`Score ${score}`, 20, 24);
if (obstacle < x + 20 && obstacle + 20 > x && y + 20 >= 190) { run = false; ctx.fillText('Game Over', 360, 120); return; }
requestAnimationFrame(tick);
};
tick();
}

function allowDrop(ev) {
ev.preventDefault();
document.getElementById('delete-bin').classList.add('drag-over');
}
function dragLeave(ev) { document.getElementById('delete-bin').classList.remove('drag-over'); }
function startDrag(ev, id) {
ev.dataTransfer.setData("appId", id);
ev.currentTarget.style.opacity = "0.4";
}
function endDrag(ev) {
ev.currentTarget.style.opacity = "1";
document.getElementById('delete-bin').classList.remove('drag-over');
document.getElementById('delete-bin').classList.remove('delete-ready');
}
function dropDelete(ev) {
ev.preventDefault();
document.getElementById('delete-bin').classList.remove('drag-over');
document.getElementById('delete-bin').classList.remove('delete-ready');
const id = ev.dataTransfer.getData("appId");

if (!id) return;

attemptDeleteApp(id);
}

function attemptDeleteApp(id) {
if (!id) return;

const customs = JSON.parse(localStorage.getItem("mc_custom_apps")) || {};
const isStoreApp = OS.storeApps.includes(id);
const isCustomApp = Object.prototype.hasOwnProperty.call(customs, id);

if ((!isStoreApp && !isCustomApp) || OS.restricted.includes(id)) {
alert(`CRITICAL ERROR: ${id} is a protected system kernel module and cannot be deleted.`);
return;
}

if (confirm(`Purge ${id}?`)) {
if (OS.running[id]) closeW(id);
OS.installed = OS.installed.filter(app => app !== id);
delete OS.pos[id];
if (isCustomApp) {
delete customs[id];
delete Registry[id];
localStorage.setItem("mc_custom_apps", JSON.stringify(customs));
}
localStorage.setItem("mc_apps", JSON.stringify(OS.installed));
localStorage.setItem("mc_pos", JSON.stringify(OS.pos));
renderDesktop(); renderLib();
notify(`${id} removed from system.`, "success");
}
}

}

function renderWidgets() {
if (OS.widgetDragActive) return;
const desktop = document.getElementById('desktop');
if(!desktop) return;
let layer = document.getElementById('widget-layer');
if(!layer) {
layer = document.createElement('div');
layer.id = 'widget-layer';
layer.className = 'widget-layer';
desktop.appendChild(layer);
}
const now = new Date();
const quickNote = localStorage.getItem('mc_quick_note') || 'Double-click to edit this note.';
const weatherText = OS.weather ? `${Math.round(OS.weather.temp)}°${OS.settings.temperatureUnit} • ${OS.weather.label}` : 'Loading weather...';
const widgets = [
{ id: 'weather', html: `<h4>WEATHER</h4><div class="widget-main">${weatherText}</div><div class="widget-sub">${OS.weather && OS.weather.city ? OS.weather.city : 'Local estimate'}</div>` },
{ id: 'clock', html: `<h4>TIME</h4><div class="widget-main">${now.toLocaleTimeString()}</div><div class="widget-sub">System local clock</div>` },
{ id: 'calendar', html: `<h4>DATE</h4><div class="widget-main">${now.toLocaleDateString([], { month: 'long', day: 'numeric' })}</div><div class="widget-sub">${now.toLocaleDateString([], { weekday: 'long', year: 'numeric' })}</div>` },
{ id: 'system', html: `<h4>SYSTEM</h4><div class="widget-main">${OS.battery}% Battery</div><div class="widget-sub">${Object.keys(OS.running).length} app${Object.keys(OS.running).length === 1 ? '' : 's'} active</div>` },
{ id: 'notes', html: `<h4>QUICK NOTE</h4><div class="widget-main" style="font-size:1rem; line-height:1.35; white-space:pre-wrap; font-weight:600;">${quickNote}</div><div class="widget-sub">Double-click to edit</div>` }
];
layer.innerHTML = '';
widgets.forEach((widget) => {
if(!OS.widgets[widget.id]) return;
const card = document.createElement('div');
card.className = 'widget-card';
card.dataset.widgetId = widget.id;
card.innerHTML = widget.html;
const saved = OS.widgetPositions[widget.id] || {};
const startPos = {
x: typeof saved.x === 'number' ? saved.x : getDefaultWidgetPosition(widget.id).x,
y: typeof saved.y === 'number' ? saved.y : getDefaultWidgetPosition(widget.id).y
};
const clampedStart = clampWidgetPosition(startPos, layer, card);
card.style.left = `${clampedStart.x}px`;
card.style.top = `${clampedStart.y}px`;
if(widget.id === 'notes') {
card.ondblclick = () => {
const next = prompt('Quick note', localStorage.getItem('mc_quick_note') || '');
if(next === null) return;
localStorage.setItem('mc_quick_note', next.trim() || 'No reminder set.');
renderWidgets();
};
}
let widgetOffsetX = 0;
let widgetOffsetY = 0;
attachMouseDrag(card, {
onStart: (e) => {
OS.widgetDragActive = true;
const layerRect = layer.getBoundingClientRect();
const startLeft = parseFloat(card.style.left || '0');
const startTop = parseFloat(card.style.top || '0');
widgetOffsetX = e.clientX - layerRect.left - startLeft;
widgetOffsetY = e.clientY - layerRect.top - startTop;
card.classList.add('dragging');
},
onMove: (ev) => {
const layerRect = layer.getBoundingClientRect();
const rawX = ev.clientX - layerRect.left - widgetOffsetX;
const rawY = ev.clientY - layerRect.top - widgetOffsetY;
const nextPos = clampWidgetPosition({ x: rawX, y: rawY }, layer, card);
card.style.left = `${nextPos.x}px`;
card.style.top = `${nextPos.y}px`;
OS.widgetPositions[widget.id] = nextPos;
},
onEnd: () => {
const finalPos = clampWidgetPosition({
x: parseFloat(card.style.left || '0'),
y: parseFloat(card.style.top || '0')
}, layer, card);
card.style.left = `${finalPos.x}px`;
card.style.top = `${finalPos.y}px`;
OS.widgetPositions[widget.id] = finalPos;
card.classList.remove('dragging');
OS.widgetDragActive = false;
saveWidgetState();
}
});
layer.appendChild(card);
});
}

async function refreshWeather(force = false) {
if(!OS.widgets.weather && !OS.running['WeatherDesk'] && !force) return;
try {
const stateKey = OS.settings.weatherState || 'NY';
const state = US_STATE_WEATHER[stateKey] || US_STATE_WEATHER.NY;
const unit = OS.settings.temperatureUnit === 'F' ? 'fahrenheit' : 'celsius';
const windUnit = OS.settings.temperatureUnit === 'F' ? 'mph' : 'kmh';
const endpoint = `https://api.open-meteo.com/v1/forecast?latitude=${state.lat}&longitude=${state.lon}&current=temperature_2m,weather_code,wind_speed_10m&temperature_unit=${unit}&wind_speed_unit=${windUnit}`;
const data = await fetch(endpoint).then(r => r.json());
const code = data.current.weather_code;
const label = weatherCodeLabel(code);
OS.weather = {
 temp: Number(data.current.temperature_2m),
 label,
 city: `${state.name} (${stateKey})`,
 wind: Math.round(Number(data.current.wind_speed_10m) || 0),
 updatedAt: new Date().toLocaleTimeString()
};
localStorage.setItem("mc_weather", JSON.stringify(OS.weather));
renderWidgets();
if (OS.running['WeatherDesk']) OS.running['WeatherDesk'].querySelector('.win-body').innerHTML = Registry['WeatherDesk'].content();
} catch (err) {
addLog(`Weather widget refresh skipped: ${err.message}`);
}
}

function weatherCodeLabel(code) {
if(code === 0) return 'Clear';
if([1,2,3].includes(code)) return 'Partly Cloudy';
if([45,48].includes(code)) return 'Fog';
if([51,53,55,56,57].includes(code)) return 'Drizzle';
if([61,63,65,66,67,80,81,82].includes(code)) return 'Rain';
if([71,73,75,77,85,86].includes(code)) return 'Snow';
if([95,96,99].includes(code)) return 'Thunder';
return 'Stable';
}

center.appendChild(note);
playClickSound(type === 'warning' ? 280 : type === 'success' ? 620 : 420, 0.05);

if (value.startsWith('url(')) return `${value} center/${OS.settings.wallpaperFit} no-repeat`;
if (value.includes('gradient(')) return value;
return `url('${value}') center/${OS.settings.wallpaperFit} no-repeat`;
}

function createAccount() {
const username = (document.getElementById('new-user')?.value || '').trim();
const mode = document.getElementById('acc-mode')?.value || 'password';
const pass = (document.getElementById('new-pass')?.value || '').trim();
if (!username) return showAuthError('USERNAME REQUIRED');
if (mode === 'password' && pass.length < 3) return showAuthError('PASSWORD TOO SHORT');
OS.account.username = username.slice(0, 24);
OS.account.mode = mode === 'passwordless' ? 'passwordless' : 'password';
OS.account.avatar = OS.pendingAvatar || '';
OS.pass = OS.account.mode === 'password' ? pass : '';
OS.account.pass = OS.pass;
setPass(OS.pass);
persistAccount();
OS.firstRun = false;
renderAuth();
updateLockscreenHeader();
showAuthError('');
notify('Account created.', 'success');
addLog(`Account provisioned for ${OS.account.username}.`);
}

if (!entered) return;
if (entered !== OS.pass) {
notify('Incorrect password. Factory reset canceled.', 'error');
return;
}
if (confirm('This will erase account, installed apps, widgets, and settings. Continue?')) runFactoryReset();

const next = Math.max(0, ...existing) + 1;

}

y: 170 + (Math.floor(index / 6) * 130)
};
}

if (!menu) return;
menu.style.display = 'block';
menu.classList.add('menu-open');
menu.setAttribute('aria-hidden', 'false');
const rect = menu.getBoundingClientRect();
const left = Math.min(x, window.innerWidth - rect.width - 12);
const top = Math.min(y, window.innerHeight - rect.height - 12);
menu.style.left = `${Math.max(12, left)}px`;
menu.style.top = `${Math.max(12, top)}px`;
}

function setupDesktopContextMenu() {
const desktop = document.getElementById('desktop');
const menu = document.getElementById('desktop-context-menu');
if (!desktop || !menu || desktop.dataset.contextMenuReady === '1') return;
desktop.addEventListener('contextmenu', (event) => {
if (event.target.closest('.icon') || event.target.closest('.widget-card')) return;
event.preventDefault();
openDesktopContextMenu(event.clientX, event.clientY);
});
document.addEventListener('click', (event) => {
if (!event.target.closest('#desktop-context-menu')) closeDesktopContextMenu();
});
document.addEventListener('contextmenu', (event) => {
if (!event.target.closest('#desktop') && !event.target.closest('#desktop-context-menu')) closeDesktopContextMenu();
});
window.addEventListener('resize', closeDesktopContextMenu);
desktop.dataset.contextMenuReady = '1';
}

position: OS.pos[id] || getDefaultDesktopPosition(id, index),
open: () => launch(id),
onMove: (x, y) => { OS.pos[id] = { x, y }; localStorage.setItem('mc_pos', JSON.stringify(OS.pos)); },
onDelete: () => attemptDeleteApp(id)
}));
const shortcutEntries = OS.desktopShortcuts.map((item, index) => ({
type: item.kind || 'shortcut',
key: item.id,
name: item.name,
icon: item.icon || '📝',
position: Number.isFinite(item.x) && Number.isFinite(item.y) ? { x: item.x, y: item.y } : getDefaultShortcutPosition(index + OS.installed.length),
open: () => launch(item.target || 'Notepad'),
onMove: (x, y) => { item.x = x; item.y = y; saveDesktopShortcuts(); },
onDelete: () => removeDesktopShortcut(item.id)
}));
return [...appEntries, ...shortcutEntries];
}

function renderDesktop() {
const d = document.getElementById('desktop'); d.innerHTML = "";
const showBranding = !OS.settings.hideDesktopHero && (!hasCustomWallpaper() || OS.settings.keepWallpaperBranding);
if(showBranding) {
const hero = document.createElement('div');
hero.className = 'desktop-hero';
hero.innerHTML = '<h1>𝕄𝕔ℂ𝕣𝕒𝕔𝕜OS</h1><p>Made By: Patrick_Mango</p>';
d.appendChild(hero);
}
getDesktopEntries().forEach((entry) => {
const p = entry.position;
const el = document.createElement('div'); el.className = 'icon';
el.style.left = p.x+'px'; el.style.top = p.y+'px';
el.setAttribute("draggable", "true");
el.innerHTML = `<div>${entry.icon}</div><span>${entry.name}</span>`;
el.ondragstart = (e) => startDrag(e, entry.key);
el.ondragend = (e) => endDrag(e);
el.ondblclick = () => entry.open();
let iconOffsetX = 0;
let iconOffsetY = 0;
attachMouseDrag(el, {
onStart: (e) => {
iconOffsetX = e.clientX - el.offsetLeft;
iconOffsetY = e.clientY - el.offsetTop;
el.classList.add('dragging');
},
onMove: (ev) => {
const nx = ev.clientX - iconOffsetX;
const ny = ev.clientY - iconOffsetY;
el.style.left = nx + 'px';
el.style.top = ny + 'px';
entry.onMove(nx, ny);
document.getElementById('delete-bin').classList.toggle('delete-ready', iconOverDeleteBin(el));
},
onEnd: () => {
el.classList.remove('dragging');
const bin = document.getElementById('delete-bin');
const overlapsBin = iconOverDeleteBin(el);
bin.classList.remove('delete-ready');
if (overlapsBin) entry.onDelete();
}
});
d.appendChild(el);
});
renderWidgets();
}

function launch(id) {
if(OS.running[id]) { focusWin(id); return; }
if(!Registry[id]) return;
addLog(`Launched module: ${id}`);
notify(`Opened ${id}.`);
if (id === 'PhotoBooth') setTimeout(startPhotoBooth, 40);
if (id === 'QuickSketch') setTimeout(initSketchPad, 40);
if (id === 'MarkdownPad') setTimeout(updateMarkdownPreview, 40);
const w = document.createElement('div'); w.className = 'window';
w.style.width='950px'; w.style.height='650px'; w.style.left='100px'; w.style.top='80px'; w.style.zIndex = ++OS.z;
w.innerHTML = `<div class="win-head">
<div style="display:flex; align-items:center; gap:10px;">
<span style="font-size:1.2rem;">${Registry[id].icon}</span>
<span style="font-weight:700; font-size:0.8rem; letter-spacing:1px; opacity:0.8;">${id.toUpperCase()}</span>
</div>
<div class="win-ctrls">
<span onclick="toggleIntegratedFullscreen('${id}')">⛶</span>
<span onclick="min('${id}')">─</span>
<span style="font-weight:bold; color:#ff4b4b;" onclick="closeW('${id}')">✕</span>
</div>
</div>
<div class="win-body">${Registry[id].content()}</div>
<div class="resizer"></div>`
; document.body.appendChild(w); OS.running[id] = w;
w.querySelector('.win-head').onmousedown = (e) => {
if(w.dataset.fs === "true" || e.button !== 0) return;
focusWin(id);
e.preventDefault();
w.classList.add('dragging');
let ox = e.clientX - w.offsetLeft, oy = e.clientY - w.offsetTop;
let raf = null;
let pending = null;
const applyMove = () => {
if(!pending) return;
const nx = pending.clientX - ox;
const ny = pending.clientY - oy;
w.style.left = nx + 'px';
w.style.top = ny + 'px';
raf = null;
};
const onMove = (ev) => {
pending = ev;
if(!raf) raf = requestAnimationFrame(applyMove);
};
const onUp = () => {
window.removeEventListener('mousemove', onMove);
window.removeEventListener('mouseup', onUp);
if(raf) cancelAnimationFrame(raf);
w.classList.remove('dragging');
};
window.addEventListener('mousemove', onMove);
window.addEventListener('mouseup', onUp);
};
w.querySelector('.resizer').onmousedown = (e) => {
if(e.button !== 0) return;
e.preventDefault();
w.classList.add('resizing');
let sw = w.offsetWidth, sh = w.offsetHeight, sx = e.clientX, sy = e.clientY;
let raf = null;
let pending = null;
const applyResize = () => {
if(!pending) return;
const nw = Math.max(420, sw + (pending.clientX - sx));
const nh = Math.max(280, sh + (pending.clientY - sy));
w.style.width = nw + 'px';
w.style.height = nh + 'px';
raf = null;
};
const onMove = (ev) => {
pending = ev;
if(!raf) raf = requestAnimationFrame(applyResize);
};
const onUp = () => {
window.removeEventListener('mousemove', onMove);
window.removeEventListener('mouseup', onUp);
if(raf) cancelAnimationFrame(raf);
w.classList.remove('resizing');
};
window.addEventListener('mousemove', onMove);
window.addEventListener('mouseup', onUp);
};
updateTask();
}

function focusWin(id) { if(OS.running[id]) OS.running[id].style.zIndex = ++OS.z; updateTask(); }
function closeW(id) { if(OS.running[id]) { OS.running[id].remove(); delete OS.running[id]; updateTask(); addLog(`Closed module: ${id}`); notify(`Closed ${id}.`, "warning"); } }
function min(id) { if(OS.running[id]) { OS.running[id].style.display = 'none'; updateTask(); } }

function toggleIntegratedFullscreen(id) {
const w = OS.running[id];
if(w.dataset.fs !== "true") {
w.dataset.oldW = w.style.width; w.dataset.oldH = w.style.height;
w.dataset.oldL = w.style.left; w.dataset.oldT = w.style.top;
w.style.width = '100vw'; w.style.height = `calc(100vh - var(--top-bar-h) - var(--taskbar-h))`;
w.style.top = `var(--top-bar-h)`; w.style.left = '0';
w.style.borderRadius = '0'; w.dataset.fs = "true";
} else {
w.style.width = w.dataset.oldW; w.style.height = w.dataset.oldH;
w.style.left = w.dataset.oldL; w.style.top = w.dataset.oldT;
w.style.borderRadius = '20px'; w.dataset.fs = "false";
}
}

function updateTask() {
const tl = document.getElementById('task-list'); tl.innerHTML = "";
const ordered = [...new Set([...(OS.pinned || []), ...Object.keys(OS.running)])];
ordered.forEach(id => {
if(!Registry[id]) return;
const running = !!OS.running[id];
const t = document.createElement('div');
t.className = 'task-tab' + (running && OS.running[id].style.display!=='none' ? ' active' : '') + (!running ? ' pinned-only' : '');
t.innerText = `${Registry[id].icon} ${id}`;
t.onclick = () => {
if(!running) {
launch(id);
return;
}
if(OS.running[id].style.display === 'none') {
OS.running[id].style.display = 'flex';
focusWin(id);
} else {
focusWin(id);
}
};
tl.appendChild(t);
});
}

/* --- TERMINAL COMMAND ENGINE --- */
function cmd(e, el) {
if(e.key !== "Enter") return;

const out = document.getElementById('t-out');
const raw = el.value.trim();
const [command, ...args] = raw.split(/\s+/);
const v = (command || "").toLowerCase();

out.innerHTML += `<div><span style="color:white;">></span> ${raw}</div>`;

const print = (text, tone = "normal") => {
const color = tone === "error" ? "var(--danger)" : (tone === "muted" ? "#888" : "#ddd");
out.innerHTML += `<div style="color:${color};">${text}</div>`;
};

if(!v) {
el.value = "";
return;
}

if(v === "help") {
print("Available commands:");
print("help, clear, exit, logs, apps, ver, time, date, battery, whoami, echo, calc, open, close, install, uninstall, ls, pwd, ps, weather, todo, note, theme, reboot");
}
else if(v === "clear") out.innerHTML = "";
else if(v === "logs") print(`Total session events: ${OS.logs.length}`);
else if(v === "apps" || v === "ls") print(`Installed: ${OS.installed.join(', ')}`);
else if(v === "ver") print("𝕄𝕔ℂ𝕣𝕒𝕔𝕜OS Kernel v1.0.4. Build 2026.03.10");
else if(v === "time") print(new Date().toLocaleTimeString());
else if(v === "date") print(new Date().toLocaleDateString());
else if(v === "battery") print(`Battery status: ${OS.battery}%`);
else if(v === "whoami") print("operator@mc-crackos");
else if(v === "echo") print(args.join(' ') || "");
else if(v === "pwd") print("/system/desktop");
else if(v === "ps") print(`Running: ${Object.keys(OS.running).join(', ') || 'none'}`);
else if(v === "weather") {
if (OS.weather) print(`${OS.weather.city}: ${Math.round(OS.weather.temp)}°${OS.settings.temperatureUnit}, ${OS.weather.label}`);
else print("Weather data unavailable.", "muted");
}
else if(v === "todo") {
if(args[0] === 'add') {
const task = args.slice(1).join(' ').trim();
if(!task) print('Usage: todo add <task>', 'muted');
else {
const todos = getTodos();
todos.push(task);
localStorage.setItem('mc_todos', JSON.stringify(todos));
print(`Added todo: ${task}`);
if (OS.running['TodoBoard']) OS.running['TodoBoard'].querySelector('.win-body').innerHTML = Registry['TodoBoard'].content();
}
} else if(args[0] === 'list') {
const todos = getTodos();
print(todos.length ? todos.map((t,i)=>`${i+1}. ${t}`).join(' | ') : 'No todo items.');
} else print('Usage: todo <add|list> ...', 'muted');
}
else if(v === "note") {
const text = args.join(' ');
localStorage.setItem('mc_note', text);
print('Notepad content updated.');
if (OS.running['Notepad']) OS.running['Notepad'].querySelector('.win-body').innerHTML = Registry['Notepad'].content();
}
else if(v === "theme") {
const color = args[0];
if(!color) print('Usage: theme <css-color>', 'muted');
else { applyAccent(color); print(`Accent set to ${color}`); }
}
else if(v === "reboot") {
print('Rebooting 𝕄𝕔ℂ𝕣𝕒𝕔𝕜OS shell session...');
setTimeout(() => { out.innerHTML = '𝕄𝕔ℂ𝕣𝕒𝕔𝕜 Kernel Console [Version19.0.4]<br>(c) 2026 𝕄𝕔ℂ𝕣𝕒𝕔𝕜 Industries.<br><br>'; }, 300);
}
else if(v === "calc") {
const expr = args.join(' ');
if(!expr) print("Usage: calc <expression>", "muted");
else {
try { print(`${expr} = ${eval(expr)}`); }
catch(_) { print("Invalid expression.", "error"); }
}
}
else if(v === "open") {
const appName = args.join(' ');
if(!appName) print("Usage: open <app>", "muted");
else {
const match = Object.keys(Registry).find(name => name.toLowerCase() === appName.toLowerCase());
if(match && OS.installed.includes(match)) {
launch(match);
print(`Launched ${match}.`);
} else if(match) {
print(`${match} is not installed. Try: install ${match}`, "error");
} else {
print(`Unknown app: ${appName}`, "error");
}
}
}
else if(v === "close") {
const appName = args.join(' ');
if(!appName) print("Usage: close <app>", "muted");
else {
const runningName = Object.keys(OS.running).find(name => name.toLowerCase() === appName.toLowerCase());
if(runningName) {
closeW(runningName);
print(`Closed ${runningName}.`);
} else {
print(`${appName} is not running.`, "error");
}
}
}
else if(v === "install") {
const appName = args.join(' ');
if(!appName) print("Usage: install <app>", "muted");
else {
const match = OS.storeApps.find(name => name.toLowerCase() === appName.toLowerCase());
if(!match) print(`${appName} is not available in the store.`, "error");
else if(OS.installed.includes(match)) print(`${match} is already installed.`, "muted");
else {
install(match);
print(`${match} installed successfully.`);
}
}
}
else if(v === "uninstall") {
const appName = args.join(' ');
if(!appName) print("Usage: uninstall <app>", "muted");
else {
const match = OS.installed.find(name => name.toLowerCase() === appName.toLowerCase());
if(!match) print(`${appName} is not installed.`, "error");
else {
attemptDeleteApp(match);
}
}
}
else if(v === "exit") closeW('Terminal');
else print(`Command not found: ${v}`, "error");

el.value = "";
out.scrollTop = out.scrollHeight;
}


function startPomodoro(minutes = 25) {
if (window.mcPomodoroInterval) clearInterval(window.mcPomodoroInterval);
const status = document.getElementById('pomodoro-status');
let remaining = Math.max(Math.floor(minutes * 60), 1);
const render = () => {
const mm = String(Math.floor(remaining / 60)).padStart(2, '0');
const ss = String(remaining % 60).padStart(2, '0');
if (status) status.textContent = `Timer: ${mm}:${ss}`;
};
render();
window.mcPomodoroInterval = setInterval(() => {
remaining -= 1;
render();
if (remaining <= 0) {
clearInterval(window.mcPomodoroInterval);
window.mcPomodoroInterval = null;
if (status) status.textContent = 'Session complete!';
notify('ClockPro timer completed.', 'success');
}
}, 1000);
}

function stopPomodoro() {
if (window.mcPomodoroInterval) clearInterval(window.mcPomodoroInterval);
window.mcPomodoroInterval = null;
const status = document.getElementById('pomodoro-status');
if (status) status.textContent = 'Timer idle';
}

function startPhotoBooth() {
const video = document.getElementById('photo-video');
const status = document.getElementById('photo-status');
if (!video || !navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return;
const presets = {
  sd: { width: { ideal: 640 }, height: { ideal: 480 } },
  hd: { width: { ideal: 1280 }, height: { ideal: 720 } },
  fhd: { width: { ideal: 1920 }, height: { ideal: 1080 } }
};
const constraints = { video: presets[OS.settings.cameraResolution] || presets.hd, audio: false };
navigator.mediaDevices.getUserMedia(constraints).then(stream => {
video.srcObject = stream;
if (status) status.textContent = `Camera ready (${OS.settings.cameraResolution.toUpperCase()}).`;
applyCameraOverlay();
}).catch(() => {
if (status) status.textContent = 'Camera permission denied or unavailable.';
notify('Camera permission denied or unavailable.', 'warning');
});
}

function stopPhotoBooth() {
const video = document.getElementById('photo-video');
if (!video || !video.srcObject) return;
video.srcObject.getTracks().forEach(track => track.stop());
video.srcObject = null;
const status = document.getElementById('photo-status');
if (status) status.textContent = 'Camera stopped.';
}

function applyCameraOverlay() {
const overlay = document.getElementById('camera-grid-overlay');
if (!overlay) return;
overlay.style.display = OS.settings.cameraGrid ? 'block' : 'none';
}

function toggleCameraGrid() {
setSetting('cameraGrid', !OS.settings.cameraGrid, 'Camera grid toggled.');

}

function applyPhotoFilter(filterValue = 'none') {
const video = document.getElementById('photo-video');
if (!video) return;
video.style.filter = filterValue;
}

function mirrorPhotoPreview() {
const video = document.getElementById('photo-video');
if (!video) return;
video.dataset.mirrored = video.dataset.mirrored === 'true' ? 'false' : 'true';
video.style.transform = video.dataset.mirrored === 'true' ? 'scaleX(-1)' : 'scaleX(1)';
}

function capturePhoto() {
const video = document.getElementById('photo-video');
const canvas = document.getElementById('photo-canvas');
const output = document.getElementById('photo-output');
const timerEl = document.getElementById('photo-timer');
const qualityEl = document.getElementById('photo-quality');
const status = document.getElementById('photo-status');
if (!video || !canvas || !output || !video.videoWidth) return;
const delay = Number(timerEl ? timerEl.value : 0);
if (delay > 0 && status) status.textContent = `Capturing in ${delay}...`;
setTimeout(() => {
canvas.width = video.videoWidth;
canvas.height = video.videoHeight;
const ctx = canvas.getContext('2d');
if (video.dataset.mirrored === 'true') {
ctx.translate(canvas.width, 0);
ctx.scale(-1, 1);
}
ctx.filter = (document.getElementById('photo-filter') || {}).value || 'none';
ctx.drawImage(video, 0, 0);
const quality = Number(qualityEl ? qualityEl.value : 0.9);
output.src = canvas.toDataURL('image/jpeg', quality);
output.style.display = 'block';
saveCapturedPhoto(output.src);
if (OS.settings.cameraShutterSound) playClickSound(880, 0.05);
if (status) status.textContent = 'Photo captured.';
notify('Photo captured and saved to Files/Camera Booth.', 'success');
}, delay * 1000);
}

function playClickSound(freq = 420, duration = 0.07) {
if (!OS.settings.desktopSounds) return;
try {
const AudioCtx = window.AudioContext || window.webkitAudioContext;
if (!AudioCtx) return;
const ctx = window.mcAudioCtx || new AudioCtx();
window.mcAudioCtx = ctx;
const osc = ctx.createOscillator();
const gain = ctx.createGain();
osc.frequency.value = freq;
osc.type = 'sine';
gain.gain.value = 0.05;
osc.connect(gain);
gain.connect(ctx.destination);
osc.start();
osc.stop(ctx.currentTime + duration);
} catch (_) {}
}

function addTodo() {
const input = document.getElementById('todo-input');
const priority = document.getElementById('todo-priority');
if (!input) return;
const value = input.value.trim();
if (!value) return;
const todos = getTodos();
todos.push({ text: value, done: false, priority: priority ? priority.value : 'med', createdAt: new Date().toISOString() });
localStorage.setItem('mc_todos', JSON.stringify(todos));
input.value = '';
refreshTodoBoard();
playClickSound(480, 0.05);
}

function toggleTodoDone(index) {
const todos = getTodos();
if (!todos[index]) return;
todos[index].done = !todos[index].done;
localStorage.setItem('mc_todos', JSON.stringify(todos));
refreshTodoBoard();
}

function toggleTodoFilter() {
setSetting('todoShowCompleted', !OS.settings.todoShowCompleted, 'ToDo display updated.');
refreshTodoBoard();
}

function clearCompletedTodos() {
const todos = getTodos().filter(item => !item.done);
localStorage.setItem('mc_todos', JSON.stringify(todos));
refreshTodoBoard();
}

function removeTodo(index) {
const todos = getTodos();
todos.splice(index, 1);
localStorage.setItem('mc_todos', JSON.stringify(todos));
refreshTodoBoard();
}

function runConverter() {
const type = document.getElementById('conv-type');
const valueEl = document.getElementById('conv-value');
const output = document.getElementById('conv-output');
if (!type || !valueEl || !output) return;
const value = Number(valueEl.value);
if (Number.isNaN(value)) {
output.textContent = 'Enter a numeric value.';
return;
}
let result = '';
if (type.value === 'length') result = `${value} m = ${(value * 3.28084).toFixed(2)} ft | ${value} ft = ${(value / 3.28084).toFixed(2)} m`;
else if (type.value === 'temp') result = `${value}°C = ${(value * 9 / 5 + 32).toFixed(2)}°F | ${value}°F = ${((value - 32) * 5 / 9).toFixed(2)}°C`;
else result = `${value} kg = ${(value * 2.20462).toFixed(2)} lb | ${value} lb = ${(value / 2.20462).toFixed(2)} kg`;
output.textContent = result;
}


function renderWorldClocks() {
const zones = [['New York','America/New_York'],['London','Europe/London'],['Tokyo','Asia/Tokyo']];
return zones.map(([label, zone]) => `<div style="display:flex; justify-content:space-between; margin-bottom:6px;"><span>${label}</span><strong>${new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: !OS.settings.clock24h, timeZone: zone })}</strong></div>`).join('');
}

function setClockAlarm() {
const input = document.getElementById('alarm-mins');
const status = document.getElementById('clock-alarm-status');
const mins = Number(input ? input.value : 0);
if (!mins || mins < 1) { if (status) status.textContent = 'Enter at least 1 minute.'; return; }
if (window.mcClockAlarm) clearTimeout(window.mcClockAlarm);
window.mcClockAlarm = setTimeout(() => {
notify('ClockPro alarm ringing!', 'success');
playClickSound(990, 0.1);
const target = document.getElementById('clock-alarm-status');
if (target) target.textContent = 'Alarm complete.';
}, mins * 60000);
if (status) status.textContent = `Alarm set for ${mins} minute(s).`;
}

function clearClockAlarm() {
if (window.mcClockAlarm) clearTimeout(window.mcClockAlarm);
window.mcClockAlarm = null;
const status = document.getElementById('clock-alarm-status');
if (status) status.textContent = 'No alarm set.';
}

function formatStopwatch(ms) {
const total = Math.floor(ms / 100);
const minutes = String(Math.floor(total / 600)).padStart(2, '0');
const seconds = String(Math.floor((total % 600) / 10)).padStart(2, '0');
const tenths = total % 10;
return `${minutes}:${seconds}.${tenths}`;
}

function startStopwatch() {
if (!window.mcStopwatch) window.mcStopwatch = { running: false, elapsed: 0, startedAt: 0, timer: null };
const sw = window.mcStopwatch;
if (sw.running) {
sw.elapsed += Date.now() - sw.startedAt;
sw.running = false;
clearInterval(sw.timer);
sw.timer = null;
} else {
sw.startedAt = Date.now();
sw.running = true;
sw.timer = setInterval(() => {
const view = document.getElementById('clock-stopwatch');
if (view) view.textContent = formatStopwatch(sw.elapsed + (Date.now() - sw.startedAt));
}, 100);
}
}

function resetStopwatch() {
if (!window.mcStopwatch) window.mcStopwatch = { running: false, elapsed: 0, startedAt: 0, timer: null };
const sw = window.mcStopwatch;
if (sw.timer) clearInterval(sw.timer);
window.mcStopwatch = { running: false, elapsed: 0, startedAt: 0, timer: null };
const view = document.getElementById('clock-stopwatch');
if (view) view.textContent = '00:00.0';
}

function getHabits() {
try { const parsed = JSON.parse(localStorage.getItem('mc_habits')); return Array.isArray(parsed) ? parsed : []; } catch (_) { return []; }
}

function saveHabits(habits) {
localStorage.setItem('mc_habits', JSON.stringify(habits.slice(0, 50)));
}

function renderHabits() {
const habits = getHabits();
if (!habits.length) return '<div style="opacity:0.55;">No habits yet.</div>';
return habits.map((h, i) => `<div style="display:flex; justify-content:space-between; align-items:center; gap:8px; background:#101010; border:1px solid #222; border-radius:8px; padding:8px 10px; margin-bottom:6px;"><span>${h.name} <span style="opacity:0.55;">🔥 ${h.streak || 0}</span></span><div><button onclick="checkHabit(${i})" style="border:none; background:#1f1f1f; color:#fff; border-radius:6px; padding:4px 8px; margin-right:6px;">Check</button><button onclick="removeHabit(${i})" style="border:none; background:#261818; color:#ff9999; border-radius:6px; padding:4px 8px;">X</button></div></div>`).join('');
}

function refreshHabitTracker() {
if (!OS.running['HabitTracker']) return;
OS.running['HabitTracker'].querySelector('.win-body').innerHTML = Registry['HabitTracker'].content();
}

function addHabit() {
const input = document.getElementById('habit-input');
if (!input) return;
const value = input.value.trim();
if (!value) return;
const habits = getHabits();
habits.push({ name: value, streak: 0, lastCheck: '' });
saveHabits(habits);
input.value = '';
refreshHabitTracker();
}

function checkHabit(index) {
const habits = getHabits();
if (!habits[index]) return;
const today = new Date().toISOString().slice(0,10);
if (habits[index].lastCheck !== today) {
habits[index].streak = (habits[index].streak || 0) + 1;
habits[index].lastCheck = today;
}
saveHabits(habits);
refreshHabitTracker();
}

function removeHabit(index) {
const habits = getHabits();
habits.splice(index, 1);
saveHabits(habits);
refreshHabitTracker();
}

function initSketchPad() {
const canvas = document.getElementById('sketch-canvas');
if (!canvas || canvas.dataset.ready === '1') return;
const ctx = canvas.getContext('2d');
ctx.lineCap = 'round';
ctx.strokeStyle = window.mcSketchColor || '#000000';
ctx.lineWidth = window.mcSketchSize || 3;
let drawing = false;
const draw = (e) => {
if (!drawing) return;
const r = canvas.getBoundingClientRect();
ctx.lineTo((e.clientX - r.left) * (canvas.width / r.width), (e.clientY - r.top) * (canvas.height / r.height));
ctx.stroke();
};
canvas.addEventListener('pointerdown', (e) => { drawing = true; const r = canvas.getBoundingClientRect(); ctx.beginPath(); ctx.moveTo((e.clientX-r.left)*(canvas.width/r.width), (e.clientY-r.top)*(canvas.height/r.height)); });
canvas.addEventListener('pointermove', draw);
canvas.addEventListener('pointerup', () => drawing = false);
canvas.addEventListener('pointerleave', () => drawing = false);
canvas.dataset.ready = '1';
}

function setSketchColor(color) { window.mcSketchColor = color; const canvas=document.getElementById('sketch-canvas'); if (!canvas) return; canvas.getContext('2d').strokeStyle = color; }
function setSketchSize(size) { window.mcSketchSize = Number(size); const canvas=document.getElementById('sketch-canvas'); if (!canvas) return; canvas.getContext('2d').lineWidth = Number(size); }
function clearSketch() { const canvas=document.getElementById('sketch-canvas'); if (!canvas) return; const ctx=canvas.getContext('2d'); ctx.clearRect(0,0,canvas.width,canvas.height); }

function playFocusTone(freq = 140) {
const AudioCtx = window.AudioContext || window.webkitAudioContext;
if (!AudioCtx) return;
if (!window.mcFocusCtx) window.mcFocusCtx = new AudioCtx();
stopFocusTone();
const osc = window.mcFocusCtx.createOscillator();
const gain = window.mcFocusCtx.createGain();
osc.type = 'sine';
osc.frequency.value = freq;
gain.gain.value = 0.03;
osc.connect(gain);
gain.connect(window.mcFocusCtx.destination);
osc.start();
window.mcFocusOsc = osc;
const status = document.getElementById('focus-status');
if (status) status.textContent = `Playing tone ${freq}Hz`;
}

function stopFocusTone() {
if (window.mcFocusOsc) {
window.mcFocusOsc.stop();
window.mcFocusOsc = null;
}
const status = document.getElementById('focus-status');
if (status) status.textContent = 'Idle';
}

try {
const res = eval(document.getElementById('c-in').value);
document.getElementById('c-in').value = res;
} catch(e) {
document.getElementById('c-in').value = "ERROR";
}
}
