<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>McCrackOS V7.5 - Power User Edition</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg-blur: blur(25px);
            --panel-bg: rgba(10, 10, 10, 0.95);
            --win-bg: #0d0d0d;
            --accent: #0078d4;
            --border: 1px solid rgba(255, 255, 255, 0.12);
            --shadow: 0 30px 60px rgba(0,0,0,0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-user-select: none; user-select: none; }
        
        body { height: 100vh; width: 100vw; overflow: hidden; background: #000; color: white; }

        /* --- SYSTEM SCREENS --- */
        #boot-screen {
            position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 10000;
        }
        .spinner { width: 40px; height: 40px; border: 3px solid #222; border-top-color: #fff; border-radius: 50%; animation: spin 1s linear infinite; margin-top: 20px; }

        #login-screen {
            position: fixed; inset: 0; display: none; background: rgba(0,0,0,0.5); 
            backdrop-filter: blur(40px); z-index: 9000; align-items: center; justify-content: center;
        }
        .login-card { background: var(--panel-bg); padding: 40px; border-radius: 20px; border: var(--border); width: 350px; text-align: center; box-shadow: var(--shadow); }
        .login-card input { width: 100%; padding: 12px; margin: 15px 0; background: #1a1a1a; border: var(--border); border-radius: 8px; color: white; text-align: center; outline: none; }
        .login-card button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* --- DESKTOP --- */
        #desktop { position: absolute; inset: 0 0 60px 0; display: none; z-index: 100; padding: 15px; }
        .icon { 
            position: absolute; width: 90px; height: 100px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; border-radius: 10px; cursor: pointer; 
        }
        .icon:hover { background: rgba(255,255,255,0.1); }
        .icon div { font-size: 42px; margin-bottom: 5px; }
        .icon span { font-size: 0.75rem; text-align: center; text-shadow: 0 2px 4px #000; }

        /* --- START MENU (APP LIBRARY) --- */
        #start-menu {
            position: absolute; bottom: 70px; left: 15px; width: 300px; height: 400px;
            background: var(--panel-bg); border: var(--border); border-radius: 15px;
            backdrop-filter: var(--bg-blur); display: none; flex-direction: column;
            padding: 20px; z-index: 9999; box-shadow: var(--shadow);
        }
        .start-item { display: flex; align-items: center; gap: 15px; padding: 10px; border-radius: 8px; cursor: pointer; }
        .start-item:hover { background: rgba(255,255,255,0.1); }

        /* --- WINDOWS --- */
        .window { 
            position: absolute; background: var(--win-bg); border-radius: 12px; border: var(--border); 
            display: flex; flex-direction: column; overflow: hidden; box-shadow: var(--shadow); 
        }
        .win-head { background: #181818; padding: 12px 18px; display: flex; justify-content: space-between; cursor: move; }
        .win-body { flex: 1; background: #000; position: relative; overflow: auto; }
        .win-controls span { margin-left: 15px; cursor: pointer; opacity: 0.7; }
        .win-controls span:hover { opacity: 1; }
        .resizer { position: absolute; bottom: 0; right: 0; width: 15px; height: 15px; cursor: nwse-resize; }

        /* --- TASKBAR --- */
        #taskbar {
            position: absolute; bottom: 0; left: 0; right: 0; height: 60px;
            background: var(--panel-bg); backdrop-filter: var(--bg-blur);
            display: flex; align-items: center; padding: 0 15px; z-index: 8500; border-top: var(--border);
        }
        #task-apps { flex: 1; display: flex; justify-content: flex-end; gap: 10px; padding-right: 20px; }
        .task-tab { padding: 8px 15px; background: #222; border-radius: 6px; font-size: 0.8rem; cursor: pointer; border: 1px solid transparent; }
        .task-tab.active { border-color: var(--accent); background: #333; }

        /* --- APP STYLES --- */
        .store-card { background: #111; padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn-install { background: var(--accent); border: none; padding: 6px 12px; border-radius: 5px; color: white; cursor: pointer; }
        .btn-fullscreen { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); color: white; border: var(--border); padding: 5px 10px; border-radius: 5px; cursor: pointer; z-index: 10; }
        
        .music-ui { padding: 30px; text-align: center; }
        .viz-box { display: flex; gap: 4px; height: 40px; justify-content: center; align-items: flex-end; margin: 20px 0; }
        .viz-bar { width: 5px; background: var(--accent); border-radius: 3px; }
        .playing .viz-bar { animation: barDance 0.6s infinite alternate; }

        @keyframes barDance { from { height: 5px; } to { height: 35px; } }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body id="os-root">

    <div id="boot-screen">
        <h1 style="letter-spacing: 4px;">McCrackOS V7.5</h1>
        <div class="spinner"></div>
    </div>

    <div id="login-screen">
        <div class="login-card">
            <h2>System Login</h2>
            <input type="password" id="pass-field" placeholder="Enter Password">
            <button onclick="login()">Access OS</button>
            <p id="login-err" style="color:red; font-size: 0.7rem; margin-top: 10px;"></p>
        </div>
    </div>

    <div id="desktop"></div>

    <div id="start-menu">
        <h4 style="margin-bottom: 15px; opacity: 0.6;">App Library</h4>
        <div id="app-list-container"></div>
    </div>

    <div id="taskbar">
        <div id="start-btn" onclick="toggleStartMenu()" style="cursor:pointer; font-size: 24px; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 10px;">💠</div>
        <div id="task-apps"></div>
        <div id="system-tray" style="text-align: right; border-left: 1px solid #333; padding-left: 15px;">
            <div id="time" style="font-weight: bold; font-size: 0.9rem;"></div>
            <div id="date" style="font-size: 0.7rem; opacity: 0.5;"></div>
        </div>
    </div>

    <script>
        /* --- OS DATA & REGISTRY --- */
        const OS = {
            z: 1000,
            pass: localStorage.getItem("mcPass") || "1234",
            bg: localStorage.getItem("mcBG") || "linear-gradient(135deg, #0f0c29, #302b63, #24243e)",
            installed: JSON.parse(localStorage.getItem("mcApps")) || ["Notepad", "Browser", "Terminal", "Files", "Store", "Settings", "Music"],
            icons: JSON.parse(localStorage.getItem("mcIcons")) || [
                {id: "Notepad", x: 30, y: 30}, {id: "Browser", x: 30, y: 150},
                {id: "Terminal", x: 30, y: 270}, {id: "Files", x: 140, y: 30},
                {id: "Store", x: 140, y: 150}, {id: "Settings", x: 140, y: 270},
                {id: "Music", x: 250, y: 30}
            ],
            running: {}
        };

        const Registry = {
            Notepad: { icon: "📝", content: () => `<textarea style="width:100%;height:100%;background:transparent;color:white;padding:20px;border:none;outline:none;resize:none;font-family:monospace;">${localStorage.getItem('note') || ''}</textarea>` },
            Browser: { 
                icon: "🌐", 
                content: () => `
                    <button class="btn-fullscreen" onclick="extFullscreen('https://siuuu.pagostepeapulco.gob.mx/')">Fullscreen</button>
                    <iframe src="https://siuuu.pagostepeapulco.gob.mx/" style="width:100%;height:100%;border:none;background:white;"></iframe>` 
            },
            Terminal: { icon: "⌨️", content: () => `<div id="t-out" style="padding:15px;color:#0f0;font-family:monospace;height:calc(100% - 40px);overflow:auto;">McCrackOS Kernel v7.5...</div><input onkeydown="handleCmd(event, this)" style="width:100%;background:#000;border:none;border-top:1px solid #333;color:#0f0;padding:10px;outline:none;font-family:monospace;">` },
            Files: { icon: "📁", content: () => `<div style="padding:20px;"><h3>File Manager</h3><hr><br><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;"><div>📁 Documents</div><div>📁 Downloads</div><div>📁 Pictures</div><div>💿 System (C:)</div></div></div>` },
            Store: { 
                icon: "🛒", 
                content: () => `
                    <div style="padding:20px;">
                        <h3>App Store</h3><br>
                        <div class="store-card"><span>🧮 Calculator</span><button class="btn-install" onclick="installApp('Calculator')">Install</button></div>
                        <div class="store-card"><span>💬 McCrackChat</span><button class="btn-install" onclick="installApp('McCrackChat')">Install</button></div>
                        <div class="store-card"><span>🌍 McCrackSites</span><button class="btn-install" onclick="installApp('McCrackSites')">Install</button></div>
                    </div>` 
            },
            Settings: {
                icon: "⚙️",
                content: () => `
                    <div style="padding:20px;">
                        <h4>Personalization</h4><br>
                        <p>Background Image:</p>
                        <input type="file" onchange="applyWall(this)" style="font-size:0.7rem; margin-bottom:15px;">
                        <button onclick="applyColor('#000')" style="background:#000;border:1px solid #444;width:30px;height:30px;cursor:pointer;"></button>
                        <button onclick="applyColor('linear-gradient(45deg,#222,#000)')" style="background:linear-gradient(45deg,#222,#000);border:1px solid #444;width:30px;height:30px;cursor:pointer;"></button>
                        <hr style="margin:20px 0; opacity:0.1;">
                        <h4>Security</h4><br>
                        <input type="password" id="new-p" placeholder="New Password" style="width:180px;"><br>
                        <button onclick="setNewPass()" style="background:var(--accent);color:white;border:none;padding:5px 10px;border-radius:4px;cursor:pointer;">Update Password</button>
                    </div>`
            },
            Music: {
                icon: "🎵",
                content: () => `<div class="music-ui" id="music-p">
                    <div style="font-size:60px; margin-bottom:10px;">💿</div>
                    <div id="m-name" style="font-weight:bold;">Track_01.mp3</div>
                    <div class="viz-box">${Array(10).fill('<div class="viz-bar"></div>').join('')}</div>
                    <button onclick="document.getElementById('music-p').classList.toggle('playing')">Play / Pause</button>
                </div>`
            },
            Calculator: { icon: "🧮", content: () => `<div style="padding:20px;"><input id="c-in" style="width:100%;font-size:24px;padding:10px;background:#000;color:white;border:1px solid #333;text-align:right;"><br><br><button onclick="doCalc()">Calculate</button></div>` },
            McCrackChat: { 
                icon: "💬", 
                content: () => `
                    <button class="btn-fullscreen" onclick="extFullscreen('https://patrickmango49.github.io/McCrack-Chat/')">Fullscreen</button>
                    <iframe src="https://patrickmango49.github.io/McCrack-Chat/" style="width:100%;height:100%;border:none;"></iframe>` 
            },
            McCrackSites: { icon: "🌍", content: () => `<iframe src="https://sites.google.com/view/mccrack12/" style="width:100%;height:100%;border:none;"></iframe>` }
        };

        /* --- LOGIC CORE --- */
        window.onload = () => {
            document.getElementById('os-root').style.background = OS.bg;
            setTimeout(() => {
                document.getElementById('boot-screen').style.display = 'none';
                document.getElementById('login-screen').style.display = 'flex';
            }, 2500);
            updateClock();
            setInterval(updateClock, 1000);
            renderStartMenu();
        };

        function login() {
            if(document.getElementById('pass-field').value === OS.pass) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('desktop').style.display = 'block';
                renderDesktop();
            } else {
                document.getElementById('login-err').innerText = "Incorrect Password.";
            }
        }

        function renderDesktop() {
            const desk = document.getElementById('desktop');
            desk.innerHTML = "";
            OS.installed.forEach(id => {
                const pos = OS.icons.find(i => i.id === id) || {id, x: 200, y: 200};
                const div = document.createElement('div');
                div.className = 'icon';
                div.style.left = pos.x + 'px';
                div.style.top = pos.y + 'px';
                div.innerHTML = `<div>${Registry[id].icon}</div><span>${id}</span>`;
                div.ondblclick = () => launchApp(id);
                
                div.onmousedown = (e) => {
                    let ox = e.clientX - div.offsetLeft, oy = e.clientY - div.offsetTop;
                    document.onmousemove = (e) => {
                        div.style.left = (e.clientX - ox) + 'px';
                        div.style.top = (e.clientY - oy) + 'px';
                        pos.x = e.clientX - ox; pos.y = e.clientY - oy;
                    };
                    document.onmouseup = () => {
                        document.onmousemove = null;
                        localStorage.setItem("mcIcons", JSON.stringify(OS.icons));
                    };
                };
                desk.appendChild(div);
            });
        }

        function renderStartMenu() {
            const container = document.getElementById('app-list-container');
            container.innerHTML = "";
            Object.keys(Registry).forEach(id => {
                const item = document.createElement('div');
                item.className = 'start-item';
                item.innerHTML = `<span>${Registry[id].icon}</span> <span>${id}</span>`;
                item.onclick = () => { launchApp(id); toggleStartMenu(); };
                container.appendChild(item);
            });
        }

        function toggleStartMenu() {
            const m = document.getElementById('start-menu');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }

        function launchApp(id) {
            if(OS.running[id]) { focusApp(id); return; }
            const win = document.createElement('div');
            win.className = 'window';
            win.style.width = '750px'; win.style.height = '480px';
            win.style.left = '120px'; win.style.top = '80px';
            win.style.zIndex = ++OS.z;
            win.innerHTML = `
                <div class="win-head">
                    <span>${Registry[id].icon} ${id}</span>
                    <div class="win-controls">
                        <span onclick="minimizeApp('${id}')">─</span>
                        <span onclick="closeApp('${id}')">✕</span>
                    </div>
                </div>
                <div class="win-body">${Registry[id].content()}</div>
                <div class="resizer"></div>
            `;
            document.body.appendChild(win);
            OS.running[id] = win;
            makeMovable(win);
            makeResizable(win);
            updateTaskbar();
        }

        function closeApp(id) { OS.running[id].remove(); delete OS.running[id]; updateTaskbar(); }
        function minimizeApp(id) { OS.running[id].style.display = 'none'; updateTaskbar(); }
        function focusApp(id) { 
            OS.running[id].style.display = 'flex'; 
            OS.running[id].style.zIndex = ++OS.z; 
            updateTaskbar();
        }

        function updateTaskbar() {
            const t = document.getElementById('task-apps');
            t.innerHTML = "";
            Object.keys(OS.running).forEach(id => {
                const tab = document.createElement('div');
                tab.className = `task-tab ${OS.running[id].style.zIndex == OS.z ? 'active' : ''}`;
                tab.innerText = id;
                tab.onclick = () => focusApp(id);
                t.appendChild(tab);
            });
        }

        function installApp(id) {
            if(!OS.installed.includes(id)) {
                OS.installed.push(id);
                localStorage.setItem("mcApps", JSON.stringify(OS.installed));
                renderDesktop();
                alert(id + " successfully installed to desktop.");
            } else { alert("App is already installed."); }
        }

        /* --- INTERACTION UTILS --- */
        function makeMovable(win) {
            win.querySelector('.win-head').onmousedown = (e) => {
                OS.z++; win.style.zIndex = OS.z;
                let ox = e.clientX - win.offsetLeft, oy = e.clientY - win.offsetTop;
                document.onmousemove = (ev) => { win.style.left = (ev.clientX - ox)+'px'; win.style.top = (ev.clientY - oy)+'px'; };
                document.onmouseup = () => document.onmousemove = null;
                updateTaskbar();
            };
        }

        function makeResizable(win) {
            win.querySelector('.resizer').onmousedown = (e) => {
                e.preventDefault();
                let sw = win.offsetWidth, sh = win.offsetHeight, sx = e.clientX, sy = e.clientY;
                document.onmousemove = (ev) => { win.style.width = (sw + (ev.clientX - sx))+'px'; win.style.height = (sh + (ev.clientY - sy))+'px'; };
                document.onmouseup = () => document.onmousemove = null;
            };
        }

        function extFullscreen(url) {
            const nw = window.open('about:blank', '_blank');
            nw.document.write(`<html><body style="margin:0;overflow:hidden;background:#000;"><iframe src="${url}" style="width:100vw;height:100vh;border:none;"></iframe></body></html>`);
        }

        function updateClock() {
            const d = new Date();
            document.getElementById('time').innerText = d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            document.getElementById('date').innerText = d.toLocaleDateString();
        }

        function applyWall(input) {
            if(input.files[0]) {
                const r = new FileReader();
                r.onload = (e) => { 
                    OS.bg = `url(${e.target.result}) center/cover`;
                    document.getElementById('os-root').style.background = OS.bg;
                    localStorage.setItem("mcBG", OS.bg);
                };
                r.readAsDataURL(input.files[0]);
            }
        }

        function applyColor(c) {
            OS.bg = c;
            document.getElementById('os-root').style.background = c;
            localStorage.setItem("mcBG", c);
        }

        function setNewPass() {
            const p = document.getElementById('new-p').value;
            if(p) { OS.pass = p; localStorage.setItem("mcPass", p); alert("Security update successful."); }
        }

        function handleCmd(e, input) {
            if(e.key === 'Enter') {
                const out = document.getElementById('t-out');
                out.innerHTML += `<br>> ${input.value}`;
                if(input.value === 'help') out.innerHTML += "<br>sys, clear, exit, apps";
                else if(input.value === 'clear') out.innerHTML = "Terminal cleared.";
                input.value = "";
                out.scrollTop = out.scrollHeight;
            }
        }

        function doCalc() {
            const i = document.getElementById('c-in');
            try { i.value = eval(i.value); } catch { i.value = "Error"; }
        }
    </script>
</body>
</html>
