<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>McCrackOS v3</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}

body{
    height:100vh;
    overflow:hidden;
    background:#000;
    color:white;
    transition:background .3s ease;
}

/* Boot */
#boot{
    position:fixed;
    inset:0;
    background:black;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    font-size:2.5rem;
}
.loader{
    margin-top:20px;
    width:40px;
    height:40px;
    border:4px solid #222;
    border-top:4px solid white;
    border-radius:50%;
    animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* Login */
#login{
    position:fixed;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    backdrop-filter:blur(20px);
    background:rgba(0,0,0,.8);
}
.login-box{
    background:rgba(255,255,255,.05);
    padding:40px;
    border-radius:20px;
    display:flex;
    flex-direction:column;
    gap:15px;
    width:300px;
}
.login-box input{
    padding:10px;
    border:none;
    border-radius:10px;
    background:#111;
    color:white;
}
.login-box button{
    padding:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

/* Topbar */
#topbar{
    position:absolute;
    top:0;
    left:0;
    right:0;
    height:40px;
    background:rgba(255,255,255,.05);
    backdrop-filter:blur(20px);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px;
}

/* Desktop */
#desktop{
    position:absolute;
    inset:40px 0 0 0;
    display:none;
}

/* Icons */
#icons{
    display:grid;
    grid-template-columns:repeat(auto-fill,80px);
    gap:30px;
    padding:30px;
}
.icon{
    text-align:center;
    cursor:pointer;
}
.icon div{
    font-size:40px;
}

/* Windows */
.window{
    position:absolute;
    width:500px;
    height:350px;
    background:rgba(255,255,255,.05);
    backdrop-filter:blur(20px);
    border-radius:15px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    animation:fade .2s ease;
}
@keyframes fade{from{opacity:0;transform:scale(.95);}to{opacity:1;}}
.window-header{
    padding:8px 10px;
    background:rgba(255,255,255,.08);
    display:flex;
    justify-content:space-between;
    cursor:move;
}
.window-body{flex:1;padding:10px;overflow:auto;}

/* Context */
#contextMenu{
    position:absolute;
    background:rgba(255,255,255,.05);
    backdrop-filter:blur(20px);
    padding:10px;
    border-radius:10px;
    display:none;
}
#contextMenu div{
    padding:5px 15px;
    cursor:pointer;
}
#contextMenu div:hover{
    background:rgba(255,255,255,.1);
}
</style>
</head>
<body>

<div id="boot">
    McCrackOS
    <div class="loader"></div>
</div>

<div id="login">
    <div class="login-box">
        <input id="username" placeholder="Username">
        <input type="password" placeholder="Password (optional)">
        <button onclick="enterOS()">Login</button>
    </div>
</div>

<div id="topbar">
    <div>McCrackOS</div>
    <div>
        <span id="userDisplay"></span> |
        <span onclick="lockOS()" style="cursor:pointer;">Lock</span>
    </div>
</div>

<div id="desktop">
    <div id="icons"></div>
</div>

<div id="contextMenu">
    <div onclick="location.reload()">Refresh</div>
    <div onclick="changeWallpaper()">Change Wallpaper</div>
</div>

<script>
let z=1;
let apps={
    Notepad:{icon:"📝",open:openNotepad},
    Browser:{icon:"🌐",open:openBrowser},
    Terminal:{icon:"⌨️",open:openTerminal},
    Documents:{icon:"📁",open:openDocs},
    Store:{icon:"🛒",open:openStore}
};

/* Boot */
setTimeout(()=>{
    boot.style.display="none";
    login.style.display="flex";
},2000);

function enterOS(){
    let name=username.value||"User";
    localStorage.setItem("mcUser",name);
    userDisplay.innerText=name;
    login.style.display="none";
    desktop.style.display="block";
    renderIcons();
}

function lockOS(){
    desktop.style.display="none";
    login.style.display="flex";
}

/* Desktop Icons */
function renderIcons(){
    icons.innerHTML="";
    Object.keys(apps).forEach(app=>{
        let div=document.createElement("div");
        div.className="icon";
        div.innerHTML=`<div>${apps[app].icon}</div>${app}`;
        div.ondblclick=apps[app].open;
        icons.appendChild(div);
    });
}

/* Window System */
function createWindow(title,content){
    let win=document.createElement("div");
    win.className="window";
    win.style.top=Math.random()*200+80+"px";
    win.style.left=Math.random()*200+100+"px";
    win.style.zIndex=z++;
    win.innerHTML=`
        <div class="window-header">
            <span>${title}</span>
            <span>
                <span onclick="snapLeft(this)">🡸</span>
                <span onclick="snapRight(this)">🡺</span>
                <span onclick="this.closest('.window').remove()">✖</span>
            </span>
        </div>
        <div class="window-body">${content}</div>
    `;
    document.body.appendChild(win);
    drag(win);
    win.onclick=()=>win.style.zIndex=z++;
}

function drag(el){
    let header=el.querySelector(".window-header");
    header.onmousedown=e=>{
        let ox=e.clientX-el.offsetLeft;
        let oy=e.clientY-el.offsetTop;
        document.onmousemove=e=>{
            el.style.left=e.clientX-ox+"px";
            el.style.top=e.clientY-oy+"px";
        };
        document.onmouseup=()=>document.onmousemove=null;
    };
}

function snapLeft(btn){
    let win=btn.closest(".window");
    win.style.left="0px";
    win.style.top="40px";
    win.style.width="50%";
    win.style.height="calc(100% - 40px)";
}
function snapRight(btn){
    let win=btn.closest(".window");
    win.style.left="50%";
    win.style.top="40px";
    win.style.width="50%";
    win.style.height="calc(100% - 40px)";
}

/* Apps */
function openNotepad(){
    createWindow("Notepad",
        `<textarea style="width:100%;height:100%;background:black;color:white;border:none;outline:none;"
        oninput="localStorage.setItem('note',this.value)">${localStorage.getItem('note')||""}</textarea>`
    );
}
function openBrowser(){
    createWindow("Browser",
        `<input placeholder="Enter URL" style="width:100%;padding:5px;background:#111;color:white;border:none;"
        onkeydown="if(event.key==='Enter'){this.nextElementSibling.src=this.value}">
        <iframe style="width:100%;height:90%;border:none;"></iframe>`
    );
}
function openTerminal(){
    createWindow("Terminal",
        `<div id="out"></div>
        <input style="width:100%;background:black;color:lime;border:none;padding:5px;"
        onkeydown="if(event.key==='Enter'){cmd(this)}" placeholder="help">`
    );
}
function cmd(input){
    let out=input.previousElementSibling;
    let c=input.value;
    if(c==="help") out.innerHTML+="<div>help, about, user, clear</div>";
    else if(c==="about") out.innerHTML+="<div>McCrackOS v3</div>";
    else if(c==="user") out.innerHTML+="<div>"+localStorage.getItem("mcUser")+"</div>";
    else if(c==="clear") out.innerHTML="";
    else out.innerHTML+="<div>Unknown command</div>";
    input.value="";
}

function openDocs(){
    createWindow("Documents","<div>Your files will appear here soon.</div>");
}

function openStore(){
    createWindow("App Store",
        `<button onclick="installApp('Calculator','🧮')">Install Calculator</button>`
    );
}

function installApp(name,icon){
    apps[name]={icon:icon,open:()=>createWindow(name,"<div>"+name+" App</div>")};
    renderIcons();
    alert(name+" installed!");
}

/* Wallpaper */
function changeWallpaper(){
    let options=[
        "#000",
        "linear-gradient(135deg,#000,#111)",
        "linear-gradient(135deg,#000,#1a1a1a)"
    ];
    document.body.style.background=options[Math.floor(Math.random()*options.length)];
}

/* Context */
document.addEventListener("contextmenu",e=>{
    e.preventDefault();
    contextMenu.style.display="block";
    contextMenu.style.left=e.pageX+"px";
    contextMenu.style.top=e.pageY+"px";
});
document.addEventListener("click",()=>contextMenu.style.display="none");
</script>

</body>
</html>
