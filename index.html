<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>McCrackOS V9.0 - Ultra Edition</title>
    <style>
        /* --- CORE SYSTEM VARIABLES --- */
        :root {
            --accent: #0078d4;
            --top-bar-h: 32px;
            --taskbar-h: 65px;
            --panel: rgba(10, 10, 10, 0.98);
            --win-bg: #050505;
            --border: 1px solid rgba(255, 255, 255, 0.12);
            --shadow: 0 30px 60px rgba(0,0,0,0.95);
            --blur: blur(35px);
            --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
            --trans: 0.1s cubic-bezier(0.1, 0.7, 0.1, 1);
        }

        /* --- GLOBAL RESET --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font); -webkit-user-select: none; user-select: none; }
        body { 
            height: 100vh; width: 100vw; overflow: hidden; 
            background: #000; color: white; transition: background 0.6s ease;
        }

        /* --- TOP BAR --- */
        #top-bar {
            position: fixed; top: 0; left: 0; right: 0; height: var(--top-bar-h);
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(15px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 18px; z-index: 9500; border-bottom: var(--border);
            font-size: 0.75rem; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase;
        }
        .top-right { display: flex; align-items: center; gap: 20px; }
        #lock-btn { cursor: pointer; color: #aaa; transition: 0.3s; }
        #lock-btn:hover { color: #ff4b4b; text-shadow: 0 0 10px rgba(255,75,75,0.5); }
        #battery-stat { display: flex; align-items: center; gap: 6px; color: #44ff44; }

        /* --- BOOT SEQUENCE --- */
        #boot { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; }
        .spin { width: 60px; height: 60px; border: 4px solid #111; border-top-color: var(--accent); border-radius: 50%; animation: s 0.8s linear infinite; margin-bottom: 25px; }
        @keyframes s { to { transform: rotate(360deg); } }
        .boot-text { font-family: monospace; font-size: 0.8rem; color: var(--accent); opacity: 0.8; }

        /* --- AUTHENTICATION --- */
        #login { 
            position: fixed; inset: 0; display: none; background: rgba(0,0,0,0.8); 
            backdrop-filter: var(--blur); z-index: 9000; align-items: center; justify-content: center; 
        }
        .login-box { 
            background: var(--panel); padding: 70px; border-radius: 30px; border: var(--border); 
            width: 420px; text-align: center; box-shadow: var(--shadow); 
        }
        .login-box input { 
            width: 100%; padding: 16px; margin: 25px 0; background: #111; border: var(--border); 
            border-radius: 12px; color: white; text-align: center; outline: none; font-size: 1.1rem;
            transition: 0.3s;
        }
        .login-box button { 
            width: 100%; padding: 16px; background: var(--accent); color: white; border: none; 
            border-radius: 12px; cursor: pointer; font-weight: 800; font-size: 1rem; transition: 0.3s;
        }

        /* --- WORKSPACE --- */
        #desktop { position: absolute; inset: var(--top-bar-h) 0 var(--taskbar-h) 0; display: none; z-index: 100; padding: 30px; }
        .icon { 
            position: absolute; width: 110px; height: 120px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; border-radius: 18px; cursor: pointer;
            will-change: transform, left, top;
        }
        .icon:hover { background: rgba(255,255,255,0.08); }
        .icon div { font-size: 50px; margin-bottom: 8px; pointer-events: none; }
        .icon span { font-size: 0.75rem; text-align: center; font-weight: 600; pointer-events: none; }

        /* --- DELETE ZONE --- */
        #delete-zone {
            position: fixed; bottom: 80px; right: 20px; width: 80px; height: 80px;
            background: rgba(255, 75, 75, 0.1); border: 2px dashed rgba(255, 75, 75, 0.3);
            border-radius: 50%; display: none; align-items: center; justify-content: center;
            font-size: 30px; z-index: 900; transition: 0.3s;
        }
        #delete-zone.active { background: rgba(255, 75, 75, 0.4); transform: scale(1.2); border-style: solid; }

        /* --- WINDOW ARCHITECTURE --- */
        .window { 
            position: absolute; background: var(--win-bg); border-radius: 16px; border: var(--border); 
            display: flex; flex-direction: column; overflow: hidden; box-shadow: var(--shadow);
            will-change: width, height, left, top;
        }
        .win-head { background: #121212; padding: 12px 20px; display: flex; justify-content: space-between; cursor: move; align-items: center; }
        .win-body { flex: 1; background: #000; position: relative; overflow: auto; }
        .win-ctrls { display: flex; gap: 15px; align-items: center; }
        .win-ctrls span { cursor: pointer; opacity: 0.5; transition: 0.2s; font-size: 1rem; }
        .win-ctrls span:hover { opacity: 1; }
        .resizer { position: absolute; bottom: 0; right: 0; width: 15px; height: 15px; cursor: nwse-resize; z-index: 10; }

        /* --- TASKBAR --- */
        #taskbar { 
            position: fixed; bottom: 0; left: 0; right: 0; height: var(--taskbar-h); 
            background: rgba(5, 5, 5, 0.9); backdrop-filter: blur(25px); 
            display: flex; align-items: center; padding: 0 25px; z-index: 8500; border-top: var(--border); 
        }
        #task-list { flex: 1; display: flex; gap: 10px; margin-left: 20px; }
        .task-tab { padding: 8px 16px; background: rgba(255,255,255,0.05); border-radius: 8px; font-size: 0.8rem; cursor: pointer; }
        .task-tab.active { background: var(--accent); }

        /* --- START MENU --- */
        #start-menu { 
            position: absolute; bottom: 80px; left: 20px; width: 350px; height: 500px; 
            background: var(--panel); border: var(--border); border-radius: 20px; 
            backdrop-filter: var(--blur); display: none; flex-direction: column; padding: 25px; z-index: 9999;
        }
        .start-item { display: flex; align-items: center; gap: 15px; padding: 12px; border-radius: 10px; cursor: pointer; }
        .start-item:hover { background: rgba(255,255,255,0.1); }

        /* --- APP SPECIFIC --- */
        .app-iframe { width: 100%; height: 100%; border: none; background: #000; }
        .explorer-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 15px; padding: 20px; }
        .file-item { text-align: center; padding: 15px; border-radius: 10px; background: #0a0a0a; border: 1px solid #222; cursor: pointer; }
        .store-card { background: #0a0a0a; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
        .install-btn { padding: 6px 15px; border-radius: 6px; border: none; background: var(--accent); color: white; cursor: pointer; font-weight: bold; }
        
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
    </style>
</head>
<body id="os-root">

    <div id="top-bar">
        <div>McCrackOS <span style="opacity:0.3; margin-left:10px;">V9.1.0</span></div>
        <div class="top-right">
            <div id="battery-stat"><span>100%</span> 🔋</div>
            <div id="lock-btn" onclick="lockSystem()">TERMINATE</div>
        </div>
    </div>

    <div id="boot">
        <h1 style="letter-spacing: 12px; font-weight: 200; font-size: 2.5rem;">MCCRACK<span style="font-weight:700;">OS</span></h1>
        <div class="spin"></div>
        <p class="boot-text">OPTIMIZING UI PIPELINES...</p>
    </div>

    <div id="login">
        <div class="login-box">
            <div style="font-size:60px; margin-bottom:20px;">👤</div>
            <h2 style="font-weight: 300;">SYSTEM ACCESS</h2>
            <input type="password" id="pass-in" placeholder="DECRYPT KEY">
            <button onclick="unlock()">AUTHORIZE</button>
            <p id="log-msg" style="color:#ff4b4b; font-size:0.75rem; margin-top:20px;"></p>
        </div>
    </div>

    <div id="desktop"></div>
    <div id="delete-zone">🗑️</div>

    <div id="start-menu">
        <h3 style="color: var(--accent); margin-bottom: 15px;">MODULES</h3>
        <div id="lib-cont" style="overflow-y:auto; flex:1;"></div>
    </div>

    <div id="taskbar">
        <div id="start-btn" onclick="toggleStart()" style="cursor:pointer; font-size:25px; width:50px; height:50px; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,0.06); border-radius:12px;">💠</div>
        <div id="task-list"></div>
        <div style="text-align:right;">
            <div id="clock" style="font-weight:bold; font-size:1rem;"></div>
            <div id="date" style="font-size:0.6rem; opacity:0.5;"></div>
        </div>
    </div>

    <script>
        /* --- KERNEL DATA --- */
        const OS = {
            z: 1000,
            pass: localStorage.getItem("mc_pass") || "1234",
            bg: localStorage.getItem("mc_bg") || "linear-gradient(135deg, #0f0c29, #302b63, #24243e)",
            installed: JSON.parse(localStorage.getItem("mc_apps")) || ["Browser", "Terminal", "Files", "Store", "Settings"],
            pos: JSON.parse(localStorage.getItem("mc_pos")) || {},
            running: {},
            core: ["Browser", "Store", "Terminal"]
        };

        const Registry = {
            Browser: { icon: "🌐", content: () => `<iframe class="app-iframe" src="https://siuuu.pagostepeapulco.gob.mx/"></iframe>` },
            Terminal: { icon: "⌨️", content: () => `<div id="t-out" style="padding:20px;color:#0f0;font-family:monospace;height:calc(100% - 50px);overflow:auto;">Console Ready...<br></div><input onkeydown="cmd(event, this)" style="width:100%;background:#050505;border:none;border-top:1px solid #222;color:#0f0;padding:15px;outline:none;font-family:monospace;">` },
            Files: { icon: "📁", content: () => `
                <div style="padding:25px;">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <h2>Explorer</h2>
                        <button onclick="document.getElementById('f-up').click()" style="padding:8px 15px; background:var(--accent); color:white; border:none; border-radius:5px; cursor:pointer;">Quick Upload</button>
                    </div>
                    <div class="explorer-grid">
                        <div class="file-item">📁<br>Root</div>
                        <div class="file-item">📁<br>Users</div>
                    </div>
                </div>` 
            },
            Store: { icon: "🛒", content: () => `
                <div style="padding:30px;">
                    <h1>Store</h1><br>
                    ${renderStoreItem('Calculator', 'Math Tool')}
                    ${renderStoreItem('Music', 'Audio Player')}
                    ${renderStoreItem('Notepad', 'Text Editor')}
                </div>` 
            },
            Settings: { icon: "⚙️", content: () => `
                <div style="padding:30px;">
                    <h3>Control Panel</h3><br>
                    <div style="background:#111; padding:20px; border-radius:10px; border:1px solid #222;">
                        <h4>Appearance</h4><br>
                        <p style="font-size:0.8rem; opacity:0.6;">Select a local file for wallpaper:</p><br>
                        <input type="file" id="f-up" onchange="handleFileUpload(event)" accept="image/*" style="width:100%; color:gray;"><br><br>
                        <input type="text" id="bg-url" placeholder="Or paste Image URL..." style="width:100%; background:#000; border:1px solid #333; color:white; padding:10px; border-radius:5px;"><br><br>
                        <button onclick="setBG(document.getElementById('bg-url').value)" style="width:100%; padding:10px; background:var(--accent); border:none; color:white; border-radius:5px; cursor:pointer;">Apply URL</button>
                    </div>
                </div>` 
            },
            Calculator: { icon: "🧮", content: () => `<div style="padding:40px;"><input id="c-in" style="width:100%; font-size:30px; background:#111; color:white; border:1px solid #333; padding:20px; text-align:right;"><button onclick="calcResult()" style="width:100%; padding:15px; background:var(--accent); margin-top:10px; border:none; color:white; cursor:pointer;">COMPUTE</button></div>` },
            Notepad: { icon: "📝", content: () => `<textarea oninput="localStorage.setItem('mc_note', this.value)" style="width:100%;height:100%;background:transparent;color:#ddd;padding:25px;border:none;outline:none;resize:none;font-family:monospace;">${localStorage.getItem('mc_note')||''}</textarea>` },
            Music: { icon: "🎵", content: () => `<div style="padding:50px;text-align:center;"><h2>McCrack Player</h2><p>No tracks found.</p></div>` }
        };

        /* --- CORE LOGIC --- */
        window.onload = () => {
            document.getElementById('os-root').style.background = OS.bg;
            setTimeout(() => {
                document.getElementById('boot').style.opacity = '0';
                setTimeout(() => { 
                    document.getElementById('boot').style.display = 'none'; 
                    document.getElementById('login').style.display = 'flex'; 
                }, 1000);
            }, 2500);
            updateTime(); setInterval(updateTime, 1000);
            renderLib();
        };

        function unlock() {
            if(document.getElementById('pass-in').value === OS.pass) {
                document.getElementById('login').style.display = 'none';
                document.getElementById('desktop').style.display = 'block';
                renderDesktop();
            } else {
                document.getElementById('log-msg').innerText = "ACCESS DENIED";
            }
        }

        function lockSystem() { location.reload(); }

        /* --- SMOOTH DRAG ENGINE --- */
        function makeDraggable(el, handle, isIcon = false, id = null) {
            let posX = 0, posY = 0, mouseX = 0, mouseY = 0;
            let ticking = false;

            handle.onmousedown = (e) => {
                e.preventDefault();
                if(el.dataset.fs === "true") return;
                
                mouseX = e.clientX;
                mouseY = e.clientY;
                
                if(!isIcon) focusWin(id);
                else document.getElementById('delete-zone').style.display = 'flex';

                document.onmousemove = (e) => {
                    posX = mouseX - e.clientX;
                    posY = mouseY - e.clientY;
                    mouseX = e.clientX;
                    mouseY = e.clientY;

                    if (!ticking) {
                        window.requestAnimationFrame(() => {
                            el.style.top = (el.offsetTop - posY) + "px";
                            el.style.left = (el.offsetLeft - posX) + "px";
                            
                            if(isIcon) {
                                const dz = document.getElementById('delete-zone');
                                const rect = dz.getBoundingClientRect();
                                if(mouseX > rect.left && mouseX < rect.right && mouseY > rect.top && mouseY < rect.bottom) {
                                    dz.classList.add('active');
                                } else {
                                    dz.classList.remove('active');
                                }
                            }
                            ticking = false;
                        });
                        ticking = true;
                    }
                };

                document.onmouseup = () => {
                    document.onmousemove = null;
                    if(isIcon) {
                        const dz = document.getElementById('delete-zone');
                        if(dz.classList.contains('active') && !OS.core.includes(id)) {
                            uninstall(id);
                        }
                        dz.style.display = 'none';
                        dz.classList.remove('active');
                        OS.pos[id] = {x: el.offsetLeft, y: el.offsetTop};
                        localStorage.setItem("mc_pos", JSON.stringify(OS.pos));
                    }
                };
            };
        }

        function renderDesktop() {
            const d = document.getElementById('desktop'); d.innerHTML = "";
            OS.installed.forEach(id => {
                const p = OS.pos[id] || {x: 50 + (OS.installed.indexOf(id)*120), y: 50};
                const el = document.createElement('div'); el.className = 'icon';
                el.style.left = p.x+'px'; el.style.top = p.y+'px';
                el.innerHTML = `<div>${Registry[id].icon}</div><span>${id}</span>`;
                el.ondblclick = () => launch(id);
                makeDraggable(el, el, true, id);
                d.appendChild(el);
            });
        }

        function launch(id) {
            if(OS.running[id]) { focusWin(id); return; }
            const w = document.createElement('div'); w.className = 'window';
            w.style.width='800px'; w.style.height='550px'; w.style.left='150px'; w.style.top='100px'; w.style.zIndex = ++OS.z;
            w.innerHTML = `
                <div class="win-head">
                    <div style="display:flex;gap:10px;align-items:center;"><span>${Registry[id].icon}</span><small>${id}</small></div>
                    <div class="win-ctrls">
                        <span onclick="toggleFS('${id}')">⛶</span>
                        <span onclick="min('${id}')">─</span>
                        <span style="color:#ff4b4b" onclick="closeW('${id}')">✕</span>
                    </div>
                </div>
                <div class="win-body">${Registry[id].content()}</div>
                <div class="resizer"></div>
            `;
            document.body.appendChild(w); OS.running[id] = w;
            makeDraggable(w, w.querySelector('.win-head'), false, id);
            
            w.querySelector('.resizer').onmousedown = (e) => {
                let sw=w.offsetWidth, sh=w.offsetHeight, sx=e.clientX, sy=e.clientY;
                document.onmousemove = (ev) => {
                    w.style.width = (sw+(ev.clientX-sx))+'px';
                    w.style.height = (sh+(ev.clientY-sy))+'px';
                };
                document.onmouseup = () => document.onmousemove = null;
            };
            updateTask();
        }

        function toggleFS(id) {
            const w = OS.running[id];
            if(w.dataset.fs !== "true") {
                w.dataset.old = JSON.stringify({w:w.style.width, h:w.style.height, l:w.style.left, t:w.style.top});
                w.style.width = '100vw'; w.style.left = '0';
                w.style.top = 'var(--top-bar-h)';
                w.style.height = 'calc(100vh - var(--top-bar-h) - var(--taskbar-h))';
                w.style.borderRadius = '0'; w.dataset.fs = "true";
            } else {
                const o = JSON.parse(w.dataset.old);
                w.style.width = o.w; w.style.height = o.h; w.style.left = o.l; w.style.top = o.t;
                w.style.borderRadius = '16px'; w.dataset.fs = "false";
            }
        }

        function uninstall(id) {
            OS.installed = OS.installed.filter(a => a !== id);
            localStorage.setItem("mc_apps", JSON.stringify(OS.installed));
            renderDesktop(); renderLib();
            if(OS.running[id]) closeW(id);
        }

        function install(id) {
            if(!OS.installed.includes(id)) {
                OS.installed.push(id);
                localStorage.setItem("mc_apps", JSON.stringify(OS.installed));
                renderDesktop(); renderLib();
                launch('Store');
            }
        }

        function handleFileUpload(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => { setBG(ev.target.result); };
                reader.readAsDataURL(file);
            }
        }

        function setBG(u) {
            if(!u) return;
            OS.bg = u.includes('data:') || u.includes('http') ? `url(${u}) center/cover` : u;
            document.getElementById('os-root').style.background = OS.bg;
            localStorage.setItem("mc_bg", OS.bg);
        }

        function renderStoreItem(id, d) {
            const has = OS.installed.includes(id);
            return `<div class="store-card"><div><strong>${id}</strong><br><small>${d}</small></div>
            <button class="install-btn" onclick="install('${id}')" ${has?'disabled style="opacity:0.3"':''}>${has?'Deployed':'Get'}</button></div>`;
        }

        function renderLib() {
            const c = document.getElementById('lib-cont'); c.innerHTML = "";
            OS.installed.forEach(id => {
                const i = document.createElement('div'); i.className = 'start-item';
                i.innerHTML = `<span>${Registry[id].icon}</span><strong>${id}</strong>`;
                i.onclick = () => { launch(id); toggleStart(); };
                c.appendChild(i);
            });
        }

        function focusWin(id) { OS.running[id].style.display='flex'; OS.running[id].style.zIndex = ++OS.z; updateTask(); }
        function min(id) { OS.running[id].style.display='none'; updateTask(); }
        function closeW(id) { OS.running[id].remove(); delete OS.running[id]; updateTask(); }
        function toggleStart() { const s = document.getElementById('start-menu'); s.style.display = (s.style.display==='flex')?'none':'flex'; }
        
        function updateTask() {
            const l = document.getElementById('task-list'); l.innerHTML = "";
            Object.keys(OS.running).forEach(id => {
                const t = document.createElement('div'); t.className = `task-tab ${OS.running[id].style.zIndex == OS.z ? 'active' : ''}`;
                t.innerText = id; t.onclick = () => focusWin(id); l.appendChild(t);
            });
        }

        function updateTime() {
            const d = new Date();
            document.getElementById('clock').innerText = d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            document.getElementById('date').innerText = d.toLocaleDateString([], {weekday:'short', day:'numeric', month:'short'});
        }

        function calcResult() { const i = document.getElementById('c-in'); try { i.value = eval(i.value); } catch(e) { i.value = "ERR"; } }
        function cmd(e, i) { if(e.key==='Enter'){ const o=document.getElementById('t-out'); o.innerHTML += `<br>> ${i.value}`; i.value=""; o.scrollTop=o.scrollHeight; } }
    </script>
</body>
</html>
