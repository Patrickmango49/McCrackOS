<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>McCrackOS V7.1 - Ultimate Hybrid</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root {
    --bg-blur: blur(15px);
    --panel-bg: rgba(15, 15, 15, 0.85);
    --accent: #0078d4;
    --win-border: 1px solid #444;
}
*{margin:0;padding:0;box-sizing:border-box;font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;}

body {
    height: 100vh;
    overflow: hidden;
    background: linear-gradient(135deg, #000, #111);
    background-size: cover;
    background-position: center;
    color: white;
    transition: background 0.4s ease;
}

/* --- System Screens --- */
#boot { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 2.5rem; z-index: 5000; }
.loader { margin-top: 20px; width: 40px; height: 40px; border: 4px solid #222; border-top: 4px solid white; border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

#login { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.9); backdrop-filter: var(--bg-blur); z-index: 4000; }
.login-box { background: #111; padding: 40px; border-radius: 15px; display: flex; flex-direction: column; gap: 15px; width: 320px; border: var(--win-border); box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
.login-box input { padding: 12px; background: #222; border: 1px solid #333; border-radius: 8px; color: white; outline: none; }
.login-box button { padding: 12px; border: none; border-radius: 8px; cursor: pointer; background: var(--accent); color: white; font-weight: bold; }

/* --- Desktop --- */
#desktop { position: absolute; inset: 0 0 60px 0; display: none; padding: 20px; z-index: 10; }
.icon { 
    position: absolute; width: 85px; height: 95px; 
    display: flex; flex-direction: column; align-items: center; justify-content: center; 
    cursor: pointer; text-align: center; border-radius: 10px; transition: background 0.2s;
}
.icon:hover { background: rgba(255,255,255,0.1); }
.icon div { font-size: 40px; pointer-events: none; }
.icon span { font-size: 0.8rem; margin-top: 5px; pointer-events: none; }
.pin-btn { position: absolute; top: 2px; right: 2px; font-size: 10px; opacity: 0; background: #333; padding: 2px; border-radius: 4px; }
.icon:hover .pin-btn { opacity: 1; }

/* --- Taskbar --- */
#taskbar { 
    position: absolute; bottom: 0; left: 0; right: 0; height: 60px; 
    background: var(--panel-bg); backdrop-filter: var(--bg-blur);
    display: flex; align-items: center; padding: 0 20px; z-index: 1000;
    border-top: 1px solid rgba(255,255,255,0.1);
}
#task-left { display: flex; align-items: center; gap: 8px; flex: 1; }
#task-center { display: flex; align-items: center; gap: 10px; justify-content: flex-end; flex: 3; } /* Apps to the right */

.task-item { 
    padding: 8px 14px; background: rgba(255,255,255,0.05); border-radius: 6px; 
    cursor: pointer; border: 1px solid rgba(255,255,255,0.1); font-size: 0.85rem;
    display: flex; align-items: center; gap: 8px; transition: 0.2s;
}
.task-item:hover { background: rgba(255,255,255,0.15); }

/* --- Widgets --- */
#widgets { display: flex; align-items: center; gap: 15px; margin-left: 15px; padding-left: 15px; border-left: 1px solid #333; }
.widget-clock { font-size: 0.85rem; text-align: right; min-width: 80px; }

/* --- Windows --- */
.window { 
    position: absolute; min-width: 320px; min-height: 200px; 
    background: #111; border-radius: 12px; border: var(--win-border); 
    display: flex; flex-direction: column; overflow: hidden; 
    box-shadow: 0 25px 60px rgba(0,0,0,0.7); z-index: 100;
}
.window-header { background: #1a1a1a; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; cursor: move; user-select: none; }
.window-body { flex: 1; overflow: auto; background: #000; position: relative; padding: 10px; }
.window-buttons span { margin-left: 12px; cursor: pointer; font-size: 1.1rem; }
.resizer { width: 16px; height: 16px; position: absolute; right: 0; bottom: 0; cursor: nwse-resize; z-index: 20; background: linear-gradient(135deg, transparent 50%, #444 50%); }

/* --- App Specific UI --- */
iframe { width: 100%; height: 100%; border: none; background: white; border-radius: 4px; }
button { background: #222; color: white; border: 1px solid #444; padding: 6px 12px; border-radius: 5px; cursor: pointer; margin: 3px; }
button:hover { background: #333; }
input, textarea { background: #111; color: white; border: 1px solid #333; padding: 10px; border-radius: 6px; }
</style>
</head>
<body>

<div id="boot">McCrackOS V7.1<div class="loader"></div></div>

<div id="login">
    <div class="login-box">
        <h2 style="text-align:center">User Login</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="enterOS()">Enter System</button>
        <p id="login-err" style="color:#ff4d4d; font-size:0.75rem; text-align:center;"></p>
    </div>
</div>

<div id="desktop"></div>

<div id="taskbar">
    <div id="task-left">
        <div class="task-item" style="background:var(--accent)" onclick="alert('McCrackOS V7.1\nStatus: Online')">🔘</div>
        <div id="pinned-apps" style="display: flex; gap: 5px;"></div>
    </div>
    <div id="task-center"></div>
    <div id="widgets">
        <div class="widget-clock">
            <div id="time-val"></div>
            <div id="date-val" style="font-size: 0.65rem; opacity: 0.5;"></div>
        </div>
        <div id="battery-val" style="font-size: 0.75rem;">🔋 --%</div>
    </div>
</div>

<script>
/** CORE STATE **/
let state = {
    z: 100,
    user: localStorage.getItem("mcUser") || "User",
    pass: localStorage.getItem("mcPass") || "1234",
    bg: localStorage.getItem("mcBG") || "linear-gradient(135deg, #000, #111)",
    pinned: JSON.parse(localStorage.getItem("mcPinned")) || ["Browser", "Settings"],
    icons: JSON.parse(localStorage.getItem("mcIcons")) || [
        {id: 'Notepad', x: 30, y: 30},
        {id: 'Browser', x: 30, y: 150},
        {id: 'Terminal', x: 30, y: 270},
        {id: 'Files', x: 130, y: 30},
        {id: 'Store', x: 130, y: 150},
        {id: 'Settings', x: 130, y: 270},
        {id: 'Calculator', x: 230, y: 30}
    ],
    running: {}
};

/** APP REGISTRY (Combined V5 + V7) **/
const Registry = {
    Notepad: { icon: "📝", content: () => `<textarea style="width:100%;height:100%;background:transparent;color:white;border:none;outline:none;" oninput="localStorage.setItem('note',this.value)">${localStorage.getItem("note")||""}</textarea>` },
    
    Browser: { icon: "🌐", content: () => `
        <input id="urlBar" placeholder="https://example.com" style="width:calc(100% - 100px);margin-bottom:10px;" onkeydown="if(event.key==='Enter'){this.nextElementSibling.src=this.value}">
        <button onclick="this.previousElementSibling.dispatchEvent(new KeyboardEvent('keydown',{'key':'Enter'}))">Go</button>
        <iframe src="https://siuuu.pagostepeapulco.gob.mx/"></iframe>` },
    
    Terminal: { icon: "⌨️", content: () => `<div id="out" style="font-family:monospace;color:#0f0;margin-bottom:10px;">McCrackOS Terminal... type 'help'</div><input onkeydown="if(event.key==='Enter'){cmd(this)}" placeholder=">_" style="width:100%;background:black;border:none;color:#0f0;outline:none;font-family:monospace;">` },
    
    Files: { icon: "📁", content: () => `
        <h3>File Explorer</h3><hr><br>
        <button onclick="triggerPCFiles()">📂 Open PC File System</button><br><br>
        <p>📁 Documents</p><p>📁 Downloads</p><p>📁 Pictures</p>` },
    
    Calculator: { icon: "🧮", content: () => `
        <input id="calcIn" style="width:100%;font-size:1.5rem;text-align:right;"><br>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);margin-top:10px;">
            <button onclick="calc()">=</button>
            <button onclick="calcIn.value=''">C</button>
        </div>
        <h2 id="calcOut" style="text-align:center;margin-top:20px;"></h2>` },

    Store: { icon: "🛒", content: () => `<h3>App Store</h3><p>McCrackChat and McCrackSites available for pin.</p><button onclick="alert('App installed to desktop')">Refresh</button>` },

    Settings: { icon: "⚙️", content: () => `
        <div style="padding:10px;">
            <h4>Appearance</h4><br>
            <button onclick="setBG('#000')">Pure Black</button>
            <button onclick="setBG('linear-gradient(135deg,#000,#111)')">Dark Gradient</button>
            <button onclick="setBG('linear-gradient(135deg,#111,#222)')">Soft Dark</button><br><br>
            <p>Custom Hex:</p>
            <input type="color" onchange="setBG(this.value)">
            <hr style="margin:15px 0;border:0;border-top:1px solid #333;">
            <h4>Security</h4><br>
            <input type="password" id="passSet" placeholder="New Password">
            <button onclick="savePass()">Update Password</button>
        </div>` },
    
    McCrackChat: { icon: "💬", content: () => `<iframe src="https://patrickmango49.github.io/McCrack-Chat/"></iframe>` },
    McCrackSites: { icon: "🌍", content: () => `<iframe src="https://sites.google.com/view/mccrack12/"></iframe>` }
};

/** BOOT & LOGIN **/
window.onload = () => {
    applyState();
    startSystem();
    initBattery();
};

function startSystem() {
    setTimeout(() => {
        document.getElementById('boot').style.display = 'none';
        document.getElementById('login').style.display = 'flex';
    }, 2000);
    setInterval(updateClock, 1000);
}

function enterOS() {
    const u = document.getElementById('username').value;
    const p = document.getElementById('password').value;
    if(u && p === state.pass) {
        state.user = u;
        localStorage.setItem("mcUser", u);
        document.getElementById('login').style.display = 'none';
        document.getElementById('desktop').style.display = 'block';
    } else {
        document.getElementById('login-err').innerText = "Incorrect Password. (Default is 1234)";
    }
}

/** DESKTOP & TASKBAR **/
function applyState() {
    document.body.style.background = state.bg;
    renderDesktop();
    renderPinned();
}

function renderDesktop() {
    const desk = document.getElementById('desktop');
    desk.innerHTML = "";
    state.icons.forEach(app => {
        const div = document.createElement('div');
        div.className = 'icon';
        div.style.left = app.x + 'px';
        div.style.top = app.y + 'px';
        div.innerHTML = `
            <div class="pin-btn" onclick="togglePin('${app.id}', event)">${state.pinned.includes(app.id) ? '📍' : '📌'}</div>
            <div>${Registry[app.id].icon}</div>
            <span>${app.id}</span>`;
        div.ondblclick = () => openApp(app.id);
        makeDraggableIcon(div, app);
        desk.appendChild(div);
    });
}

function renderPinned() {
    const pinBox = document.getElementById('pinned-apps');
    pinBox.innerHTML = "";
    state.pinned.forEach(id => {
        const p = document.createElement('div');
        p.className = 'task-item';
        p.style.background = 'transparent';
        p.innerHTML = Registry[id].icon;
        p.onclick = () => openApp(id);
        pinBox.appendChild(p);
    });
}

function updateTaskbar() {
    const center = document.getElementById('task-center');
    center.innerHTML = "";
    Object.keys(state.running).forEach(id => {
        const t = document.createElement('div');
        t.className = 'task-item';
        t.innerHTML = `${Registry[id].icon} ${id}`;
        t.onclick = () => focusApp(id);
        center.appendChild(t);
    });
}

/** WINDOW LOGIC **/
function openApp(id) {
    if (state.running[id]) { focusApp(id); return; }
    const win = document.createElement('div');
    win.className = 'window';
    win.style.width = '600px'; win.style.height = '400px';
    win.style.left = '200px'; win.style.top = '100px';
    win.style.zIndex = ++state.z;
    win.innerHTML = `
        <div class="window-header">
            <span>${id}</span>
            <div class="window-buttons">
                <span onclick="minimizeApp('${id}')">_</span>
                <span onclick="closeApp('${id}')">×</span>
            </div>
        </div>
        <div class="window-body">${Registry[id].content()}</div>
        <div class="resizer"></div>`;
    document.body.appendChild(win);
    state.running[id] = win;
    makeDraggableWin(win);
    makeResizableWin(win);
    updateTaskbar();
}

function focusApp(id) {
    state.running[id].style.display = 'flex';
    state.running[id].style.zIndex = ++state.z;
}

function closeApp(id) {
    state.running[id].remove();
    delete state.running[id];
    updateTaskbar();
}

function minimizeApp(id) { state.running[id].style.display = 'none'; }

/** DRAG & RESIZE **/
function makeDraggableIcon(el, data) {
    el.onmousedown = (e) => {
        let ox = e.clientX - el.offsetLeft;
        let oy = e.clientY - el.offsetTop;
        document.onmousemove = (e) => {
            el.style.left = (e.clientX - ox) + 'px';
            el.style.top = (e.clientY - oy) + 'px';
            data.x = e.clientX - ox; data.y = e.clientY - oy;
        };
        document.onmouseup = () => { 
            document.onmousemove = null; 
            localStorage.setItem("mcIcons", JSON.stringify(state.icons));
        };
    };
}

function makeDraggableWin(win) {
    win.querySelector('.window-header').onmousedown = (e) => {
        win.style.zIndex = ++state.z;
        let ox = e.clientX - win.offsetLeft;
        let oy = e.clientY - win.offsetTop;
        document.onmousemove = (e) => {
            win.style.left = (e.clientX - ox) + 'px';
            win.style.top = (e.clientY - oy) + 'px';
        };
        document.onmouseup = () => document.onmousemove = null;
    };
}

function makeResizableWin(win) {
    win.querySelector('.resizer').onmousedown = (e) => {
        e.preventDefault();
        let sx = e.clientX; let sy = e.clientY;
        let sw = win.offsetWidth; let sh = win.offsetHeight;
        document.onmousemove = (e) => {
            win.style.width = (sw + (e.clientX - sx)) + 'px';
            win.style.height = (sh + (e.clientY - sy)) + 'px';
        };
        document.onmouseup = () => document.onmousemove = null;
    };
}

/** SYSTEM UTILS **/
function updateClock() {
    const d = new Date();
    let h = d.getHours();
    let m = d.getMinutes();
    let ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    document.getElementById('time-val').innerText = `${h}:${m < 10 ? '0'+m : m} ${ampm}`;
    document.getElementById('date-val').innerText = d.toLocaleDateString();
}

function setBG(val) {
    state.bg = val;
    document.body.style.background = val;
    localStorage.setItem("mcBG", val);
}

function togglePin(id, e) {
    e.stopPropagation();
    if(state.pinned.includes(id)) state.pinned = state.pinned.filter(p => p !== id);
    else state.pinned.push(id);
    localStorage.setItem("mcPinned", JSON.stringify(state.pinned));
    renderPinned();
    renderDesktop();
}

function cmd(input){
    let out = document.getElementById('out');
    let c = input.value.trim().toLowerCase();
    if(c==="help") out.innerHTML+="help, about, user, clear<br>";
    else if(c==="about") out.innerHTML+="McCrackOS Hybrid V7.1<br>";
    else if(c==="user") out.innerHTML+=state.user+"<br>";
    else if(c==="clear") out.innerHTML="";
    else out.innerHTML+="Unknown command: "+c+"<br>";
    input.value="";
}

function calc(){
    try {
        document.getElementById('calcOut').innerText = eval(document.getElementById('calcIn').value);
    } catch { document.getElementById('calcOut').innerText = "Error"; }
}

function savePass() {
    const p = document.getElementById('passSet').value;
    if(p) { state.pass = p; localStorage.setItem("mcPass", p); alert("Password Saved!"); }
}

function triggerPCFiles() {
    const input = document.createElement('input');
    input.type = 'file';
    input.onchange = e => alert("PC File Linked: " + e.target.files[0].name);
    input.click();
}

function initBattery() {
    if(navigator.getBattery) {
        navigator.getBattery().then(bat => {
            const update = () => document.getElementById('battery-val').innerText = `🔋 ${Math.round(bat.level * 100)}%`;
            update(); bat.onlevelchange = update;
        });
    }
}
</script>
</body>
</html>
