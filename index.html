<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>McCrackOS v2</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}

body{
    height:100vh;
    overflow:hidden;
    background:linear-gradient(135deg,#1e1e2f,#2c2c3e);
    color:white;
}

/* Boot */
#boot{
    position:fixed;
    inset:0;
    background:black;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    font-size:2.5rem;
    letter-spacing:2px;
}
.loader{
    margin-top:20px;
    width:40px;
    height:40px;
    border:4px solid #333;
    border-top:4px solid white;
    border-radius:50%;
    animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* Login */
#login{
    position:fixed;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    backdrop-filter:blur(20px);
    background:rgba(0,0,0,.6);
}
.login-box{
    background:rgba(255,255,255,.1);
    backdrop-filter:blur(20px);
    padding:40px;
    border-radius:20px;
    display:flex;
    flex-direction:column;
    gap:15px;
    width:300px;
}
.login-box input{
    padding:10px;
    border:none;
    border-radius:10px;
}
.login-box button{
    padding:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

/* Top Bar */
#topbar{
    position:absolute;
    top:0;
    left:0;
    right:0;
    height:40px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(20px);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px;
    font-size:.9rem;
}

/* Desktop */
#desktop{
    position:absolute;
    inset:40px 0 0 0;
    display:none;
}

/* Desktop Icons */
.icon{
    width:80px;
    text-align:center;
    cursor:pointer;
    margin:20px;
}
.icon div{
    font-size:40px;
}

/* Dock */
#dock{
    position:absolute;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:15px;
    padding:15px 25px;
    background:rgba(255,255,255,.1);
    backdrop-filter:blur(20px);
    border-radius:30px;
}

/* Windows */
.window{
    position:absolute;
    width:500px;
    height:350px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(20px);
    border-radius:20px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    animation:fadeIn .2s ease;
}
@keyframes fadeIn{from{opacity:0;transform:scale(.95);}to{opacity:1;}}
.window-header{
    padding:8px 10px;
    background:rgba(255,255,255,.1);
    cursor:move;
    display:flex;
    justify-content:space-between;
}
.window-body{flex:1;padding:10px;overflow:auto;}
.window-buttons span{
    margin-left:10px;
    cursor:pointer;
}

/* Spotlight */
#spotlight{
    position:absolute;
    top:80px;
    left:50%;
    transform:translateX(-50%);
    width:400px;
    background:rgba(255,255,255,.1);
    backdrop-filter:blur(20px);
    padding:20px;
    border-radius:20px;
    display:none;
}
#spotlight input{
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
}

/* Context */
#contextMenu{
    position:absolute;
    background:rgba(255,255,255,.1);
    backdrop-filter:blur(20px);
    padding:10px;
    border-radius:15px;
    display:none;
}
#contextMenu div{
    padding:5px 15px;
    cursor:pointer;
}
#contextMenu div:hover{
    background:rgba(255,255,255,.2);
}
</style>
</head>
<body>

<div id="boot">
    McCrackOS
    <div class="loader"></div>
</div>

<div id="login">
    <div class="login-box">
        <input id="username" placeholder="Username">
        <input type="password" placeholder="Password (optional)">
        <button onclick="enterOS()">Login</button>
    </div>
</div>

<div id="topbar">
    <div>McCrackOS</div>
    <div id="userDisplay"></div>
</div>

<div id="desktop">
    <div class="icon" ondblclick="openNotepad()">
        <div>📝</div>
        Notepad
    </div>
    <div class="icon" ondblclick="openBrowser()">
        <div>🌐</div>
        Browser
    </div>
    <div class="icon" ondblclick="openTerminal()">
        <div>⌨️</div>
        Terminal
    </div>

    <div id="dock">
        🔍
    </div>
</div>

<div id="spotlight">
    <input placeholder="Search apps..." oninput="searchApp(this.value)">
    <div id="searchResults"></div>
</div>

<div id="contextMenu">
    <div onclick="location.reload()">Refresh</div>
</div>

<script>
let z=1;

/* Boot */
setTimeout(()=>{
    document.getElementById("boot").style.display="none";
    document.getElementById("login").style.display="flex";
},2000);

function enterOS(){
    const name=document.getElementById("username").value || "User";
    localStorage.setItem("mcUser",name);
    document.getElementById("userDisplay").innerText=name;
    document.getElementById("login").style.display="none";
    document.getElementById("desktop").style.display="block";
}

/* Window System */
function createWindow(title,content){
    const win=document.createElement("div");
    win.className="window";
    win.style.top=Math.random()*200+80+"px";
    win.style.left=Math.random()*200+100+"px";
    win.style.zIndex=z++;
    win.innerHTML=`
        <div class="window-header">
            <span>${title}</span>
            <div class="window-buttons">
                <span onclick="this.closest('.window').style.display='none'">–</span>
                <span onclick="this.closest('.window').remove()">✖</span>
            </div>
        </div>
        <div class="window-body">${content}</div>
    `;
    document.body.appendChild(win);
    drag(win);
    win.onclick=()=>win.style.zIndex=z++;
}

function drag(el){
    const header=el.querySelector(".window-header");
    header.onmousedown=function(e){
        let offsetX=e.clientX-el.offsetLeft;
        let offsetY=e.clientY-el.offsetTop;
        document.onmousemove=function(e){
            el.style.left=e.clientX-offsetX+"px";
            el.style.top=e.clientY-offsetY+"px";
        }
        document.onmouseup=function(){
            document.onmousemove=null;
        }
    }
}

/* Apps */
function openNotepad(){
    createWindow("Notepad",
        `<textarea style="width:100%;height:100%;background:transparent;color:white;border:none;outline:none;"
        oninput="localStorage.setItem('note',this.value)">${localStorage.getItem('note')||""}</textarea>`
    );
}

function openBrowser(){
    createWindow("Browser",
        `<input placeholder="Enter URL" style="width:100%;padding:5px;"
        onkeydown="if(event.key==='Enter'){this.nextElementSibling.src=this.value}">
        <iframe style="width:100%;height:90%;border:none;"></iframe>`
    );
}

function openTerminal(){
    createWindow("Terminal",
        `<div id="termOut"></div>
        <input style="width:100%;background:black;color:lime;border:none;padding:5px;"
        onkeydown="if(event.key==='Enter'){runCmd(this)}" placeholder="help">`
    );
}

function runCmd(input){
    const out=input.previousElementSibling;
    const cmd=input.value;
    if(cmd==="help") out.innerHTML+="<div>help, about, user, clear</div>";
    else if(cmd==="about") out.innerHTML+="<div>McCrackOS v2</div>";
    else if(cmd==="user") out.innerHTML+="<div>"+localStorage.getItem("mcUser")+"</div>";
    else if(cmd==="clear") out.innerHTML="";
    else out.innerHTML+="<div>Unknown command</div>";
    input.value="";
}

/* Spotlight */
document.addEventListener("keydown",e=>{
    if(e.ctrlKey && e.key==="k"){
        document.getElementById("spotlight").style.display="block";
    }
});
function searchApp(val){
    const res=document.getElementById("searchResults");
    res.innerHTML="";
    if(val.toLowerCase().includes("note"))
        res.innerHTML+="<div onclick='openNotepad()'>Notepad</div>";
    if(val.toLowerCase().includes("term"))
        res.innerHTML+="<div onclick='openTerminal()'>Terminal</div>";
    if(val.toLowerCase().includes("browser"))
        res.innerHTML+="<div onclick='openBrowser()'>Browser</div>";
}

/* Context */
document.addEventListener("contextmenu",e=>{
    e.preventDefault();
    const menu=document.getElementById("contextMenu");
    menu.style.display="block";
    menu.style.left=e.pageX+"px";
    menu.style.top=e.pageY+"px";
});
document.addEventListener("click",()=>{
    document.getElementById("contextMenu").style.display="none";
});
</script>

</body>
</html>
