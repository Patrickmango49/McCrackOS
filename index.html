<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>McCrackOS</title>
    <script>
        let userAuthenticated = false;

        function bootSequence() {
            document.getElementById('boot').innerHTML = '<h2>Booting McCrackOS...</h2>';
            setTimeout(() => {
                document.getElementById('boot').innerHTML = ''; 
                document.getElementById('auth').style.display = 'block';
            }, 3000);
        }

        function authenticate() {
            const password = document.getElementById('password').value;
            if (password === 'password123') { // Example password
                userAuthenticated = true;
                document.getElementById('auth').style.display = 'none';
                loadDesktop();
            } else {
                alert('Authentication failed!');
            }
        }

        function loadDesktop() {
            const desktop = document.getElementById('desktop');
            desktop.style.display = 'block';
            desktop.innerHTML = '<h3>Your Applications</h3>' +
                '<div class="icon">App 1</div>' +
                '<div class="icon">App 2</div>' +
                '<div class="icon">App 3</div>';
        }

        window.onload = bootSequence;
    </script>
</head>
<body>
    <div id="boot"></div>
    <div id="auth" style="display:none;">
        <h2>Authentication</h2>
        <input type="password" id="password" placeholder="Enter your password">
        <button onclick="authenticate()">Login</button>
    </div>
    <div id="desktop" style="display:none;">
        <!-- Desktop icons will be loaded here -->
    </div>
</body>
</html>
