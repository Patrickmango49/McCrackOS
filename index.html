<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>McCrackOS V8.0 - Enterprise Developer Edition</title>
    <style>
        /* --- CORE SYSTEM VARIABLES --- */
        :root {
            --accent: #0078d4;
            --top-bar-h: 30px;
            --taskbar-h: 65px;
            --panel: rgba(15, 15, 15, 0.95);
            --win-bg: #0a0a0a;
            --border: 1px solid rgba(255, 255, 255, 0.1);
            --shadow: 0 25px 50px rgba(0,0,0,0.9);
            --blur: blur(30px);
            --font: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* --- RESET & BASE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font); -webkit-user-select: none; user-select: none; }
        body { height: 100vh; width: 100vw; overflow: hidden; background: #000; color: white; transition: background 0.5s ease; }

        /* --- TOP BAR (NEW) --- */
        #top-bar {
            position: fixed; top: 0; left: 0; right: 0; height: var(--top-bar-h);
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(10px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 15px; z-index: 9500; border-bottom: var(--border);
            font-size: 0.8rem; font-weight: 600; letter-spacing: 1px;
        }
        #lock-btn { cursor: pointer; padding: 2px 8px; border-radius: 4px; transition: 0.3s; }
        #lock-btn:hover { background: rgba(255,0,0,0.2); color: #ff4b4b; }

        /* --- BOOT & LOGIN --- */
        #boot { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; }
        .spin { width: 50px; height: 50px; border: 4px solid #222; border-top-color: var(--accent); border-radius: 50%; animation: s 1s linear infinite; margin-bottom: 20px; }
        @keyframes s { to { transform: rotate(360deg); } }

        #login { 
            position: fixed; inset: 0; display: none; background: rgba(0,0,0,0.7); 
            backdrop-filter: var(--blur); z-index: 9000; align-items: center; justify-content: center; 
        }
        .login-box { background: var(--panel); padding: 60px; border-radius: 25px; border: var(--border); width: 400px; text-align: center; box-shadow: var(--shadow); }
        .login-box input { width: 100%; padding: 15px; margin: 20px 0; background: #151515; border: var(--border); border-radius: 10px; color: white; text-align: center; outline: none; font-size: 1rem; }
        .login-box button { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1rem; }

        /* --- DESKTOP AREA --- */
        #desktop { position: absolute; inset: var(--top-bar-h) 0 var(--taskbar-h) 0; display: none; z-index: 100; padding: 25px; }
        .icon { 
            position: absolute; width: 100px; height: 110px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; border-radius: 15px; cursor: pointer; transition: 0.2s;
        }
        .icon:hover { background: rgba(255,255,255,0.1); backdrop-filter: blur(5px); }
        .icon div { font-size: 50px; margin-bottom: 8px; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5)); }
        .icon span { font-size: 0.8rem; text-align: center; font-weight: 500; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }

        /* --- START MENU --- */
        #start-menu { 
            position: absolute; bottom: 75px; left: 15px; width: 350px; height: 500px; 
            background: var(--panel); border: var(--border); border-radius: 20px; 
            backdrop-filter: var(--blur); display: none; flex-direction: column; padding: 25px; z-index: 9999; box-shadow: var(--shadow);
        }
        .start-item { display: flex; align-items: center; gap: 15px; padding: 12px; border-radius: 10px; cursor: pointer; margin-bottom: 5px; transition: 0.2s; }
        .start-item:hover { background: rgba(255,255,255,0.1); transform: translateX(5px); }
        .start-item span { font-size: 24px; }

        /* --- WINDOWS --- */
        .window { 
            position: absolute; background: var(--win-bg); border-radius: 16px; border: var(--border); 
            display: flex; flex-direction: column; overflow: hidden; box-shadow: var(--shadow); 
        }
        .win-head { background: #151515; padding: 14px 20px; display: flex; justify-content: space-between; cursor: move; align-items: center; }
        .win-body { flex: 1; background: #000; position: relative; overflow: auto; }
        .win-ctrls { display: flex; gap: 18px; align-items: center; }
        .win-ctrls span { cursor: pointer; opacity: 0.6; transition: 0.2s; font-size: 1.1rem; }
        .win-ctrls span:hover { opacity: 1; transform: scale(1.2); }
        .resizer { position: absolute; bottom: 0; right: 0; width: 20px; height: 20px; cursor: nwse-resize; }

        /* --- TASKBAR --- */
        #taskbar { 
            position: fixed; bottom: 0; left: 0; right: 0; height: var(--taskbar-h); 
            background: var(--panel); backdrop-filter: var(--blur); 
            display: flex; align-items: center; padding: 0 20px; z-index: 8500; border-top: var(--border); 
        }
        #task-list { flex: 1; display: flex; justify-content: flex-start; gap: 12px; margin-left: 25px; overflow-x: auto; padding: 5px 0; }
        .task-tab { padding: 10px 20px; background: rgba(255,255,255,0.05); border-radius: 10px; font-size: 0.85rem; cursor: pointer; transition: 0.3s; white-space: nowrap; border: 1px solid transparent; }
        .task-tab.active { background: rgba(255,255,255,0.15); border-color: var(--accent); box-shadow: 0 0 15px rgba(0,120,212,0.3); }

        /* --- APP SPECIFIC UI --- */
        .fs-container { text-align: center; padding: 20px; background: #000; height: 100%; }
        .fs-btn { 
            margin-top: 15px; padding: 12px 24px; font-size: 16px; border: none; border-radius: 8px; 
            cursor: pointer; background: linear-gradient(45deg, #111, #fff); color: #000; 
            font-weight: bold; transition: 0.3s; 
        }
        .fs-btn:hover { transform: scale(1.05); filter: brightness(1.2); }
        
        .factory-box { padding: 30px; max-width: 600px; margin: 0 auto; }
        .factory-box input { width: 100%; padding: 12px; background: #111; border: var(--border); color: white; border-radius: 8px; margin: 10px 0; outline: none; }
        
        .settings-card { padding: 25px; border-bottom: 1px solid #222; margin-bottom: 10px; }
        .color-dot { width: 30px; height: 30px; border-radius: 50%; display: inline-block; cursor: pointer; margin-right: 10px; border: 2px solid transparent; }
        .color-dot:hover { border-color: white; }

        /* --- SCROLLBARS --- */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #444; }
    </style>
</head>
<body id="os-root">

    <div id="top-bar">
        <div>McCrackOS</div>
        <div id="lock-btn" onclick="lockSystem()">🔒 Lock System</div>
    </div>

    <div id="boot">
        <h1 style="letter-spacing: 10px; font-weight: 200;">McCrackOS</h1>
        <div class="spin"></div>
        <p style="opacity: 0.4; font-size: 0.7rem;">V 8.0 SYSTEM KERNEL LOADED</p>
    </div>

    <div id="login">
        <div class="login-box">
            <div style="font-size:60px; margin-bottom:15px; filter: drop-shadow(0 0 10px var(--accent));">👤</div>
            <h2 style="font-weight: 300;">System Administrator</h2>
            <input type="password" id="pass-in" placeholder="Enter Access Key">
            <button onclick="unlock()">INITIALIZE</button>
            <p id="log-msg" style="color:#ff4b4b; font-size:12px; margin-top:15px; font-weight: bold;"></p>
        </div>
    </div>

    <div id="desktop"></div>

    <div id="start-menu">
        <div style="border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 15px;">
            <h3 style="font-weight: 400; color: var(--accent);">App Library</h3>
        </div>
        <div id="lib-cont" style="overflow-y:auto; flex:1;"></div>
    </div>

    <div id="taskbar">
        <div id="start-btn" onclick="toggleStart()" style="cursor:pointer; font-size:28px; width:50px; height:50px; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,0.05); border-radius:12px; transition: 0.3s;">💠</div>
        <div id="task-list"></div>
        <div style="text-align:right; border-left: 1px solid #333; padding-left:20px;">
            <div id="clock" style="font-weight:700; font-size:16px; letter-spacing: 1px;"></div>
            <div id="date" style="font-size:11px; opacity:0.5; font-weight: 600;"></div>
        </div>
    </div>

    <script>
        /* --- SYSTEM REGISTRY & APP DEFINITIONS ---
           To add a new EMBED APP:
           Just copy one of the blocks below and change the icon, name, and src URL.
        */
        const OS = {
            z: 1000,
            pass: localStorage.getItem("mc_pass") || "1234",
            bg: localStorage.getItem("mc_bg") || "linear-gradient(135deg, #0f0c29, #302b63, #24243e)",
            installed: JSON.parse(localStorage.getItem("mc_apps")) || ["Notepad", "Browser", "Terminal", "Files", "Store", "Settings", "Music", "AppFactory"],
            pos: JSON.parse(localStorage.getItem("mc_pos")) || {},
            running: {}
        };

        const Registry = {
            Notepad: { icon: "📝", content: () => `<textarea oninput="localStorage.setItem('mc_note', this.value)" style="width:100%;height:100%;background:transparent;color:white;padding:30px;border:none;outline:none;resize:none;font-family:monospace;font-size:1.1rem;line-height:1.5;">${localStorage.getItem('mc_note')||''}</textarea>` },
            
            // To add your own easily: Registry['Name'] = { icon: 'emoji', content: () => embed('URL') }
            Browser: { icon: "🌐", content: () => embedApp("https://siuuu.pagostepeapulco.gob.mx/") },
            
            Terminal: { icon: "⌨️", content: () => `<div id="t-out" style="padding:20px;color:#0f0;font-family:monospace;height:calc(100% - 50px);overflow:auto;line-height:1.4;">McCrackOS Bash v8.0<br>Type 'help' for commands.<br><br></div><input onkeydown="cmd(event, this)" style="width:100%;background:#000;border:none;border-top:1px solid #222;color:#0f0;padding:15px;outline:none;font-family:monospace;">` },
            
            Files: { icon: "📁", content: () => `<div style="padding:30px;"><h2 style="font-weight:300;">File Manager</h2><hr style="opacity:0.1;margin:20px 0;"><div style="display:grid;grid-template-columns:repeat(auto-fill, minmax(120px, 1fr));gap:25px;"><div style="text-align:center;padding:15px;background:#111;border-radius:10px;cursor:pointer;">📂<br><br>Documents</div><div style="text-align:center;padding:15px;background:#111;border-radius:10px;cursor:pointer;">📂<br><br>Downloads</div><div style="text-align:center;padding:15px;background:#111;border-radius:10px;cursor:pointer;">📂<br><br>Pictures</div><div style="text-align:center;padding:15px;background:#111;border-radius:10px;cursor:pointer;">💿<br><br>Local Drive (C:)</div></div></div>` },
            
            Store: { icon: "🛒", content: () => `<div style="padding:30px;"><h1 style="font-weight:300;">App Store</h1><p style="opacity:0.4;margin-bottom:30px;">Deploy software to your desktop</p><div class="store-card"><div><strong>🧮 Calculator</strong><br><small>Mathematics Suite</small></div><button class="install-btn" onclick="install('Calculator')">Deploy</button></div><div class="store-card"><div><strong>💬 McCrackChat</strong><br><small>Encrypted Messaging</small></div><button class="install-btn" onclick="install('McCrackChat')">Deploy</button></div></div>` },
            
            Settings: { icon: "⚙️", content: () => `<div style="padding:30px;"><h3>Personalization</h3><br><div class="settings-card"><p>Desktop Background</p><br><div class="color-dot" style="background:#000;" onclick="setBG('#000')"></div><div class="color-dot" style="background:linear-gradient(45deg, #1e3c72, #2a5298);" onclick="setBG('linear-gradient(45deg, #1e3c72, #2a5298)')"></div><div class="color-dot" style="background:linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045);" onclick="setBG('linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045)')"></div><br><br><input type="text" id="bg-url" placeholder="Custom URL (https://...)" style="width:100%;background:#111;border:var(--border);color:white;padding:10px;border-radius:8px;"><br><br><button onclick="setBG(document.getElementById('bg-url').value)" style="padding:8px 15px; cursor:pointer;">Set Image</button></div><div class="settings-card"><p>Change Access Key</p><br><input type="password" id="new-p" placeholder="New Password" style="background:#111;border:var(--border);color:white;padding:10px;border-radius:8px;"><br><br><button onclick="setPass(document.getElementById('new-p').value)" style="padding:8px 15px; cursor:pointer;">Update Key</button></div></div>` },
            
            Music: { icon: "🎵", content: () => `<div style="padding:40px;text-align:center;"><h2>Media Player</h2><br><div style="font-size:100px;margin-bottom:20px;filter:drop-shadow(0 0 15px var(--accent));">💿</div><p style="font-weight:bold;">Track_74_Lofi.mp3</p><br><button style="padding:15px 40px; border-radius:30px; border:none; background:var(--accent); color:white; font-weight:bold; cursor:pointer;">PLAY TRACK</button></div>` },
            
            AppFactory: { icon: "🛠️", content: () => `<div class="factory-box"><h2>App Factory</h2><p style="opacity:0.5; margin-bottom:20px;">Convert any website into an app</p><label>App Name:</label><input type="text" id="fac-name" placeholder="e.g. MyGame"><label>Website Link:</label><input type="text" id="fac-link" placeholder="https://example.com"><br><br><button onclick="createCustomApp()" style="width:100%; padding:15px; background:white; color:black; font-weight:bold; border-radius:10px; cursor:pointer;">CREATE APP</button></div>` },
            
            Calculator: { icon: "🧮", content: () => `<div style="padding:40px;"><input id="c-in" style="width:100%;font-size:40px;background:#000;color:white;border:1px solid #333;padding:20px;text-align:right;border-radius:15px;margin-bottom:20px;"><div style="display:grid;grid-template-columns:1fr;gap:10px;"><button onclick="try{document.getElementById('c-in').value=eval(document.getElementById('c-in').value)}catch(e){alert('Syntax Error')}" style="padding:20px;background:var(--accent);color:white;border:none;border-radius:10px;font-weight:bold;cursor:pointer;">CALCULATE</button></div></div>` },
            
            McCrackChat: { icon: "💬", content: () => embedApp("https://patrickmango49.github.io/McCrack-Chat/") }
        };

        /* --- HELPER: EMBED APP GENERATOR --- */
        function embedApp(url) {
            return `
                <div class="fs-container">
                    <iframe id="gameFrame" src="${url}" width="95%" height="80%" style="border-radius:12px; box-shadow: 0 0 25px rgba(0,0,0,0.5); max-width: 1200px; border:none;"></iframe>
                    <br>
                    <button onclick="openFullscreen('${url}')" class="fs-btn">Open Fullscreen Mode</button>
                </div>
            `;
        }

        /* --- LOGIC: SYSTEM INITIALIZATION --- */
        window.onload = () => {
            document.getElementById('os-root').style.background = OS.bg;
            // Load custom apps from storage if they exist
            const customData = JSON.parse(localStorage.getItem("mc_custom_apps")) || {};
            Object.keys(customData).forEach(name => {
                Registry[name] = { icon: "🚀", content: () => embedApp(customData[name]) };
            });

            setTimeout(() => { 
                document.getElementById('boot').style.transition = '0.8s';
                document.getElementById('boot').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('boot').style.display='none'; 
                    document.getElementById('login').style.display='flex'; 
                }, 800);
            }, 3000);
            updateTime(); setInterval(updateTime, 1000);
            renderLib();
        };

        function unlock() {
            if(document.getElementById('pass-in').value === OS.pass) {
                document.getElementById('login').style.display = 'none';
                document.getElementById('desktop').style.display = 'block';
                renderDesktop();
            } else { 
                const msg = document.getElementById('log-msg');
                msg.innerText = "ACCESS KEY REJECTED.";
                msg.style.animation = "shake 0.3s";
                setTimeout(() => msg.style.animation = "", 300);
            }
        }

        function lockSystem() {
            document.getElementById('pass-in').value = "";
            document.getElementById('login').style.display = 'flex';
            document.getElementById('desktop').style.display = 'none';
            document.getElementById('start-menu').style.display = 'none';
        }

        function renderDesktop() {
            const d = document.getElementById('desktop'); d.innerHTML = "";
            OS.installed.forEach(id => {
                const p = OS.pos[id] || {x: 40 + (OS.installed.indexOf(id)*120 % (window.innerWidth - 150)), y: 40 + (Math.floor(OS.installed.indexOf(id)/10)*140)};
                const el = document.createElement('div'); el.className = 'icon';
                el.style.left = p.x+'px'; el.style.top = p.y+'px';
                el.innerHTML = `<div>${Registry[id] ? Registry[id].icon : "📦"}</div><span>${id}</span>`;
                el.ondblclick = () => launch(id);
                el.onmousedown = (e) => {
                    let ox = e.clientX - el.offsetLeft, oy = e.clientY - el.offsetTop;
                    document.onmousemove = (ev) => { 
                        let nx = ev.clientX-ox, ny = ev.clientY-oy;
                        el.style.left = nx+'px'; el.style.top = ny+'px'; 
                        OS.pos[id] = {x: nx, y: ny};
                    };
                    document.onmouseup = () => { document.onmousemove = null; localStorage.setItem("mc_pos", JSON.stringify(OS.pos)); };
                };
                d.appendChild(el);
            });
        }

        function renderLib() {
            const c = document.getElementById('lib-cont'); c.innerHTML = "";
            Object.keys(Registry).forEach(id => {
                const i = document.createElement('div'); i.className = 'start-item';
                i.innerHTML = `<span>${Registry[id].icon}</span><strong>${id}</strong>`;
                i.onclick = () => { launch(id); toggleStart(); };
                c.appendChild(i);
            });
        }

        function toggleStart() { const s = document.getElementById('start-menu'); s.style.display = (s.style.display==='flex')?'none':'flex'; }

        function launch(id) {
            if(OS.running[id]) { focusWin(id); return; }
            const w = document.createElement('div'); w.className = 'window';
            w.style.width='900px'; w.style.height='600px'; w.style.left='150px'; w.style.top='100px'; w.style.zIndex = ++OS.z;
            w.innerHTML = `
                <div class="win-head">
                    <div style="font-weight:600; font-size:0.9rem;">${Registry[id].icon} ${id}</div>
                    <div class="win-ctrls">
                        <span onclick="min('${id}')">─</span>
                        <span style="font-weight:bold;" onclick="closeW('${id}')">✕</span>
                    </div>
                </div>
                <div class="win-body">${Registry[id].content()}</div>
                <div class="resizer"></div>
            `;
            document.body.appendChild(w); OS.running[id] = w;
            
            w.querySelector('.win-head').onmousedown = (e) => {
                focusWin(id); let ox = e.clientX - w.offsetLeft, oy = e.clientY - w.offsetTop;
                document.onmousemove = (ev) => { w.style.left = (ev.clientX-ox)+'px'; w.style.top = (ev.clientY-oy)+'px'; };
                document.onmouseup = () => document.onmousemove = null;
            };
            w.querySelector('.resizer').onmousedown = (e) => {
                let sw=w.offsetWidth, sh=w.offsetHeight, sx=e.clientX, sy=e.clientY;
                document.onmousemove = (ev) => { w.style.width = (sw+(ev.clientX-sx))+'px'; w.style.height = (sh+(ev.clientY-sy))+'px'; };
                document.onmouseup = () => document.onmousemove = null;
            };
            updateTask();
        }

        function focusWin(id) { OS.running[id].style.display='flex'; OS.running[id].style.zIndex = ++OS.z; updateTask(); }
        function min(id) { OS.running[id].style.display='none'; updateTask(); }
        function closeW(id) { OS.running[id].remove(); delete OS.running[id]; updateTask(); }

        function updateTask() {
            const l = document.getElementById('task-list'); l.innerHTML = "";
            Object.keys(OS.running).forEach(id => {
                const t = document.createElement('div'); t.className = `task-tab ${OS.running[id].style.zIndex == OS.z ? 'active' : ''}`;
                t.innerText = id; t.onclick = () => focusWin(id); l.appendChild(t);
            });
        }

        /* --- FEATURE: APP FACTORY (DYNAMIC APP CREATION) --- */
        function createCustomApp() {
            const name = document.getElementById('fac-name').value.replace(/\s+/g, '');
            const link = document.getElementById('fac-link').value;
            
            if(!name || !link) { alert("Please enter both name and URL."); return; }
            
            // Add to Registry
            Registry[name] = { icon: "🚀", content: () => embedApp(link) };
            
            // Persist
            const customData = JSON.parse(localStorage.getItem("mc_custom_apps")) || {};
            customData[name] = link;
            localStorage.setItem("mc_custom_apps", JSON.stringify(customData));
            
            if(!OS.installed.includes(name)) {
                OS.installed.push(name);
                localStorage.setItem("mc_apps", JSON.stringify(OS.installed));
            }

            renderDesktop();
            renderLib();
            alert(`Application '${name}' has been compiled and added to desktop.`);
        }

        /* --- UTILS --- */
        function install(id) {
            if(!OS.installed.includes(id)) {
                OS.installed.push(id); localStorage.setItem("mc_apps", JSON.stringify(OS.installed));
                renderDesktop(); alert(id + " deployed successfully.");
            }
        }

        function openFullscreen(url) {
            const newTab = window.open('about:blank', '_blank');
            newTab.document.write(`
                <!DOCTYPE html>
                <html lang="en">
                <head>
                  <title>Fullscreen App</title>
                  <style>
                    body, html { margin:0; height:100%; overflow:hidden; background:black; }
                    iframe { width:100%; height:100%; border:none; }
                  </style>
                </head>
                <body>
                  <iframe src="${url}"></iframe>
                </body>
                </html>
            `);
            newTab.document.close();
        }

        function setBG(u) { 
            OS.bg = (u.startsWith('http')) ? `url(${u}) center/cover` : u; 
            document.getElementById('os-root').style.background = OS.bg; 
            localStorage.setItem("mc_bg", OS.bg); 
        }

        function setPass(p) { 
            if(p){ OS.pass = p; localStorage.setItem("mc_pass", p); alert("System Access Key Updated."); } 
        }

        function updateTime() { 
            const d = new Date(); 
            document.getElementById('clock').innerText = d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); 
            document.getElementById('date').innerText = d.toLocaleDateString([], {weekday: 'short', month: 'short', day: 'numeric'}); 
        }

        function cmd(e, i) { 
            if(e.key==='Enter'){ 
                const o=document.getElementById('t-out'); 
                o.innerHTML += `<br><span style="color:#fff">> ${i.value}</span>`; 
                if(i.value==='help') o.innerHTML += "<br>sys, clear, whoami, apps";
                else if(i.value==='clear') o.innerHTML="Bash Reset.";
                else if(i.value==='sys') o.innerHTML += "<br>McCrackOS v8.0<br>Uptime: 99.9%<br>Kernel: Carbon-JS";
                i.value=""; o.scrollTop=o.scrollHeight; 
            } 
        }
    </script>
</body>
</html>
