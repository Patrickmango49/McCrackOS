<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>𝕄𝕔ℂ𝕣𝕒𝕔𝕜OS V9.0</title>
<style>
/* --- CORE SYSTEM VARIABLES --- */
:root {
--accent: #0078d4;
--top-bar-h: 32px;
--taskbar-h: 65px;
--panel: rgba(10, 10, 10, 0.98);
--win-bg: #050505;
--border: 1px solid rgba(255, 255, 255, 0.12);
--shadow: 0 30px 60px rgba(0,0,0,0.95);
--blur: blur(35px);
--font: 'Segoe UI', system-ui, -apple-system, sans-serif;
--danger: #ff4b4b;
}

/* --- GLOBAL RESET --- */
* { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font); -webkit-user-select: none; user-select: none; }
body {
height: 100vh; width: 100vw; overflow: hidden;
background: #000; color: white; transition: background 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

/* --- TOP BAR --- */
#top-bar {
position: fixed; top: 0; left: 0; right: 0; height: var(--top-bar-h);
background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(15px);
display: flex; justify-content: space-between; align-items: center;
padding: 0 18px; z-index: 9500; border-bottom: var(--border);
font-size: 0.75rem; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase;
}
.top-right { display: flex; align-items: center; gap: 20px; }
#lock-btn { cursor: pointer; color: #aaa; transition: 0.3s; }
#lock-btn:hover { color: #ff4b4b; text-shadow: 0 0 10px rgba(255,75,75,0.5); }
#battery-stat { display: flex; align-items: center; gap: 6px; color: #44ff44; }

/* --- BOOT SEQUENCE --- */
#boot { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; }
.spin { width: 60px; height: 60px; border: 4px solid #111; border-top-color: var(--accent); border-radius: 50%; animation: s 0.8s linear infinite; margin-bottom: 25px; }
@keyframes s { to { transform: rotate(360deg); } }
.boot-text { font-family: monospace; font-size: 0.8rem; color: var(--accent); opacity: 0.8; }
.boot-log-box {
width: min(760px, 82vw);
max-height: 180px;
margin-top: 20px;
padding: 14px 16px;
border: 1px solid #143a14;
border-radius: 10px;
background: rgba(0,0,0,0.75);
box-shadow: inset 0 0 22px rgba(24, 255, 72, 0.1);
overflow: hidden;
font-family: monospace;
font-size: 0.8rem;
line-height: 1.35;
color: #39ff88;
text-align: left;
}
.boot-line { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; opacity: 0.9; }

/* --- AUTHENTICATION --- */
#login {
position: fixed; inset: 0; display: none; background: rgba(0,0,0,0.8);
backdrop-filter: var(--blur); z-index: 9000; align-items: center; justify-content: center;
}
.login-box {
background: var(--panel); padding: 70px; border-radius: 30px; border: var(--border);
width: 420px; text-align: center; box-shadow: var(--shadow);
}
.login-box input {
width: 100%; padding: 16px; margin: 25px 0; background: #111; border: var(--border);
border-radius: 12px; color: white; text-align: center; outline: none; font-size: 1.1rem;
transition: 0.3s;
}
.login-box input:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(0,120,212,0.2); }
.login-box button {
width: 100%; padding: 16px; background: var(--accent); color: white; border: none;
border-radius: 12px; cursor: pointer; font-weight: 800; font-size: 1rem; transition: 0.3s;
}
.login-box button:hover { filter: brightness(1.2); transform: translateY(-2px); }

/* --- WORKSPACE --- */
#desktop { position: absolute; inset: var(--top-bar-h) 0 var(--taskbar-h) 0; display: none; z-index: 100; padding: 30px; }
/* Drag and Drop Styling */
.icon {
position: absolute; width: 110px; height: 120px; display: flex; flex-direction: column;
align-items: center; justify-content: center; border-radius: 18px; cursor: grab;
transition: transform 0.2s, left 0.08s linear, top 0.08s linear;
will-change: left, top, transform;
user-select: none;
z-index: 150;
}
.icon.dragging { transition: transform 0.08s linear; }
.icon:active { cursor: grabbing; }
.icon:hover { background: rgba(255,255,255,0.08); transform: scale(1.05); }
.icon div { font-size: 55px; margin-bottom: 10px; filter: drop-shadow(0 8px 12px rgba(0,0,0,0.6)); pointer-events: none;}
.icon span { font-size: 0.85rem; text-align: center; font-weight: 600; text-shadow: 0 2px 8px rgba(0,0,0,1); pointer-events: none;}

/* --- DELETE BIN --- */
#delete-bin {
position: absolute; bottom: 120px; right: 30px; width: 100px; height: 120px;
display: flex; flex-direction: column; align-items: center; justify-content: center;
background: rgba(255, 75, 75, 0.05); border: 2px dashed rgba(255, 75, 75, 0.2);
border-radius: 20px; transition: 0.3s; z-index: 110;
}
#delete-bin.drag-over {
background: rgba(255, 75, 75, 0.3); border-color: #ff4b4b;
transform: scale(1.1); box-shadow: 0 0 30px rgba(255, 75, 75, 0.4);
}
#delete-bin div { font-size: 50px; margin-bottom: 5px; }
#delete-bin span { font-size: 0.7rem; font-weight: 800; color: #ff4b4b; letter-spacing: 1px; }

/* --- APPLICATION LIBRARY --- */
#start-menu {
position: absolute; bottom: 80px; left: 20px; width: 380px; height: 550px;
background: var(--panel); border: var(--border); border-radius: 24px;
backdrop-filter: var(--blur); display: none; flex-direction: column; padding: 30px; z-index: 9999; box-shadow: var(--shadow);
}
.start-item { display: flex; align-items: center; gap: 18px; padding: 14px; border-radius: 14px; cursor: pointer; transition: 0.2s; }
.start-item:hover { background: rgba(255,255,255,0.08); transform: translateX(8px); }
.start-item span { font-size: 28px; }

/* --- MULTI-WINDOW ARCHITECTURE --- */
.window {
position: absolute; background: var(--win-bg); border-radius: 20px; border: var(--border);
display: flex; flex-direction: column; overflow: hidden; box-shadow: var(--shadow);
transition: width 0.3s, height 0.3s, top 0.3s, left 0.3s, opacity 0.2s, transform 0.2s;
}
.win-head { background: #121212; padding: 16px 24px; display: flex; justify-content: space-between; cursor: move; align-items: center; }
.win-body { flex: 1; background: #000; position: relative; overflow: auto; }
.win-ctrls { display: flex; gap: 22px; align-items: center; }
.win-ctrls span { cursor: pointer; opacity: 0.5; transition: 0.2s; font-size: 1.2rem; }
.win-ctrls span:hover { opacity: 1; transform: scale(1.2); }
.resizer { position: absolute; bottom: 0; right: 0; width: 22px; height: 22px; cursor: nwse-resize; z-index: 10; }

/* --- SYSTEM TASKBAR --- */
#taskbar {
position: fixed; bottom: 0; left: 0; right: 0; height: var(--taskbar-h);
background: rgba(5, 5, 5, 0.9); backdrop-filter: blur(25px);
display: flex; align-items: center; padding: 0 25px; z-index: 8500; border-top: var(--border);
}
#task-list { flex: 1; display: flex; justify-content: flex-start; gap: 14px; margin-left: 30px; overflow-x: auto; padding: 8px 0; }
.task-tab { padding: 10px 22px; background: rgba(255,255,255,0.04); border-radius: 12px; font-size: 0.85rem; cursor: pointer; transition: 0.3s; white-space: nowrap; border: 1px solid transparent; color: #888; }
.task-tab.active { background: rgba(0, 120, 212, 0.15); border-color: var(--accent); box-shadow: 0 0 20px rgba(0,120,212,0.25); color: white; }

/* --- APP CONTENT STYLING --- */
.full-app-view { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; }
.app-iframe { width: 100%; height: 100%; border: none; background: #000; }
.explorer-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 20px; padding: 30px; }
.file-item { text-align: center; padding: 20px; border-radius: 12px; background: #0a0a0a; border: 1px solid #1a1a1a; cursor: pointer; transition: 0.2s; }
.file-item:hover { background: #151515; border-color: var(--accent); }

.store-card { background: #0a0a0a; padding: 20px; border-radius: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #1a1a1a; }
.install-btn { padding: 8px 20px; border-radius: 8px; border: none; background: var(--accent); color: white; cursor: pointer; font-weight: 700; }

/* --- NOTIFICATIONS + WIDGETS --- */
#notif-bell { cursor: pointer; opacity: 0.8; transition: 0.2s; }
#notif-bell:hover { opacity: 1; transform: scale(1.12); }
#notif-center { position: fixed; top: calc(var(--top-bar-h) + 12px); right: 15px; width: 300px; max-height: 420px; overflow: auto; background: rgba(8,8,8,0.95); border: var(--border); border-radius: 14px; padding: 12px; display: none; z-index: 11000; }
.notif-item { font-size: 0.8rem; border-bottom: 1px solid #1c1c1c; padding: 10px 4px; }
.notif-item:last-child { border-bottom: none; }
#toast-wrap { position: fixed; right: 16px; bottom: calc(var(--taskbar-h) + 14px); z-index: 12000; display: flex; flex-direction: column; gap: 10px; }
.toast { min-width: 220px; max-width: 320px; background: #0f0f0f; border: 1px solid #262626; color: #e8e8e8; border-left: 4px solid var(--accent); border-radius: 10px; padding: 10px 12px; font-size: 0.8rem; box-shadow: var(--shadow); }
.toast.warn { border-left-color: #ff9f1a; }
.toast.system { border-left-color: #ff4b4b; }
#widget-layer { position: absolute; inset: 0; pointer-events: none; z-index: 120; }
.widget-card { position: absolute; width: 220px; min-height: 120px; background: rgba(10,10,10,0.85); border: var(--border); border-radius: 14px; padding: 14px; pointer-events: auto; box-shadow: var(--shadow); }

/* --- ANIMATIONS --- */
@keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
@keyframes pulse-delete { 0% { box-shadow: 0 0 0 0 rgba(255, 75, 75, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(255, 75, 75, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 75, 75, 0); } }
</style>
</head>

try {
const value = localStorage.getItem(key);
return value ? JSON.parse(value) : fallback;
} catch {
return fallback;
}
}

const Registry = {

Files: { icon: "📁", content: () => `<div style="padding:30px;">
<div style="display:flex; justify-content:space-between; align-items:center;">
<h2>File Explorer</h2>
<button onclick="document.getElementById('bg-upload').click()" style="padding:8px 15px; border-radius:8px; background:var(--accent); color:white; border:none; cursor:pointer;">Upload BG Image</button>
<input type="file" id="bg-upload" style="display:none" onchange="handleFileUpload(event)" accept="image/*">
</div>
<hr style="opacity:0.1; margin:20px 0;">
<div class="explorer-grid">
<div class="file-item">📁<br><br>Root</div>
<div class="file-item">📁<br><br>System</div>
<div class="file-item">📁<br><br>Users</div>
<div class="file-item" onclick="launch('Settings')">🖼️<br><br>Wallpapers</div>
</div>
</div>` },
Store: { icon: "🛒", content: () => `<div style="padding:40px;">
<h1 style="font-weight:300; margin-bottom:10px;">Integrated Store</h1>
<p style="opacity:0.4; margin-bottom:30px;">Acquire and deploy official system modules.</p>
<div id="store-list">
${renderStoreItem('Movies', 'Streaming Movies Player')}
${renderStoreItem('Games', 'McCrack Game Hub')}
${renderStoreItem('McCrackChat', 'Global Relay Service')}
${renderStoreItem('Calculator', 'Advanced Math Engine')}
${renderStoreItem('Music', 'High-Fidelity Audio')}
${renderStoreItem('AppFactory', 'Custom Module Compiler')}
${renderStoreItem('Notepad', 'Secure Text Buffer')}
${renderStoreItem('Widgets', 'Desktop Widget Manager')}
</div>
</div>` },

SystemLogs: { icon: "📑", content: () => `<div style="padding:30px;">

${OS.logs.map(l => `<div>[${l.time}] ${l.msg}</div>`).join('')}
</div>

};

/* --- DRAG & DROP LOGIC --- */
function allowDrop(ev) {
ev.preventDefault();
document.getElementById('delete-bin').classList.add('drag-over');
}
function dragLeave(ev) { document.getElementById('delete-bin').classList.remove('drag-over'); }
function startDrag(ev, id) {
ev.dataTransfer.setData("appId", id);
ev.currentTarget.style.opacity = "0.4";
}
function endDrag(ev) {
ev.currentTarget.style.opacity = "1";
document.getElementById('delete-bin').classList.remove('drag-over');
}
function dropDelete(ev) {
ev.preventDefault();
document.getElementById('delete-bin').classList.remove('drag-over');
const id = ev.dataTransfer.getData("appId");

// logic to block apps NOT in the storeApps list (and core restricted apps)
const isStoreApp = OS.storeApps.includes(id);

if (!isStoreApp || OS.restricted.includes(id)) {
alert(`CRITICAL ERROR: ${id} is a protected system kernel module and cannot be deleted.`);
return;
}

if (confirm(`Purge ${id}?`)) {
if (OS.running[id]) closeW(id);
OS.installed = OS.installed.filter(app => app !== id);
localStorage.setItem("mc_apps", JSON.stringify(OS.installed));
renderDesktop(); renderLib();
}
}

/* --- FRAMEWORK FUNCTIONS --- */
function buildAppFrame(url) {
return `<div class="full-app-view">
<iframe class="app-iframe" src="${url}"></iframe>
</div>`
; }

function renderStoreItem(id, desc) {
const isInst = OS.installed.includes(id);
return `<div class="store-card">
<div><strong>${Registry[id] ? Registry[id].icon : "📦"} ${id}</strong><br><small style="opacity:0.4">${desc}</small></div>
<button class="install-btn" style="${isInst?'background:#222;cursor:default':''}" onclick="${isInst?'':'install(\''+id+'\')'}">${isInst?'Deployed':'Install'}</button>
</div>`
; }

function install(id) {
OS.installed.push(id);
localStorage.setItem("mc_apps", JSON.stringify(OS.installed));
renderDesktop(); renderLib();
notify("app", `${id} installed.`);
const storeWin = OS.running['Store'];
if(storeWin) storeWin.querySelector('.win-body').innerHTML = Registry['Store'].content();
}

function createCustomApp() {
const name = document.getElementById('fac-name').value.trim();
const link = document.getElementById('fac-link').value.trim();
if(!name || !link) return alert("Missing fields.");
const customs = safeJSON("mc_custom_apps", {});
customs[name] = link;
localStorage.setItem("mc_custom_apps", JSON.stringify(customs));
Registry[name] = { icon: "🚀", content: () => buildAppFrame(link) };
OS.installed.push(name);
localStorage.setItem("mc_apps", JSON.stringify(OS.installed));
renderDesktop(); renderLib();
alert(`Compiled ${name}`);
}

/* --- CORE SYSTEM LOGIC --- */
function beginBootTransition() {
setTimeout(() => {
const b = document.getElementById('boot');
const login = document.getElementById('login');
if(!b || !login) return;
b.style.opacity = '0';
setTimeout(() => { b.style.display='none'; login.style.display='flex'; }, 1000);
}, 3000);
}

window.onload = () => {
beginBootTransition();
try {
addLog("System boot sequence initialized.");
document.getElementById('os-root').style.background = OS.bg;
simulateBootLogs();
initInteractionHooks();
const customs = safeJSON("mc_custom_apps", {});
Object.keys(customs).forEach(name => {
Registry[name] = { icon: "🚀", content: () => buildAppFrame(customs[name]) };
});
updateBattery(); setInterval(updateBattery, 30000);
updateTime(); setInterval(updateTime, 1000);
renderLib();
renderNotifCenter();
renderWidgets();
} catch (err) {
console.error('Boot initialization warning:', err);
}
};

function simulateBootLogs() {
const panel = document.getElementById('boot-logs');
if(!panel) return;
const bootLines = [
"[BOOT] Power rails stabilized at 12.0V",
"[KERNEL] Loading microkernel v9.0.4",
"[MEMORY] Mapping core pages... OK",
"[SECURITY] Initializing access-control matrix",
"[DRIVER] Mounting synthetic file system",
"[NET] Negotiating loopback interface",
"[AUDIO] DSP handoff complete",
"[GPU] Shader cache restored",
"[SERVICES] Spawning userland daemons",
"[SYSTEM] Startup checks complete"
];
panel.innerHTML = '';
let idx = 0;
const intervalMs = 300;
const timer = setInterval(() => {
if(idx >= bootLines.length) {
clearInterval(timer);
return;
}
const line = document.createElement('div');
line.className = 'boot-line';
line.textContent = `${new Date().toLocaleTimeString()} ${bootLines[idx]}`;
panel.appendChild(line);
panel.scrollTop = panel.scrollHeight;
idx += 1;
}, intervalMs);
setTimeout(() => clearInterval(timer), 3000);
}

function initInteractionHooks() {
setupFullscreenOnInteraction();
}

function setupFullscreenOnInteraction() {
const request = () => {
if(document.fullscreenElement) return;
const root = document.documentElement;
if(root.requestFullscreen) root.requestFullscreen().catch(() => {});
};
window.addEventListener('pointerdown', request, { once: true });
window.addEventListener('touchstart', request, { once: true });
window.addEventListener('click', request, { once: true });
}

function notify(type, msg) {
const item = { type, msg, time: new Date().toLocaleTimeString() };
OS.notifications.unshift(item);
OS.notifications = OS.notifications.slice(0, 30);
localStorage.setItem('mc_notifications', JSON.stringify(OS.notifications));
renderNotifCenter();
const wrap = document.getElementById('toast-wrap');
if(!wrap) return;
const t = document.createElement('div');
t.className = `toast ${type === 'system' ? 'system' : (type === 'warning' ? 'warn' : '')}`;
t.innerHTML = `<strong>${type.toUpperCase()}</strong><div>${msg}</div>`;
wrap.appendChild(t);
setTimeout(() => t.remove(), 3400);
}

function renderNotifCenter() {
const c = document.getElementById('notif-center');
if(!c) return;
if(OS.notifications.length === 0) {
c.innerHTML = '<div class="notif-item" style="opacity:0.6;">No notifications yet.</div>';
return;
}
c.innerHTML = OS.notifications.map(n => `<div class="notif-item"><div style="font-size:0.68rem; opacity:0.55;">${n.time} • ${n.type.toUpperCase()}</div><div>${n.msg}</div></div>`).join('');
}

function toggleNotifCenter() {
const c = document.getElementById('notif-center');
if(!c) return;
c.style.display = c.style.display === 'block' ? 'none' : 'block';
}

function installWidget(id) {
if(OS.widgets.includes(id)) return notify('warning', `${id} widget already installed.`);
OS.widgets.push(id);
localStorage.setItem('mc_widgets', JSON.stringify(OS.widgets));
renderWidgets();
notify('app', `${id} widget installed.`);
}

function clearWidgets() {
OS.widgets = [];
localStorage.setItem('mc_widgets', JSON.stringify(OS.widgets));
renderWidgets();
notify('app', 'All widgets removed.');
}

function renderWidgets() {
const layer = document.getElementById('widget-layer');
if(!layer) return;
layer.innerHTML = '';
const now = new Date();
const cards = {
weather: `<h4 style="margin:0 0 10px 0;">🌤️ Weather</h4><div style="font-size:1.6rem; font-weight:700;">${18 + (now.getMinutes() % 12)}°C</div><div style="opacity:0.7; font-size:0.8rem;">Partly Cloudy • McCrack City</div>`,
time: `<h4 style="margin:0 0 10px 0;">🕒 Time & Date</h4><div style="font-size:1.6rem; font-weight:700;">${now.toLocaleTimeString()}</div><div style="opacity:0.7; font-size:0.8rem;">${now.toDateString()}</div>`,
calendar: `<h4 style="margin:0 0 10px 0;">📅 Calendar</h4><div style="font-size:1.1rem; font-weight:700;">${now.toLocaleString([], { month:'long', year:'numeric' })}</div><div style="opacity:0.7; font-size:0.8rem;">Day ${now.getDate()} of ${new Date(now.getFullYear(), now.getMonth()+1, 0).getDate()}</div>`
};
OS.widgets.forEach((id, i) => {
if(!cards[id]) return;
const el = document.createElement('div');
el.className = 'widget-card';
el.style.top = `${20 + (i * 135)}px`;
el.style.right = '20px';
el.innerHTML = cards[id];
layer.appendChild(el);
});
}


function addLog(msg) {
OS.logs.push({time: new Date().toLocaleTimeString(), msg: msg});
if(OS.running['SystemLogs']) OS.running['SystemLogs'].querySelector('.win-body').innerHTML = Registry['SystemLogs'].content();
}

function updateTime() {
const now = new Date();
document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
document.getElementById('date').innerText = now.toLocaleDateString([], {weekday: 'short', month: 'short', day: 'numeric'});
if(OS.widgets.length) renderWidgets();
}

function updateBattery() {
if (navigator.getBattery) {
navigator.getBattery().then(bat => {
OS.battery = Math.floor(bat.level * 100);
document.getElementById('battery-stat').querySelector('span').innerText = OS.battery + "%";
});
}
}

function setBG(url) {
OS.bg = `url('${url}') center/cover no-repeat`;
document.getElementById('os-root').style.background = OS.bg;
localStorage.setItem("mc_bg", OS.bg);
notify("app", "Wallpaper updated");
}

function handleFileUpload(event) {
const file = event.target.files && event.target.files[0];
if(!file) return;
const reader = new FileReader();
reader.onload = (e) => {
setBG(e.target.result);
addLog(`Wallpaper updated from file: ${file.name}`);
};
reader.readAsDataURL(file);
event.target.value = '';
}

function setPass(p) { OS.pass = p; localStorage.setItem("mc_pass", p); }

function unlock() {
if(document.getElementById('pass-in').value === OS.pass) {
document.getElementById('login').style.opacity = '0';
setTimeout(() => {
document.getElementById('login').style.display = 'none';
document.getElementById('desktop').style.display = 'block';
document.getElementById('widget-layer').style.display = 'block';
renderDesktop();
addLog("User authenticated successfully.");
}, 500);
} else {
addLog("Warning: Unauthorized access attempt.");
notify("system", "System Warning: Unauthorized access attempt.");
document.getElementById('log-msg').innerText = "DENIED";
}
}

function lockSystem() { location.reload(); }

function renderDesktop() {
const d = document.getElementById('desktop'); d.innerHTML = "";
OS.installed.forEach((id, index) => {
const p = OS.pos[id] || {x: 50 + (index*130 % (window.innerWidth - 300)), y: 50 + (Math.floor(index/8)*150)};
const el = document.createElement('div'); el.className = 'icon';
el.style.left = p.x+'px'; el.style.top = p.y+'px';
el.setAttribute("draggable", "true");
el.innerHTML = `<div>${Registry[id] ? Registry[id].icon : "📦"}</div><span>${id}</span>`;
el.ondragstart = (e) => startDrag(e, id);
el.ondragend = (e) => endDrag(e);
el.ondblclick = () => launch(id);
el.onmousedown = (e) => {
if (e.button !== 0) return;
e.preventDefault();
el.classList.add('dragging');
let ox = e.clientX - el.offsetLeft, oy = e.clientY - el.offsetTop;
let raf = null;
let pending = null;
const applyMove = () => {
if(!pending) return;
const { clientX, clientY } = pending;
const nx = clientX - ox;
const ny = clientY - oy;
el.style.left = nx + 'px';
el.style.top = ny + 'px';
OS.pos[id] = {x: nx, y: ny};
raf = null;
};
const onMove = (ev) => {
pending = ev;
if(!raf) raf = requestAnimationFrame(applyMove);
};
// keep drag cleanup block from codex branch (resolved merge)
const onUp = () => {
cleanupIconDrag(el, onMove, onUp, raf);
};
window.addEventListener('mousemove', onMove);
window.addEventListener('mouseup', onUp);
};
d.appendChild(el);
});
}

function cleanupIconDrag(el, onMove, onUp, raf) {
window.removeEventListener('mousemove', onMove);
window.removeEventListener('mouseup', onUp);
if(raf) cancelAnimationFrame(raf);
el.classList.remove('dragging');
localStorage.setItem("mc_pos", JSON.stringify(OS.pos));
}

function renderLib() {
const c = document.getElementById('lib-cont'); c.innerHTML = "";
OS.installed.forEach(id => {
if(!Registry[id]) return;
const i = document.createElement('div'); i.className = 'start-item';
i.innerHTML = `<span>${Registry[id].icon}</span><strong>${id}</strong>`;
i.onclick = () => { launch(id); toggleStart(); };
c.appendChild(i);
});
}

function toggleStart() { const s = document.getElementById('start-menu'); s.style.display = (s.style.display==='flex')?'none':'flex'; }

function launch(id) {
if(OS.running[id]) { focusWin(id); return; }
if(!Registry[id]) return;
addLog(`Launched module: ${id}`);
const w = document.createElement('div'); w.className = 'window';
w.style.width='950px'; w.style.height='650px'; w.style.left='100px'; w.style.top='80px'; w.style.zIndex = ++OS.z;
w.innerHTML = `<div class="win-head">
<div style="display:flex; align-items:center; gap:10px;">
<span style="font-size:1.2rem;">${Registry[id].icon}</span>
<span style="font-weight:700; font-size:0.8rem; letter-spacing:1px; opacity:0.8;">${id.toUpperCase()}</span>
</div>
<div class="win-ctrls">
<span onclick="toggleIntegratedFullscreen('${id}')">⛶</span>
<span onclick="min('${id}')">─</span>
<span style="font-weight:bold; color:#ff4b4b;" onclick="closeW('${id}')">✕</span>
</div>
</div>
<div class="win-body">${Registry[id].content()}</div>
<div class="resizer"></div>`
; document.body.appendChild(w); OS.running[id] = w;
w.querySelector('.win-head').onmousedown = (e) => {
if(w.dataset.fs === "true") return;
focusWin(id); let ox = e.clientX - w.offsetLeft, oy = e.clientY - w.offsetTop;
document.onmousemove = (ev) => { w.style.left = (ev.clientX-ox)+'px'; w.style.top = (ev.clientY-oy)+'px'; };
document.onmouseup = () => document.onmousemove = null;
};
w.querySelector('.resizer').onmousedown = (e) => {
let sw=w.offsetWidth, sh=w.offsetHeight, sx=e.clientX, sy=e.clientY;
document.onmousemove = (ev) => { w.style.width = (sw+(ev.clientX-sx))+'px'; w.style.height = (sh+(ev.clientY-sy))+'px'; };
document.onmouseup = () => document.onmousemove = null;
};
updateTask();
}

function focusWin(id) { if(OS.running[id]) OS.running[id].style.zIndex = ++OS.z; updateTask(); }
function closeW(id) { if(OS.running[id]) { OS.running[id].remove(); delete OS.running[id]; updateTask(); addLog(`Closed module: ${id}`); } }
function min(id) { if(OS.running[id]) { OS.running[id].style.display = 'none'; updateTask(); } }

function toggleIntegratedFullscreen(id) {
const w = OS.running[id];
if(w.dataset.fs !== "true") {
w.dataset.oldW = w.style.width; w.dataset.oldH = w.style.height;
w.dataset.oldL = w.style.left; w.dataset.oldT = w.style.top;
w.style.width = '100vw'; w.style.height = `calc(100vh - var(--top-bar-h) - var(--taskbar-h))`;
w.style.top = `var(--top-bar-h)`; w.style.left = '0';
w.style.borderRadius = '0'; w.dataset.fs = "true";
} else {
w.style.width = w.dataset.oldW; w.style.height = w.dataset.oldH;
w.style.left = w.dataset.oldL; w.style.top = w.dataset.oldT;
w.style.borderRadius = '20px'; w.dataset.fs = "false";
}
}

function updateTask() {
const tl = document.getElementById('task-list'); tl.innerHTML = "";
Object.keys(OS.running).forEach(id => {
const t = document.createElement('div'); t.className = 'task-tab' + (OS.running[id].style.display!=='none'?' active':'');
t.innerText = id;
t.onclick = () => {
if(OS.running[id].style.display === 'none') {
OS.running[id].style.display = 'flex';
focusWin(id);
} else {
focusWin(id);
}
};
tl.appendChild(t);
});
}

/* --- TERMINAL COMMAND ENGINE --- */
function cmd(e, el) {
if(e.key !== "Enter") return;
const out = document.getElementById('t-out');
const raw = el.value.trim();
const [command, ...args] = raw.split(' ');
const v = (command || '').toLowerCase();
out.innerHTML += `<div><span style="color:white;">></span> ${raw}</div>`;
if(v === "help") out.innerHTML += "<div>Commands: help, clear, exit, logs, apps, ver, time, date, battery, whoami, echo, open, install, uninstall, notify, setbg, calc, widgets, lock, reboot</div>";
else if(v === "clear") out.innerHTML = "";
else if(v === "logs") out.innerHTML += `<div>Total session events: ${OS.logs.length}</div>`;
else if(v === "apps") out.innerHTML += `<div>Installed: ${OS.installed.join(', ')}</div>`;
else if(v === "ver") out.innerHTML += "<div>McCrackOS Kernel v9.0.4. Build 2026.03.10</div>";
else if(v === "time") out.innerHTML += `<div>${new Date().toLocaleTimeString()}</div>`;
else if(v === "date") out.innerHTML += `<div>${new Date().toDateString()}</div>`;
else if(v === "battery") out.innerHTML += `<div>Battery: ${OS.battery}%</div>`;
else if(v === "whoami") out.innerHTML += "<div>user@McCrackOS</div>";
else if(v === "echo") out.innerHTML += `<div>${args.join(' ')}</div>`;
else if(v === "open") { const app = args.join(' '); if(Registry[app]) { launch(app); out.innerHTML += `<div>Opened ${app}</div>`; } else out.innerHTML += `<div style="color:var(--danger);">Unknown app: ${app}</div>`; }
else if(v === "install") { const app = args.join(' '); if(Registry[app] && !OS.installed.includes(app)) { install(app); out.innerHTML += `<div>Installed ${app}</div>`; } else out.innerHTML += `<div>Unable to install ${app}</div>`; }
else if(v === "uninstall") { const app = args.join(' '); if(OS.installed.includes(app) && !OS.restricted.includes(app)) { OS.installed = OS.installed.filter(a => a !== app); localStorage.setItem('mc_apps', JSON.stringify(OS.installed)); renderDesktop(); renderLib(); out.innerHTML += `<div>Removed ${app}</div>`; notify('warning', `${app} removed.`); } else out.innerHTML += `<div>Cannot remove ${app}</div>`; }
else if(v === "notify") { const msg = args.join(' ') || 'System Warning'; notify('system', msg); out.innerHTML += `<div>Notification pushed.</div>`; }
else if(v === "setbg") { const u = args.join(' '); if(u) { setBG(u); out.innerHTML += `<div>Wallpaper updated.</div>`; } else out.innerHTML += `<div>Usage: setbg https://...</div>`; }
else if(v === "calc") { try { out.innerHTML += `<div>${eval(args.join(' '))}</div>`; } catch { out.innerHTML += `<div>Calculation error.</div>`; } }
else if(v === "widgets") out.innerHTML += `<div>Installed widgets: ${OS.widgets.join(', ') || 'none'}</div>`;
else if(v === "lock") lockSystem();
else if(v === "reboot") location.reload();
else if(v === "exit") closeW('Terminal');
else out.innerHTML += `<div style="color:var(--danger);">Command not found: ${v}</div>`;
el.value = "";
out.scrollTop = out.scrollHeight;
}

/* --- MATH ENGINE --- */
function calcResult() {
try {
const res = eval(document.getElementById('c-in').value);
document.getElementById('c-in').value = res;
} catch(e) {
document.getElementById('c-in').value = "ERROR";
}
}
</script>
