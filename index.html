<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>McCrackOS</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
body{
    height:100vh;
    overflow:hidden;
    background:linear-gradient(135deg,#1e1e2f,#2c2c3e);
    color:white;
}

/* Boot Screen */
#boot{
    position:fixed;
    inset:0;
    background:#000;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:3rem;
    letter-spacing:2px;
}

/* Login */
#login{
    position:fixed;
    inset:0;
    backdrop-filter:blur(20px);
    background:rgba(0,0,0,.6);
    display:none;
    align-items:center;
    justify-content:center;
}
.login-box{
    background:rgba(255,255,255,.1);
    padding:40px;
    border-radius:20px;
    backdrop-filter:blur(20px);
    display:flex;
    flex-direction:column;
    gap:15px;
    width:300px;
}
.login-box input{
    padding:10px;
    border:none;
    border-radius:10px;
    outline:none;
}
.login-box button{
    padding:10px;
    border:none;
    border-radius:10px;
    background:white;
    cursor:pointer;
}

/* Desktop */
#desktop{
    position:absolute;
    inset:0;
    display:none;
}

/* Dock */
#dock{
    position:absolute;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:15px;
    padding:15px 25px;
    background:rgba(255,255,255,.1);
    backdrop-filter:blur(20px);
    border-radius:30px;
}
.dock-item{
    width:50px;
    height:50px;
    border-radius:15px;
    background:rgba(255,255,255,.2);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:.2s;
}
.dock-item:hover{transform:scale(1.2);}

/* Window */
.window{
    position:absolute;
    width:500px;
    height:350px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(20px);
    border-radius:20px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
}
.window-header{
    padding:10px;
    background:rgba(255,255,255,.1);
    cursor:move;
    display:flex;
    justify-content:space-between;
}
.window-body{
    flex:1;
    padding:10px;
    overflow:auto;
}

/* Clock */
#clock{
    position:absolute;
    top:20px;
    right:20px;
    background:rgba(255,255,255,.1);
    padding:10px 20px;
    border-radius:20px;
    backdrop-filter:blur(20px);
}

/* Context Menu */
#contextMenu{
    position:absolute;
    background:rgba(255,255,255,.1);
    backdrop-filter:blur(20px);
    border-radius:15px;
    padding:10px;
    display:none;
}
#contextMenu div{
    padding:8px 15px;
    cursor:pointer;
}
#contextMenu div:hover{
    background:rgba(255,255,255,.2);
}
</style>
</head>
<body>

<div id="boot">McCrackOS</div>

<div id="login">
    <div class="login-box">
        <input type="text" id="username" placeholder="Enter Username">
        <input type="password" placeholder="Password (optional)">
        <button onclick="enterOS()">Login</button>
    </div>
</div>

<div id="desktop">
    <div id="clock"></div>
    <div id="dock">
        <div class="dock-item" onclick="openNotepad()">📝</div>
        <div class="dock-item" onclick="openBrowser()">🌐</div>
        <div class="dock-item" onclick="openTerminal()">⌨️</div>
        <div class="dock-item" onclick="openSettings()">⚙️</div>
        <div class="dock-item" onclick="openStore()">🛒</div>
        <div class="dock-item" onclick="openTrash()">🗑️</div>
    </div>
</div>

<div id="contextMenu">
    <div onclick="location.reload()">Refresh</div>
</div>

<script>
/* Boot → Login */
setTimeout(()=>{
    document.getElementById("boot").style.display="none";
    document.getElementById("login").style.display="flex";
},2000);

function enterOS(){
    document.getElementById("login").style.display="none";
    document.getElementById("desktop").style.display="block";
}

/* Clock */
setInterval(()=>{
    document.getElementById("clock").innerText=new Date().toLocaleTimeString();
},1000);

/* Window Creator */
function createWindow(title,content){
    const win=document.createElement("div");
    win.className="window";
    win.style.top=Math.random()*200+50+"px";
    win.style.left=Math.random()*200+50+"px";
    win.innerHTML=`
        <div class="window-header">
            <span>${title}</span>
            <span style="cursor:pointer" onclick="this.closest('.window').remove()">✖</span>
        </div>
        <div class="window-body">${content}</div>
    `;
    document.body.appendChild(win);
    drag(win);
}

/* Drag */
function drag(el){
    const header=el.querySelector(".window-header");
    header.onmousedown=function(e){
        let offsetX=e.clientX-el.offsetLeft;
        let offsetY=e.clientY-el.offsetTop;
        document.onmousemove=function(e){
            el.style.left=e.clientX-offsetX+"px";
            el.style.top=e.clientY-offsetY+"px";
        }
        document.onmouseup=function(){
            document.onmousemove=null;
        }
    }
}

/* Apps */
function openNotepad(){
    createWindow("Notepad",
        `<textarea style="width:100%;height:100%;background:transparent;color:white;border:none;outline:none;"
        oninput="localStorage.setItem('note',this.value)">${localStorage.getItem('note')||""}</textarea>`
    );
}

function openBrowser(){
    createWindow("Browser",
        `<input type="text" placeholder="Enter URL" style="width:100%;padding:5px;"
        onkeydown="if(event.key==='Enter'){this.nextElementSibling.src=this.value}">
        <iframe style="width:100%;height:90%;border:none;"></iframe>`
    );
}

function openTerminal(){
    createWindow("Terminal",
        `<div id="termOutput"></div>
        <input type="text" placeholder="type help" style="width:100%;background:black;color:lime;border:none;padding:5px;"
        onkeydown="if(event.key==='Enter'){runCommand(this)}">`
    );
}

function runCommand(input){
    const cmd=input.value;
    const out=input.previousElementSibling;
    if(cmd==="help") out.innerHTML+="<div>Commands: help, about, clear</div>";
    else if(cmd==="about") out.innerHTML+="<div>McCrackOS v1.0</div>";
    else if(cmd==="clear") out.innerHTML="";
    else out.innerHTML+="<div>Unknown command</div>";
    input.value="";
}

function openSettings(){
    createWindow("Settings",
        `<button onclick="document.body.style.background='linear-gradient(135deg,#1e1e2f,#2c2c3e)'">Dark</button>
         <button onclick="document.body.style.background='linear-gradient(135deg,#e3e3e3,#bdbdbd)'">Light</button>`
    );
}

function openStore(){
    createWindow("App Store",
        `<div>Coming Soon...</div>`
    );
}

function openTrash(){
    createWindow("Trash",
        `<div>Trash is empty.</div>`
    );
}

/* Context Menu */
document.addEventListener("contextmenu",function(e){
    e.preventDefault();
    const menu=document.getElementById("contextMenu");
    menu.style.display="block";
    menu.style.left=e.pageX+"px";
    menu.style.top=e.pageY+"px";
});
document.addEventListener("click",()=>{
    document.getElementById("contextMenu").style.display="none";
});
</script>

</body>
</html>
